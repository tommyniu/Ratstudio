<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>开发规划 - RatStudio的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

.container{
  width:100%;height:calc(100% - 56px);
  margin-top:56px;padding:30px;overflow-y:auto;
}
.plan-box{
  background:#fff;border:1px solid #e5e6eb;
  border-radius:12px;padding:24px;margin-bottom:20px;
}
.plan-box h3{
  color:#0066cc;margin-bottom:12px;font-size:16px;
}
.plan-box li{
  margin-left:20px;line-height:1.7;margin-bottom:6px;
  display:flex;justify-content:space-between;align-items:center;
}
/* 已完成项：灰色文字 + 右侧对勾 */
.done{
  color:#999;
  text-decoration:none;
}
.done-check{
  color:#52c41a;
  font-weight:bold;
  margin-left:10px;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#dcdcdc;border-radius:3px}
</style>
</head>

<body>

<!-- 公共顶部导航 -->
<div id="navContainer"></div>
<script>
fetch('nav.html')
.then(res => res.text())
.then(html => {
  document.getElementById('navContainer').innerHTML = html;
});
</script>

<div class="container">
<div class="plan-box">
<h3>📌 近期规划</h3>
<ul>
<li><span class="done">网页化：修改UI，使其看起来更像大型论坛网站页面</span><span class="done-check">✓</span></li>
<li>论坛功能完善，增加评论，显示详细内容等功能</li>
<li><span class="done">用户主页：增加用户主页，显示其发帖，点赞数</span><span class="done-check">✓</span></li>
<li>时间显示：显示发帖时间，记录点赞、注册、登录时间等</li>
</ul>
</div>

<div class="plan-box">
<h3>🚀 中期规划</h3>
<ul>
<li>通知：在网页右上角添加通知按钮，显示系统提示、收到点赞、评论等信息</li>
<li>关注：关注某用户，在其发送帖子时通过通知提醒你</li>
<li>主页：添加主页功能，在主页增加公告等功能，并随机推荐内容</li>
<li>UI：增加亮色暗色模式切换，添加按钮点击弹性动画</li>
</ul>
</div>

<div class="plan-box">
<h3>🔮 远期 / 超远期规划</h3>
<ul>
<li>待定</li>
</ul>
</div>
</div>

</body>
</html>
