<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>开发规划 - RatStudio的小站</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:linear-gradient(135deg,#0f1419,#0a0c12);display:flex;align-items:center;justify-content:center;height:100vh}
.container{
  display:flex;width:680px;height:750px;border-radius:44px;overflow:hidden;
  background:rgba(255,255,255,.04);backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 50px rgba(60,120,255,0.25);
}
.sidebar{
  width:140px;background:rgba(255,255,255,.05);padding:30px 10px;
  display:flex;flex-direction:column;gap:10px;
  border-right:1px solid rgba(255,255,255,.08);
}
.item{
  padding:14px;border-radius:16px;color:rgba(255,255,255,.8);text-align:center;
  cursor:pointer;transition:all 0.2s;border:1px solid transparent;
}
.item:hover,.item.active{
  background:rgba(60,130,255,.25);color:#fff;
  border-color:rgba(100,160,255,0.4);box-shadow:0 0 12px rgba(80,140,255,0.35);
}
.main{flex:1;position:relative;overflow:auto;}
.top{
  background:rgba(255,255,255,.05);padding:20px;color:#fff;font-weight:600;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.content{padding:30px;color:#fff;line-height:1.7}
.plan-box{
  background:rgba(255,255,255,.07);border-radius:18px;padding:20px;margin-bottom:16px;
  border:1px solid rgba(255,255,255,.12);
}
.plan-box h3{color:#6ccff;margin-bottom:10px}
.version{position:absolute;right:18px;bottom:12px;color:#888;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="item" onclick="location.href='index.html'">聊天室</div>
<div class="item" onclick="location.href='forum.html'">论坛</div>
<div class="item" onclick="location.href='history.html'">更新日志</div>
<div class="item active">开发规划</div>
</div>
<div class="main">
<div class="top"><span>开发规划</span></div>
<div class="content">
<div class="plan-box">
<h3>📌 近期</h3>
<li>网页化UI优化</li>
<li>论坛完善</li>
<li>用户主页</li>
<li>时间显示</li>
</div>
<div class="plan-box">
<h3>🚀 中期</h3>
<li>通知系统</li>
<li>关注功能</li>
<li>首页推荐</li>
<li>深色/浅色模式</li>
</div>
<div class="plan-box">
<h3>🔮 远期</h3>
<li>待定</li>
</div>
</div>
<div class="version">V1.3.2</div>
</div>
</div>
</body>
</html>
