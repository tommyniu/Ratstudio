<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>开发计划</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f5f5f5;display:flex;align-items:center;justify-content:center;height:100vh}
.container{width:680px;height:750px;background:#fff;border-radius:20px;display:flex;overflow:hidden}
.sidebar{width:150px;background:#fafafa;border-right:1px solid #eee;padding:20px 10px}
.item{padding:12px;border-radius:12px;margin-bottom:8px;text-align:center;color:#666}
.main{flex:1;padding:30px;overflow-y:auto}
h2{margin-bottom:20px}
.plan-item{
  padding:12px 16px;background:#f9f9f9;border-radius:12px;margin-bottom:10px;
  display:flex;align-items:center;gap:10px;
}
.plan-item.done{color:#999}
.plan-item .check{color:#00b42a;font-size:16px}
.old-ui-btn{position:absolute;top:20px;right:20px;padding:6px 12px;background:#eee;border:none;border-radius:8px}

/* 旧版 */
.old-ui body{background:linear-gradient(135deg,#0f1419,#0a0c12);color:#fff}
.old-ui .container{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.1)}
.old-ui .sidebar{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="item" onclick="location='index.html'">聊天室</div>
    <div class="item" onclick="location='forum.html'">论坛</div>
    <div class="item" onclick="location='history.html'">更新日志</div>
    <div class="item active">开发计划</div>
  </div>
  <div class="main">
    <button class="old-ui-btn" onclick="toggleOldUI()">旧版UI</button>
    <h2>开发计划</h2>
    <div class="plan-item done"><span class="check">✅</span> 注册登录系统</div>
    <div class="plan-item done"><span class="check">✅</span> 聊天功能</div>
    <div class="plan-item done"><span class="check">✅</span> 撤回消息（自己/管理员）</div>
    <div class="plan-item done"><span class="check">✅</span> 论坛发帖</div>
    <div class="plan-item done"><span class="check">✅</span> 删除帖子（自己/管理员）</div>
    <div class="plan-item done"><span class="check">✅</span> 点赞功能（防刷）</div>
    <div class="plan-item done"><span class="check">✅</span> 全新贴吧风格UI</div>
    <div class="plan-item done"><span class="check">✅</span> 一键切换旧版UI</div>
  </div>
</div>
<script>
function toggleOldUI(){
  document.body.classList.toggle("old-ui");
  localStorage.setItem("oldUI", document.body.classList.contains("old-ui"));
}
window.onload=()=>{
  if(localStorage.getItem("oldUI")==="true") document.body.classList.add("old-ui");
}
</script>
</body>
</html>
