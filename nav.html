<style>
.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;position:fixed;top:0;left:0;z-index:999;
  gap:8px;
}
.nav-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:#0066cc;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:15px;
}
.user-info-mini{
  font-size:12px;color:#666;line-height:1.2;
  white-space:nowrap;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:13px;}

.nav-right{
  display:flex;gap:6px;align-items:center;
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
.nav-right::-webkit-scrollbar{display:none}
.nav-item{
  font-size:13px;color:#666;cursor:pointer;
  padding:6px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;
  transition:0.2s;
}
.nav-item:hover{
  background:#f5f5f5;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}

.logout{
  font-size:13px;color:#ff4444;cursor:pointer!important;
  padding:6px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;
  z-index:9999!important;
  pointer-events:all!important;
}
.logout:hover{
  background:#f5f5f5;
}
</style>

<div class="top-nav">
  <div class="nav-left" id="userHead">
    <div class="avatar" id="topAvatar" onclick="goPersonal()">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">未登录</div>
      <div>UID: <span id="miniUid">-</span></div>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">主页</div>
    <div class="nav-item" onclick="location.href='chat.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
</div>

<script>
// 强制立即执行，不等待页面加载
(function(){
  function getAvatarChar(n){ return n ? n[0].toUpperCase() : 'U'; }

  window.goPersonal = function(){
    let uid = localStorage.getItem('uid');
    if(uid) location.href='personal.html?uid='+uid;
  }

  window.logout = function() {
    if(!confirm('确定退出登录？')) return;
    localStorage.clear();
    location.href='index.html';
  }

  // 立即加载用户信息
  let myName = localStorage.getItem('username');
  let myUid  = localStorage.getItem('uid');
  
  if(myName && myUid) {
    document.getElementById('topAvatar').innerText = getAvatarChar(myName);
    document.getElementById('miniName').innerText = myName;
    document.getElementById('miniUid').innerText = myUid;
  } else {
    document.getElementById('miniName').innerText = "游客";
    document.getElementById('miniUid').innerText = "未登录";
  }

  // 高亮当前页面
  let page = location.pathname.split('/').pop();
  document.querySelectorAll('.nav-item').forEach(el=>{
    if(el.getAttribute('onclick').includes(page)){
      el.classList.add('active');
    }
  });
})();
</script>
