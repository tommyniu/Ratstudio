<style>
.top-nav{
  width:100%;
  height:56px;
  background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  position:fixed;
  top:0;
  left:0;
  z-index:9999;
  /* 全局过渡动画 */
  transition: all 0.3s ease;
}
/* 滚动收缩态 */
.top-nav.scroll-shrink{
  height:46px;
  padding:0 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

.nav-left{
  display:flex;
  align-items:center;
  gap:8px;
  flex-shrink:1;
  min-width:0;
  transition: gap 0.3s ease;
}
.top-nav.scroll-shrink .nav-left{
  gap:6px;
}

.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#0066cc;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  flex-shrink:0;
  font-weight:bold;
  transition: all 0.3s ease;
}
.top-nav.scroll-shrink .avatar{
  width:30px;
  height:30px;
  font-size:12px;
}

.user-info-mini{
  font-size:12px;
  line-height:1.2;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:120px;
  transition: all 0.3s ease;
}
.top-nav.scroll-shrink .user-info-mini{
  font-size:11px;
  max-width:90px;
}
.name-text{
  font-weight:bold;
  color:#333;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:6px;
  flex-shrink:2;
  flex-wrap:nowrap;
  overflow:hidden;
  transition: gap 0.3s ease;
}
.top-nav.scroll-shrink .nav-right{
  gap:4px;
}

.nav-item{
  font-size:13px;
  color:#666;
  padding:6px 8px;
  border-radius:6px;
  white-space:nowrap;
  cursor:pointer;
  transition: all 0.3s ease;
  flex-shrink:1;
  text-align:center;
}
.top-nav.scroll-shrink .nav-item{
  padding:4px 6px;
  font-size:12px;
}
.nav-item:hover{
  background:#f5f5f5;
}

.logout-btn{
  font-size:13px;
  color:red;
  padding:6px 8px;
  border-radius:6px;
  cursor:pointer;
  white-space:nowrap;
  flex-shrink:0;
  transition: all 0.3s ease;
}
.top-nav.scroll-shrink .logout-btn{
  padding:4px 6px;
  font-size:12px;
}

/* 手机端适配挤压 */
@media (max-width: 600px) {
  .top-nav {
    padding:0 8px;
  }
  .user-info-mini {
    max-width:80px;
  }
  .nav-item {
    padding:4px 5px;
    font-size:12px;
  }
  .top-nav.scroll-shrink .user-info-mini{
    max-width:60px;
  }
}
</style>

<div class="top-nav" id="topNav">
  <div class="nav-left">
    <div id="topAvatar" class="avatar">U</div>
    <div class="user-info-mini">
      <div id="miniName" class="name-text">游客</div>
      <div>UID: <span id="miniUid">未登录</span></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">主页</div>
    <div class="nav-item" onclick="location.href='chat.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div id="logoutBtn" class="logout-btn" style="display:none;">退出登录</div>
  </div>
</div>

<script>
// 头像用户名初始化
document.addEventListener('DOMContentLoaded', function() {
  setTimeout(() => {
    const u = localStorage.getItem('username');
    const uid = localStorage.getItem('uid');
    const avatar = document.getElementById('topAvatar');
    const miniName = document.getElementById('miniName');
    const miniUid = document.getElementById('miniUid');
    const logoutBtn = document.getElementById('logoutBtn');

    if (u && uid && avatar) {
      avatar.innerText = u.charAt(0).toUpperCase();
      miniName.innerText = u;
      miniUid.innerText = uid;
      logoutBtn.style.display = 'block';
    } else {
      avatar.innerText = 'U';
      miniName.innerText = '游客';
      miniUid.innerText = '未登录';
      logoutBtn.style.display = 'none';
    }
  }, 10);

  // 滚动收缩动画
  const topNav = document.getElementById('topNav');
  let scrollTimer;
  window.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    if(window.scrollY > 20){
      topNav.classList.add('scroll-shrink');
    }else{
      topNav.classList.remove('scroll-shrink');
    }
    // 防抖动
    scrollTimer = setTimeout(()=>{
      if(window.scrollY <= 20){
        topNav.classList.remove('scroll-shrink');
      }
    },100);
  });
});
</script>
