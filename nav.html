<style>
  .top-nav {
    width: 100%;
    height: 56px;
    background: #fff;
    border-bottom: 1px solid #e5e6eb;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 999;
    box-sizing: border-box;
  }

  /* 左侧：头像 + 名字 + UID */
  .nav-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: #0066cc;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    cursor: pointer;
  }
  .user-info {
    display: flex;
    flex-direction: column;
    font-size: 12px;
    color: #666;
    line-height: 1.2;
  }
  .user-name {
    font-weight: bold;
    color: #333;
    font-size: 13px;
  }

  /* 右侧：四个按钮 + 退出 */
  .nav-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .nav-item {
    font-size: 14px;
    color: #666;
    cursor: pointer;
    padding: 6px 0;
    transition: 0.2s;
  }
  .nav-item:hover {
    color: #333;
  }
  .nav-item.active {
    color: #0066cc;
    font-weight: bold;
  }
  .logout {
    color: #ff4444;
    cursor: pointer;
    font-size: 14px;
  }
</style>

<div class="top-nav">
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info">
      <div class="user-name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" onclick="logout()">退出</div>
  </div>
</div>

<script>
function logout() {
  if (!confirm('确定退出？')) return;
  localStorage.clear();
  location.href = 'index.html';
}

window.addEventListener('load', function () {
  let username = localStorage.getItem('username');
  let uid = localStorage.getItem('uid');

  if (username && uid) {
    document.getElementById('userHead').style.display = 'flex';
    document.getElementById('miniName').innerText = username;
    document.getElementById('miniUid').innerText = uid;
    document.getElementById('topAvatar').innerText = username.charAt(0).toUpperCase();
    document.getElementById('topAvatar').onclick = () => {
      location.href = 'personal.html?uid=' + uid;
    };
  }

  // 高亮当前页面
  let page = location.pathname.split('/').pop();
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick').includes(page)) {
      el.classList.add('active');
    }
  });
});
</script>
