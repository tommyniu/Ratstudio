<div class="top-nav">
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout-btn" onclick="logout()">退出</div>
  </div>
</div>

<style>
.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:fixed;top:0;left:0;z-index:999;
}
.nav-left{display:flex;align-items:center;gap:8px;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:#0066cc;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:15px;
}
.user-info-mini{
  display:flex;flex-direction:column;
  font-size:12px;color:#666;line-height:1.2;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:13px;}

.nav-right{display:flex;gap:6px;align-items:center;}
.nav-item{
  font-size:14px;color:#666;cursor:pointer;
  padding:6px 8px;border-radius:6px;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}
.logout-btn{
  font-size:14px;color:#ff4d4f;
  cursor:pointer;padding:6px 8px;border-radius:6px;
}
</style>

<script>
// 退出
function logout(){
  if(!confirm('确定退出登录？'))return;
  localStorage.clear();
  location.href='index.html';
}

// 初始化用户信息、头像跳转个人主页
window.addEventListener('load',function(){
  let un = localStorage.getItem('username');
  let uid = localStorage.getItem('uid');
  if(un && uid){
    document.getElementById('userHead').style.display = 'flex';
    document.getElementById('miniName').innerText = un;
    document.getElementById('miniUid').innerText = uid;
    document.getElementById('topAvatar').innerText = un.charAt(0).toUpperCase();
    // 头像点进个人主页
    document.getElementById('topAvatar').onclick = function(){
      location.href = 'personal.html?uid=' + uid;
    };
  }

  // 当前页面高亮
  let page = location.pathname.split('/').pop();
  let items = document.querySelectorAll('.nav-item');
  items.forEach(el=>{
    if(el.getAttribute('onclick')?.includes(page)){
      el.classList.add('active');
    }
  });
});
</script>
