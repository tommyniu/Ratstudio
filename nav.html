<style>
.nav {
  width: 100%;
  height: 56px;
  background: white;
  border-bottom: 1px solid #eee;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

/* 左侧：头像 + 昵称 + UID（只加这个） */
.left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* 头像：可点击提示（悬浮放大） */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #0066cc;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
  transition: transform 0.2s;
}
.avatar:hover {
  transform: scale(1.05);
}

/* 昵称 UID */
.user-info {
  display: flex;
  flex-direction: column;
}
.name {
  font-size: 14px;
  font-weight: bold;
}
.uid {
  font-size: 12px;
  color: #888;
}

/* 右侧按钮（完全不动！） */
.menu {
  display: flex;
  gap: 20px;
  align-items: center;
}
.btn {
  font-size: 14px;
  color: #666;
  cursor: pointer;
  transition: 0.2s;
  padding: 6px 10px;
  border-radius: 6px;
}
.btn:hover {
  color: #222;
  background: #f5f5f5;
}
.btn.active {
  color: #0066cc;
  font-weight: bold;
}
.logout {
  color: #ff4444;
  cursor: pointer;
  font-size: 14px;
}
</style>

<div class="nav">
  <!-- 左侧：头像 + 昵称 + UID -->
  <div class="left" id="userInfo" style="display:none">
    <div class="avatar" id="avatar">U</div>
    <div class="user-info">
      <div class="name" id="username"></div>
      <div class="uid">UID: <span id="uid"></span></div>
    </div>
  </div>

  <!-- 右侧：完全保持你喜欢的原样 -->
  <div class="menu">
    <div class="btn" onclick="location.href='index.html'">聊天室</div>
    <div class="btn" onclick="location.href='forum.html'">论坛</div>
    <div class="btn" onclick="location.href='history.html'">更新日志</div>
    <div class="btn" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
</div>

<script>
function logout() {
  if (!confirm("确定退出登录？")) return;
  localStorage.clear();
  location.href = "index.html";
}

window.onload = function() {
  let un = localStorage.getItem("username");
  let uid = localStorage.getItem("uid");

  if (un && uid) {
    document.getElementById("userInfo").style.display = "flex";
    document.getElementById("username").innerText = un;
    document.getElementById("uid").innerText = uid;
    document.getElementById("avatar").innerText = un.charAt(0).toUpperCase();
    document.getElementById("avatar").onclick = function() {
      location.href = "personal.html?uid=" + uid;
    };
  }

  let page = location.pathname.split("/").pop();
  document.querySelectorAll(".btn").forEach(btn => {
    if (btn.getAttribute("onclick").includes(page)) {
      btn.classList.add("active");
    }
  });
}
</script>
