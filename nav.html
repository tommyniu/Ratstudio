<style>
.nav {
  width: 100%;
  height: 56px;
  background: white;
  border-bottom: 1px solid #eee;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

/* 左侧头像 */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #0066cc;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

/* 右侧菜单 */
.menu {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* 按钮 + 动画 */
.btn {
  font-size: 14px;
  color: #666;
  cursor: pointer;
  transition: 0.2s;
}
.btn:hover {
  color: #222;
  background: #f5f5f5;
  padding: 6px 10px;
  border-radius: 6px;
}
.btn.active {
  color: #0066cc;
  font-weight: bold;
}

/* 退出登录 */
.logout {
  color: #ff4444;
  cursor: pointer;
  font-size: 14px;
}
</style>

<div class="nav">
  <!-- 左侧：头像 -->
  <div class="avatar" id="avatar">U</div>

  <!-- 右侧：导航 -->
  <div class="menu">
    <div class="btn" onclick="location.href='index.html'">聊天室</div>
    <div class="btn" onclick="location.href='forum.html'">论坛</div>
    <div class="btn" onclick="location.href='history.html'">更新日志</div>
    <div class="btn" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
</div>

<script>
// 退出登录
function logout() {
  if (!confirm("确定退出登录？")) return;
  localStorage.clear();
  location.href = "index.html";
}

// 初始化头像 + 个人主页跳转
window.onload = function() {
  let username = localStorage.getItem("username");
  let uid = localStorage.getItem("uid");

  if (username && uid) {
    document.getElementById("avatar").innerText = username.charAt(0).toUpperCase();
    // 头像点击进个人主页
    document.getElementById("avatar").onclick = function() {
      location.href = "personal.html?uid=" + uid;
    };
  }

  // 高亮当前页面
  let page = location.pathname.split("/").pop();
  document.querySelectorAll(".btn").forEach(btn => {
    if (btn.getAttribute("onclick").includes(page)) {
      btn.classList.add("active");
    }
  });
}
</script>
