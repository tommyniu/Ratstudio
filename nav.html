<style>
.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;position:fixed;top:0;left:0;z-index:9999;
  gap:8px;
}
.nav-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:#0066cc;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:15px;
}
.user-info-mini{
  font-size:12px;color:#666;line-height:1.2;
  white-space:nowrap;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:13px;}

.nav-right{
  display:flex;gap:6px;align-items:center;
}
.nav-item{
  font-size:13px;color:#666;cursor:pointer;
  padding:6px 8px;border-radius:6px;white-space:nowrap;
  transition:0.2s;
}
.nav-item:hover{
  background:#f5f5f5;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}

.logout{
  font-size:13px;color:#ff4444;
  padding:6px 8px;border-radius:6px;
  cursor:pointer;
  z-index:9999;
}
</style>

<div class="top-nav">
  <div class="nav-left">
    <div id="topAvatar" class="avatar">U</div>
    <div class="user-info-mini">
      <div id="miniName">游客</div>
      <div>UID: <span id="miniUid">未登录</span></div>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">主页</div>
    <div class="nav-item" onclick="location.href='chat.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" id="logoutBtn">退出登录</div>
  </div>
</div>

<script>
// 只做导航高亮，不读取登录状态
document.addEventListener('DOMContentLoaded', function(){
  let page = location.pathname.split('/').pop();
  document.querySelectorAll('.nav-item').forEach(i => {
    if (i.getAttribute('onclick').includes(page)) {
      i.classList.add('active');
    }
  });
});
</script>
