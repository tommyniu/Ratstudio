<style>
.nav {
  width: 100%;
  height: 56px;
  background: white;
  border-bottom: 1px solid #eee;
  position: fixed;
  top: 0;
  left: 0;
  z-index: 999;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 24px;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}

/* 左侧整体：头像 + 昵称UID */
.user-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* 头像原样 */
.avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #0066cc;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  cursor: pointer;
}

/* 昵称 UID 文字排版 */
.user-info {
  display: flex;
  flex-direction: column;
  line-height: 1.2;
}
.user-name {
  font-size: 14px;
  font-weight: bold;
  color: #333;
}
.user-uid {
  font-size: 12px;
  color: #888;
}

/* 右侧菜单 完全保留你原版 */
.menu {
  display: flex;
  gap: 20px;
  align-items: center;
}

/* 按钮动画 完全保留你原版 */
.btn {
  font-size: 14px;
  color: #666;
  cursor: pointer;
  transition: 0.2s;
}
.btn:hover {
  color: #222;
  background: #f5f5f5;
  padding: 6px 10px;
  border-radius: 6px;
}
.btn.active {
  color: #0066cc;
  font-weight: bold;
}

/* 退出登录 原样 */
.logout {
  color: #ff4444;
  cursor: pointer;
  font-size: 14px;
}
</style>

<div class="nav">
  <!-- 左上角：头像 + 昵称 + UID -->
  <div class="user-left" id="userWrap" style="display:none">
    <div class="avatar" id="avatar">U</div>
    <div class="user-info">
      <div class="user-name" id="username"></div>
      <div class="user-uid">UID: <span id="uid"></span></div>
    </div>
  </div>

  <!-- 右上角：导航选项 位置完全不变 -->
  <div class="menu">
    <div class="btn" onclick="location.href='index.html'">聊天室</div>
    <div class="btn" onclick="location.href='forum.html'">论坛</div>
    <div class="btn" onclick="location.href='history.html'">更新日志</div>
    <div class="btn" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
</div>

<script>
function logout() {
  if (!confirm("确定退出登录？")) return;
  localStorage.clear();
  location.href = "index.html";
}

window.onload = function() {
  let username = localStorage.getItem("username");
  let uid = localStorage.getItem("uid");

  if (username && uid) {
    document.getElementById("userWrap").style.display = "flex";
    document.getElementById("avatar").innerText = username.charAt(0).toUpperCase();
    document.getElementById("username").innerText = username;
    document.getElementById("uid").innerText = uid;

    document.getElementById("avatar").onclick = function() {
      location.href = "personal.html?uid=" + uid;
    };
  }

  let page = location.pathname.split("/").pop();
  document.querySelectorAll(".btn").forEach(btn => {
    if (btn.getAttribute("onclick").includes(page)) {
      btn.classList.add("active");
    }
  });
}
</script>
