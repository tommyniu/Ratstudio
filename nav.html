<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}

.top-nav{
  width:100%;
  height:56px;
  background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  position:fixed;
  top:0;
  left:0;
  z-index:999;
}

/* 左上角个人区域 完美排版 */
.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
  flex-shrink:0;
}
.avatar{
  width:38px;
  height:38px;
  border-radius:50%;
  background:#0066cc;
  color:#fff;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:16px;
  transition:all 0.2s ease;
}
.avatar:hover{
  opacity:0.85;
  transform:scale(1.03);
}
.user-info-mini{
  display:flex;
  flex-direction:column;
  justify-content:center;
  line-height:1.3;
}
.user-info-mini .name{
  font-size:14px;
  font-weight:bold;
  color:#222;
}
.user-info-mini span{
  font-size:12px;
  color:#888;
}

/* 右上角导航按钮 整齐居中排版 */
.nav-right{
  display:flex;
  gap:6px;
  align-items:center;
}
.nav-item{
  font-size:14px;
  color:#555;
  cursor:pointer;
  padding:8px 14px;
  border-radius:8px;
  transition:all 0.25s ease;
  white-space:nowrap;
}
/* 悬浮变灰动画 */
.nav-item:hover{
  background:#f2f2f2;
  color:#333;
}
/* 当前页面高亮 */
.nav-item.active{
  background:#e8f0fe;
  color:#0066cc;
  font-weight:500;
}

.logout-btn{
  font-size:14px;
  color:#ff4d4f;
  cursor:pointer;
  padding:8px 14px;
  border-radius:8px;
  transition:all 0.25s ease;
  margin-left:4px;
}
.logout-btn:hover{
  background:#fef0f0;
}
</style>

<div class="top-nav">
  <!-- 左上角：头像 + 昵称 + UID 排版规整 -->
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <span>UID: <span id="miniUid">1</span></span>
    </div>
  </div>

  <!-- 右上角：四个导航按钮 + 退出 -->
  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout-btn" onclick="logout()">退出</div>
  </div>
</div>

<script>
// 退出登录
function logout(){
  if(!confirm('确定退出登录？')) return;
  localStorage.clear();
  location.href = 'index.html';
}

// 初始化：显示个人信息、头像进主页、页面高亮
window.addEventListener('load',function(){
  let un = localStorage.getItem('username');
  let uid = localStorage.getItem('uid');

  if(un && uid){
    document.getElementById('userHead').style.display = 'flex';
    document.getElementById('miniName').innerText = un;
    document.getElementById('miniUid').innerText = uid;
    document.getElementById('topAvatar').innerText = un.charAt(0).toUpperCase();

    // 头像点击进入个人主页
    document.getElementById('topAvatar').onclick = function(){
      location.href = 'personal.html?uid=' + uid;
    };
  }

  // 自动高亮当前页面
  let pageName = location.pathname.split('/').pop();
  let navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => {
    if(item.getAttribute('onclick').includes(pageName)){
      item.classList.add('active');
    }
  });
});
</script>
