<style>
.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;position:fixed;top:0;left:0;z-index:999;
  gap:8px;
}
.nav-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:#0066cc;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:15px;
}
.user-info-mini{
  font-size:12px;color:#666;line-height:1.2;
  white-space:nowrap;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:13px;}

.nav-right{
  display:flex;gap:6px;align-items:center;
}
.nav-item{
  font-size:13px;color:#666;cursor:pointer;
  padding:6px 8px;border-radius:6px;
  transition:0.2s;
}
.nav-item:hover{
  background:#f5f5f5;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}

.logout{
  font-size:13px;color:#ff4444;cursor:pointer;
  padding:6px 8px;border-radius:6px;
}
</style>

<div class="top-nav">
  <div class="nav-left">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-item" onclick="location.href='home.html'">主页</div>
    <div class="nav-item" onclick="location.href='index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <div class="logout" onclick="logout()">退出登录</div>
  </div>
</div>

<script>
// 最简单、最稳定、绝对能用
function logout() {
  if(!confirm('确定退出登录？')) return;
  localStorage.clear();
  location.href='home.html';
}

// 立即执行，不等待页面加载
(function(){
  let name = localStorage.getItem('username');
  let uid  = localStorage.getItem('uid');

  if(name && uid){
    document.getElementById('topAvatar').innerText = name.charAt(0).toUpperCase();
    document.getElementById('miniName').innerText = name;
    document.getElementById('miniUid').innerText = uid;
  }

  // 高亮
  let now = location.pathname.split('/').pop();
  document.querySelectorAll('.nav-item').forEach(i=>{
    if(i.getAttribute('onclick').includes(now)) i.classList.add('active');
  });
})();
</script>
