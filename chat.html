<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei,sans-serif}
body{background:#f4f5f7;height:100vh;overflow:hidden}
#navContainer{position:fixed;top:0;left:0;width:100%;z-index:999}
.chat-container{
  margin-top:56px;
  height:calc(100% - 56px);
  display:flex;
  flex-direction:column;
  max-width:750px;
  margin-left:auto;
  margin-right:auto;
  padding:10px;
}
.chat-box{
  flex:1;
  background:#fff;
  border-radius:10px;
  padding:14px;
  overflow-y:auto;
  margin-bottom:10px;
}
.msg{
  margin-bottom:10px;
  max-width:75%;
  word-break:break-word;
}
.msg-mine{
  margin-left:auto;
  background:#0066cc;
  color:#fff;
  padding:8px 12px;
  border-radius:12px 12px 0 12px;
}
.msg-other{
  margin-right:auto;
  background:#f1f1f1;
  padding:8px 12px;
  border-radius:12px 12px 12px 0;
}
.msg-user{font-size:12px;color:#999;margin-bottom:4px}
.chat-input{
  display:flex;
  gap:8px;
}
.chat-input input{
  flex:1;
  height:44px;
  border:1px solid #e5e6eb;
  border-radius:22px;
  padding:0 16px;
  outline:none;
}
.chat-input button{
  padding:0 20px;
  background:#0066cc;
  color:#fff;
  border:none;
  border-radius:22px;
  cursor:pointer;
}
</style>
</head>

<body>
  <div id="navContainer"></div>

  <div class="chat-container">
    <div class="chat-box" id="chatBox"></div>
    <div class="chat-input">
      <input id="msgInput" placeholder="输入消息...">
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <script>
    // 加载导航
    function loadNav() {
      fetch('nav.html')
        .then(res => res.text())
        .then(html => {
          document.getElementById('navContainer').innerHTML = html;
        });
    }

    const username = localStorage.getItem('username');
    const uid = localStorage.getItem('uid');
    const chatBox = document.getElementById('chatBox');
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');

    if (!username || !uid) {
      alert('请先登录');
      location.href = 'login.html';
    }

    loadNav();
    fetchMessages();

    // 🔥 修复：发送消息只需要点一次！
    sendBtn.addEventListener('click', sendMessage);
    msgInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });

    async function fetchMessages() {
      const res = await fetch('/api?act=getChat');
      const msgs = await res.json();
      chatBox.innerHTML = '';
      msgs.forEach(m => {
        const div = document.createElement('div');
        div.className = m.uid == uid ? 'msg msg-mine' : 'msg msg-other';
        div.innerHTML = `
          <div class="msg-user">${m.user}</div>
          <div>${m.content}</div>
        `;
        chatBox.appendChild(div);
      });
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
      const content = msgInput.value.trim();
      if (!content) return;

      await fetch(`/api?act=sendChat&uid=${uid}&user=${username}&content=${encodeURIComponent(content)}`);
      msgInput.value = '';
      fetchMessages();
    }

    setInterval(fetchMessages, 3000);
  </script>
</body>
</html>
