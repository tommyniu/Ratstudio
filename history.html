<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>更新日志 - RatStudio的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

/* 页面内容样式（保留你原来的） */
.container{
  width:100%;height:calc(100% - 56px);
  margin-top:56px;padding:24px;overflow-y:auto;
}
.log-box{
  background:#fff;border:1px solid #e5e6eb;
  border-radius:12px;padding:20px;
}
.log-box h2{
  font-size:16px;color:#0066cc;margin-bottom:16px;
}
.item-log{
  padding: 10px 0;
  border-bottom:1px solid #f1f1f1;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.item-log:last-child{border-bottom:none;}
.item-log .ver{
  font-weight:bold;color:#0066cc;
  min-width:80px;
}
.item-log .date{
  margin-left:auto;color:#999;font-size:12px;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#dcdcdc;border-radius:3px}
</style>
</head>

<body>

<!-- 公共顶部导航（自动加载） -->
<div id="navContainer"></div>
<script>
fetch('nav.html')
.then(res => res.text())
.then(html => {
  document.getElementById('navContainer').innerHTML = html;
});
</script>

<!-- 页面内容（完全不变） -->
<div class="container">
  <div class="log-box">
    <h2>更新日志 | 当前版本：<span class="version-text">V1.3.4</span></h2>
    <div id="historyList"></div>
  </div>
</div>

<script src="version.js"></script>
</body>
</html>
