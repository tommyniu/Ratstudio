<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>更新日志 - RatStudio的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:fixed;top:0;left:0;z-index:999;
}
.nav-left{display:flex;align-items:center;gap:12px;}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:#0066cc;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:16px;
}
.user-info-mini{
  display:flex;flex-direction:column;
  font-size:13px;color:#666;line-height:1.2;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:14px;}

.nav-right{display:flex;gap:24px;align-items:center;}
.nav-item{
  font:14px/1 sans-serif;color:#666;cursor:pointer;
  padding:8px 12px;border-radius:8px;transition:0.2s;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}
.nav-item:hover{background:#f1f5ff;}

.container{
  width:100%;height:calc(100% - 56px);
  margin-top:56px;padding:24px;overflow-y:auto;
}
.log-box{
  background:#fff;border:1px solid #e5e6eb;
  border-radius:12px;padding:20px;
}
.log-box h2{
  font-size:16px;color:#0066cc;margin-bottom:16px;
}
.item-log{
  padding: 10px 0;
  border-bottom:1px solid #f1f1f1;
  font-size:14px;
  display:flex;
  align-items:center;
  gap:10px;
}
.item-log:last-child{border-bottom:none;}
.item-log .ver{
  font-weight:bold;color:#0066cc;
  min-width:80px;
}
.item-log .date{
  margin-left:auto;color:#999;font-size:12px;
}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#dcdcdc;border-radius:3px}
</style>
</head>
<body>

<div class="top-nav">
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item active">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
  </div>
</div>

<div class="container">
  <div class="log-box">
    <h2>更新日志 | 当前版本：<span class="version-text">V1.3.4</span></h2>
    <div id="historyList"></div>
  </div>
</div>

<script src="version.js"></script>
<script>
function getAvatarChar(name){
  if(!name) return 'U';
  return name.charAt(0).toUpperCase();
}
window.onload = () => {
  let u = localStorage.getItem('username');
  let id = localStorage.getItem('uid');
  if(u && id){
    document.getElementById('userHead').style.display = 'flex';
    document.getElementById('miniName').innerText = u;
    document.getElementById('miniUid').innerText = id;
    document.getElementById('topAvatar').innerText = getAvatarChar(u);
  }
};
</script>
</body>
</html>
