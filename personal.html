<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人主页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

.container{
  position:fixed;top:56px;left:0;
  width:100%;height:calc(100% - 56px);
  padding:20px;display:flex;justify-content:center;
  overflow-y:auto;
}

.profile{
  width:100%;max-width:500px;background:#fff;border-radius:14px;
  border:1px solid #e5e6eb;padding:24px;
}
.profile-avatar{
  width:66px;height:66px;border-radius:50%;background:#0066cc;color:#fff;
  font-size:22px;font-weight:bold;display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.profile-name{font-size:18px;font-weight:bold;margin-bottom:6px;}
.profile-uid{color:#888;margin-bottom:18px;font-size:14px;}

.profile-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;
}
.stat{
  background:#f9f9f9;border-radius:10px;padding:14px;text-align:center;
}
.stat-num{font-size:17px;font-weight:bold;color:#0066cc;margin-bottom:4px;}
.stat-label{font-size:12px;color:#888;}

.back-btn{
  background:#0066cc;color:#fff;border:none;border-radius:10px;
  padding:12px 18px;cursor:pointer;font-size:14px;width:100%;margin-top:10px;
}
</style>
</head>

<body>

<!-- 公共导航容器 -->
<div id="navContainer"></div>

<div class="container">
  <div class="profile">
    <div class="profile-avatar" id="avatarLetter">U</div>
    <div class="profile-name" id="username">加载中...</div>
    <div class="profile-uid" id="uid">UID：-</div>

    <div class="profile-stats">
      <div class="stat">
        <div class="stat-num" id="likeCount">0</div>
        <div class="stat-label">获赞数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="postCount">0</div>
        <div class="stat-label">发帖数</div>
      </div>
    </div>

    <button class="back-btn" onclick="history.back()">← 返回</button>
  </div>
</div>

<script>
// ==============================================
// 🔥 统一加载导航栏（和全站完全同步）
// ==============================================
function loadNav() {
  fetch('nav.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('navContainer').innerHTML = html;

    let u = localStorage.getItem('username');
    let uid = localStorage.getItem('uid');

    if (u && uid) {
      document.getElementById('miniName').innerText = u;
      document.getElementById('miniUid').innerText = uid;
      document.getElementById('logoutBtn').style.display = 'block';

      document.getElementById('logoutBtn').onclick = function () {
        if (confirm('确定退出登录？')) {
          localStorage.clear();
          location.href = 'index.html';
        }
      }

      document.getElementById('topAvatar').onclick = function () {
        location.href = 'personal.html?uid=' + uid;
      }
    } else {
      document.getElementById('logoutBtn').style.display = 'none';
    }
  })
}
loadNav();
</script>

<script>
const API = '/api';
function getAvatarChar(n){ return n ? n[0].toUpperCase() : 'U'; }

window.onload = async function(){
  const urlParams = new URLSearchParams(window.location.search);
  const targetUid = urlParams.get('uid');
  if(!targetUid) { location.href='index.html'; return; }

  // 读取真实用户名
  let userName = "用户"+targetUid;
  try {
    let res = await fetch(`${API}/getUser?uid=${targetUid}`);
    let data = await res.json();
    if(data && data.username) userName = data.username;
  }catch(e){}

  // 读取真实获赞数 & 发帖数
  let like = 0, post = 0;
  try {
    let res = await fetch(`${API}/userStat?uid=${targetUid}`);
    let d = await res.json();
    like = d.like || 0;
    post = d.post || 0;
  }catch(e){}

  // 渲染
  document.getElementById('avatarLetter').innerText = getAvatarChar(userName);
  document.getElementById('username').innerText = userName;
  document.getElementById('uid').innerText = "UID：" + targetUid;
  document.getElementById('likeCount').innerText = like;
  document.getElementById('postCount').innerText = post;
};
</script>

</body>
</html>
