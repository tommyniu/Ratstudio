<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人主页 - RatStudio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;position:fixed;top:0;left:0;z-index:999;
  gap:8px;
}
.nav-left{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:#0066cc;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:15px;
}
.user-info-mini{
  font-size:12px;color:#666;line-height:1.2;
  white-space:nowrap;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:13px;}

.nav-right{
  display:flex;gap:6px;align-items:center;
  flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;
}
.nav-right::-webkit-scrollbar{display:none}
.nav-item{
  font-size:13px;color:#666;cursor:pointer;
  padding:6px 8px;border-radius:6px;white-space:nowrap;flex-shrink:0;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}

.container{
  position:fixed;top:56px;left:0;
  width:100%;height:calc(100% - 56px);
  padding:20px;display:flex;justify-content:center;
  overflow-y:auto;
}

.profile{
  width:100%;max-width:500px;background:#fff;border-radius:14px;
  border:1px solid #e5e6eb;padding:24px;
}
.profile-avatar{
  width:66px;height:66px;border-radius:50%;background:#0066cc;color:#fff;
  font-size:22px;font-weight:bold;display:flex;align-items:center;justify-content:center;
  margin-bottom:14px;
}
.profile-name{font-size:18px;font-weight:bold;margin-bottom:6px;}
.profile-uid{color:#888;margin-bottom:18px;font-size:14px;}

.profile-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;
}
.stat{
  background:#f9f9f9;border-radius:10px;padding:14px;text-align:center;
}
.stat-num{font-size:17px;font-weight:bold;color:#0066cc;margin-bottom:4px;}
.stat-label{font-size:12px;color:#888;}

.back-btn{
  background:#0066cc;color:#fff;border:none;border-radius:10px;
  padding:12px 18px;cursor:pointer;font-size:14px;width:100%;
}
/* 调试用，正式可删 */
.debug{margin-top:10px;font-size:10px;color:red;word-break:break-all;}
</style>
</head>

<body>
<div class="top-nav">
  <div class="nav-left" id="userHead">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-item" onclick="location.href='/index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='/forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='/history.html'">日志</div>
    <div class="nav-item" onclick="location.href='/plan.html'">规划</div>
  </div>
</div>

<div class="container">
  <div class="profile">
    <div class="profile-avatar" id="avatarLetter">U</div>
    <div class="profile-name" id="username">加载中...</div>
    <div class="profile-uid" id="uid">UID：-</div>

    <div class="profile-stats">
      <div class="stat">
        <div class="stat-num" id="likeCount">0</div>
        <div class="stat-label">获赞数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="postCount">0</div>
        <div class="stat-label">发帖数</div>
      </div>
    </div>

    <button class="back-btn" onclick="history.back()">← 返回</button>
    <div class="debug" id="debug"></div>
  </div>
</div>

<script>
const API = '/api';
function getAvatarChar(n){ return n ? n[0].toUpperCase() : 'U'; }

window.onload = async function(){
  const urlParams = new URLSearchParams(window.location.search);
  const targetUid = urlParams.get('uid');
  const debugEl = document.getElementById('debug');

  if(!targetUid){
    debugEl.innerText = "错误：无uid参数";
    window.location.href = '/index.html';
    return;
  }

  // 顶部当前用户
  const myName = localStorage.getItem('username') || '';
  const myUid = localStorage.getItem('uid') || '';
  if(myName && myUid){
    document.getElementById('topAvatar').innerText = getAvatarChar(myName);
    document.getElementById('miniName').innerText = myName;
    document.getElementById('miniUid').innerText = myUid;
  }

  // 1. 调试：打印请求地址
  const reqUrl = `${API}/getUser?uid=${targetUid}`;
  debugEl.innerText = "请求：" + reqUrl;

  let userName = '';
  try {
    // 2. 发请求
    const res = await fetch(reqUrl);
    const text = await res.text(); // 先拿原始响应，别直接json
    debugEl.innerText += "\n响应原始：" + text;

    let data;
    try{
      data = JSON.parse(text);
      debugEl.innerText += "\n解析后：" + JSON.stringify(data);
    }catch(e){
      debugEl.innerText += "\n解析JSON失败";
    }

    // 3. 尝试多种常见字段名（后端可能写错）
    if(data){
      userName = data.username || data.user || data.name || data.nickname || '';
    }
  }catch(e){
    debugEl.innerText += "\n请求异常：" + e.message;
  }

  // 4. 兜底
  if(!userName) userName = '未知用户';

  // 5. 统计
  let like = 0, post = 0;
  try {
    const res = await fetch(`${API}/userStat?uid=${targetUid}`);
    const stat = await res.json();
    like = stat.like || 0;
    post = stat.post || 0;
  }catch(e){}

  // 6. 渲染
  document.getElementById('avatarLetter').innerText = getAvatarChar(userName);
  document.getElementById('username').innerText = userName;
  document.getElementById('uid').innerText = 'UID：' + targetUid;
  document.getElementById('likeCount').innerText = like;
  document.getElementById('postCount').innerText = post;
};
</script>
</body>
</html>
