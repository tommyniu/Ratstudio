<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>个人主页 - RatStudio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:fixed;top:0;left:0;z-index:999;
}
.nav-left{display:flex;align-items:center;gap:12px;}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:#0066cc;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:16px;cursor:pointer;
}
.user-info-mini{
  display:flex;flex-direction:column;
  font-size:13px;color:#666;line-height:1.2;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:14px;}

.nav-right{display:flex;gap:24px;align-items:center;}
.nav-item{
  font:14px/1 sans-serif;color:#666;cursor:pointer;
  padding:8px 12px;border-radius:8px;transition:0.2s;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}

.container{
  position:fixed;top:56px;left:0;
  width:100%;height:calc(100% - 56px);
  padding:30px;display:flex;justify-content:center;
  overflow-y:auto;
}

.profile{
  width:100%;max-width:600px;background:#fff;border-radius:16px;
  border:1px solid #e5e6eb;padding:30px;
}
.profile-avatar{
  width:70px;height:70px;border-radius:50%;background:#0066cc;color:#fff;
  font-size:24px;font-weight:bold;display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}
.profile-name{font-size:20px;font-weight:bold;margin-bottom:6px;}
.profile-uid{color:#888;margin-bottom:20px;}

.profile-stats{
  display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px;
}
.stat{
  background:#f9f9f9;border-radius:10px;padding:14px;text-align:center;
}
.stat-num{font-size:18px;font-weight:bold;color:#0066cc;margin-bottom:4px;}
.stat-label{font-size:12px;color:#888;}

.back-btn{
  background:#0066cc;color:#fff;border:none;border-radius:10px;
  padding:12px 20px;cursor:pointer;font-size:14px;
}
</style>
</head>

<body>
<div class="top-nav">
  <div class="nav-left" id="userHead">
    <div class="avatar" id="topAvatar" onclick="goMyHome()">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-item" onclick="location.href='index.html'">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
  </div>
</div>

<div class="container">
  <div class="profile">
    <div class="profile-avatar" id="avatarLetter">U</div>
    <div class="profile-name" id="username">Loading...</div>
    <div class="profile-uid" id="uid">UID：-</div>

    <div class="profile-stats">
      <div class="stat">
        <div class="stat-num" id="likeCount">0</div>
        <div class="stat-label">获赞数</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="postCount">0</div>
        <div class="stat-label">发帖数</div>
      </div>
    </div>

    <button class="back-btn" onclick="history.back()">← 返回</button>
  </div>
</div>

<script>
function getAvatarChar(n){ return n?n[0].toUpperCase():'U' }

window.onload = async function(){
  const urlParams = new URLSearchParams(window.location.search);
  const uid = urlParams.get('uid') || localStorage.getItem('uid');
  if(!uid){ alert('请先登录'); location.href='index.html' }

  const u = localStorage.getItem('username');
  document.getElementById('topAvatar').innerText = getAvatarChar(u);
  document.getElementById('miniName').innerText = u;
  document.getElementById('miniUid').innerText = localStorage.getItem('uid');

  document.getElementById('avatarLetter').innerText = getAvatarChar(u);
  document.getElementById('username').innerText = u;
  document.getElementById('uid').innerText = 'UID：'+uid;

  // 模拟统计
  document.getElementById('likeCount').innerText = '126';
  document.getElementById('postCount').innerText = '18';
}

function goMyHome(){
  location.href='personal.html?uid='+localStorage.getItem('uid');
}
</script>
</body>
</html>
