<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio的小站</title>
<style>
body{background:#0f1419;color:#fff;font-family:system-ui;margin:0}
#container{max-width:600px;margin:20px auto;border:1px solid #333;border-radius:16px;overflow:hidden}
#login{padding:20px}
#chat{display:none}
#userInfo{padding:12px;background:#1a1c25;border-bottom:1px solid #333}
#msgBox{height:400px;overflow-y:auto;padding:10px;background:#0b0f14}
.msg{margin:8px 0;padding:8px 12px;border-radius:12px;background:#222;max-width:70%}
.me{background:#2b5cb8;margin-left:auto}
#inputArea{display:flex;padding:10px;background:#1a1c25}
#msgInput{flex:1;padding:10px;border-radius:20px;border:none;background:#2b2d3a;color:#fff;outline:none}
button{margin-left:8px;padding:10px 16px;border-radius:20px;border:none;background:#4080ff;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div id="container">
  <div id="login">
    <h2>登录</h2>
    <input id="user" placeholder="用户名"><br><br>
    <input id="pwd" type="password" placeholder="密码"><br><br>
    <button onclick="doLogin()">登录</button>
    <button onclick="doReg()">注册</button>
  </div>

  <div id="chat">
    <div id="userInfo"></div>
    <div id="msgBox"></div>
    <div id="inputArea">
      <input id="msgInput" placeholder="输入消息">
      <button onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
const API="/api/chat";
let username="",uid="";

window.onload=()=>{
  let u=localStorage.getItem("username");
  let id=localStorage.getItem("uid");
  if(u&&id){
    username=u;uid=id;
    loginOk();
  }
};

async function doLogin(){
  let user=document.getElementById("user").value;
  let pwd=document.getElementById("pwd").value;
  let res=await fetch(`${API}?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
  let t=await res.text();
  if(!t)return alert("登录失败");
  localStorage.setItem("username",user);
  localStorage.setItem("uid",t);
  username=user;uid=t;
  loginOk();
}

async function doReg(){
  let user=document.getElementById("user").value;
  let pwd=document.getElementById("pwd").value;
  let res=await fetch(`${API}?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
  let t=await res.text();
  alert(t==="ok"?"注册成功":"已存在");
}

function loginOk(){
  document.getElementById("login").style.display="none";
  document.getElementById("chat").style.display="block";
  document.getElementById("userInfo").innerText=`${username} (${uid})`;
  loadMsg();
  setInterval(loadMsg,2000); // 2秒刷新一次
}

async function sendMsg(){
  let txt=document.getElementById("msgInput").value.trim();
  if(!txt)return;
  await fetch(`${API}?act=send&uid=${uid}&msg=${encodeURIComponent(txt)}`);
  document.getElementById("msgInput").value="";
  loadMsg();
}

async function loadMsg(){
  let res=await fetch(`${API}?act=msg&_=${Date.now()}`);
  let list=await res.json();
  let box=document.getElementById("msgBox");
  box.innerHTML="";
  list.forEach(m=>{
    let d=document.createElement("div");
    d.className="msg "+(m.uid==uid?"me":"");
    d.innerText=`${m.user}: ${m.msg}`;
    box.appendChild(d);
  });
  box.scrollTop=box.scrollHeight;
}
</script>
</body>
</html>
