<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>全局聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0f14;color:#eee;font-family:system-ui}
.container{max-width:680px;margin:40px auto;padding:20px}
h2{text-align:center;margin-bottom:20px;color:#58a6ff}
#msgList{height:500px;overflow-y:auto;padding:10px;background:rgba(255,255,255,0.05);border-radius:16px;margin-bottom:15px}
.msgItem{padding:8px 12px;margin:6px 0;border-radius:12px;background:rgba(255,255,255,0.07)}
.userName{color:#58a6ff;font-weight:bold;margin-right:6px}
.inputWrap{display:flex;gap:10px;align-items:center}
#nick{width:120px;padding:10px;border-radius:12px;border:none;background:#222;color:#fff}
#input{flex:1;padding:10px;border-radius:12px;border:none;background:#222;color:#fff}
#send{padding:10px 20px;border-radius:12px;border:none;background:#2383ff;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <h2>RatStudio 全局聊天室</h2>
  <div id="msgList"></div>
  <div class="inputWrap">
    <input id="nick" placeholder="昵称" value="游客">
    <input id="input" placeholder="输入消息...">
    <button id="send" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
let nickEl = document.getElementById('nick');
let inputEl = document.getElementById('input');
let listEl = document.getElementById('msgList');

// 拉取消息
async function getMsg(){
  let res = await fetch('/api/chat');
  let data = await res.json();
  listEl.innerHTML = '';
  data.forEach(item=>{
    let div = document.createElement('div');
    div.className = 'msgItem';
    div.innerHTML = `<span class="userName">${item.user}：</span>${item.msg}`;
    listEl.appendChild(div);
  });
  listEl.scrollTop = listEl.scrollHeight;
}

// 发消息
async function sendMsg(){
  let nick = nickEl.value.trim() || '游客';
  let msg = inputEl.value.trim();
  if(!msg) return;
  await fetch('/api/chat',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({user:nick,msg})
  });
  inputEl.value = '';
  getMsg();
}

// 2秒刷新一次
setInterval(getMsg,2000);
getMsg();
</script>
</body>
</html>
