<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:linear-gradient(135deg,#0f1419,#0a0c12);height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:680px;height:750px;border-radius:44px;overflow:hidden;background:rgba(255,255,255,.04);backdrop-filter:blur(30px);border:1px solid #fff3;box-shadow:0 0 40px #4080ff33}
.sidebar{width:140px;background:#fff1;padding:30px 10px;display:flex;flex-direction:column;gap:10px}
.item{padding:14px;border-radius:16px;color:#fff;cursor:pointer}
.item.active{background:#4080ff44}
.main{flex:1;display:flex;flex-direction:column}
.top{padding:20px;background:#fff1;color:#fff}
.user-info{padding:12px 20px;color:#ccc}
.msg-box{flex:1;padding:20px;overflow-y:auto}
.msg-item{margin-bottom:16px;display:flex}
.msg-item.me{justify-content:flex-end}
.bubble{padding:10px 14px;border-radius:18px;background:#fff1;color:#fff}
.msg-item.me .bubble{background:#4080ff33}
.uid{font-size:11px;color:#fff6;margin-top:4px}
.input-box{height:70px;padding:0 20px;display:flex;align-items:center;gap:10px;background:#0f1419}
#msgInput{flex:1;height:44px;border-radius:24px;padding:0 16px;background:#262833;border:1px solid #fff3;color:#fff}
button{width:70px;height:44px;border-radius:24px;background:#4080ff;color:#fff;border:none}
.version{position:absolute;right:20px;bottom:15px;color:#fff8;font-size:12px}
.admin-tag{color:#ff5555;font-size:11px;margin-left:6px}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="item active" onclick="location.href='index.html'">聊天室</div>
<div class="item" onclick="location.href='forum.html'">论坛</div>
<div class="item" onclick="location.href='history.html'">更新日志</div>
<div class="item" onclick="location.href='plan.html'">开发规划</div>
</div>
<div class="main">
<div class="top">聊天室</div>

<div class="login" id="loginPage" style="padding:30px;display:flex;flex-direction:column;gap:12px">
<input id="user" placeholder="账号" style="padding:12px;border-radius:16px;background:#262833;border:1px solid #fff3;color:#fff">
<input id="pwd" placeholder="密码" type="password" style="padding:12px;border-radius:16px;background:#262833;border:1px solid #fff3;color:#fff">
<button onclick="login()">登录</button>
<button onclick="reg()">注册</button>
</div>

<div class="chat" id="chatPage" style="display:none;flex-direction:column;flex:1">
<div class="user-info"><span id="uname"></span></div>
<div class="msg-box" id="msgBox"></div>
</div>

<div class="input-box">
<input id="msgInput" placeholder="输入消息">
<button onclick="sendMsg()">发送</button>
</div>

<div class="version">V1.3.2</div>
</div>
</div>

<script>
let username = "";
let uid = "";
const ADMIN = "Ratstudio";

window.onload = async () => {
  let u = localStorage.getItem("username");
  let id = localStorage.getItem("uid");
  if (u && id) {
    username = u;
    uid = id;
    showChat();
    loadMsg();
  }
};

async function login() {
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  let r = await fetch(`/api?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
  let t = await r.text();
  if (!t) return alert("失败");
  localStorage.setItem("username", user);
  localStorage.setItem("uid", t);
  username = user;
  uid = t;
  showChat();
  loadMsg();
}

async function reg() {
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  let r = await fetch(`/api?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
  let t = await r.text();
  alert(t === "ok" ? "成功" : "失败");
}

function showChat() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("chatPage").style.display = "flex";
  document.getElementById("uname").innerText = username + " (" + uid + ")";
}

async function sendMsg() {
  let txt = document.getElementById("msgInput").value;
  if (!txt) return;
  await fetch(`/api?act=send&uid=${uid}&msg=${encodeURIComponent(txt)}`);
  document.getElementById("msgInput").value = "";
  loadMsg();
}

async function loadMsg() {
  let r = await fetch("/api?act=msg");
  let list = await r.json();
  let box = document.getElementById("msgBox");
  box.innerHTML = "";
  list.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg-item " + (m.uid == uid ? "me" : "");
    let adminTag = m.user === ADMIN ? '<span class="admin-tag">管理员</span>' : "";
    div.innerHTML = `
      <div class="msg-wrap">
        <div class="username">${m.user}${adminTag}</div>
        <div class="bubble">${m.msg}</div>
        <div class="uid">UID:${m.uid}</div>
      </div>`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}
</script>
</body>
</html>
