<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:fixed;top:0;left:0;z-index:999;
}
.nav-left{display:flex;align-items:center;gap:12px;}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:#0066cc;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:16px;
}
.user-info-mini{
  display:flex;flex-direction:column;
  font-size:13px;color:#666;line-height:1.2;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:14px;}

.nav-right{display:flex;gap:24px;align-items:center;}
.nav-item{
  font:14px/1 sans-serif;color:#666;cursor:pointer;
  padding:8px 12px;border-radius:8px;transition:0.2s;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}

#app{
  position:fixed;top:56px;left:0;
  width:100%;height:calc(100% - 56px);
  display:flex;flex-direction:column;
}

#msgBox{
  flex:1;padding:20px 24px;overflow-y:auto;background:#f9f9f9;
}

.message{
  display:flex;gap:10px;margin-bottom:16px;
  max-width:68%;align-items:flex-start;
}
.message.me{
  margin-left:auto;
  flex-direction:row-reverse;
}

.msg-avatar{
  width:34px;height:34px;border-radius:50%;cursor:pointer;
  background:#0066cc;color:#fff;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:bold;
}

.msg-content{
  display:flex;flex-direction:column;
  max-width:calc(100% - 50px);
}

.msg-name{
  font-size:12px;color:#888;margin-bottom:4px;
  display:flex;align-items:center;gap:6px;
}
.message.me .msg-name{
  justify-content:flex-end;
}

.msg-bubble{
  padding:10px 14px;background:#fff;border:1px solid #e5e6eb;
  border-radius:12px;font-size:14px;line-height:1.5;
  width:fit-content;max-width:100%;word-break:break-all;
}
.message.me .msg-bubble{
  background:#0066cc;color:#fff;border-color:#0066cc;
  margin-left:auto;
}

.admin-tag{background:#ff4d4f;color:#fff;font-size:10px;padding:1px 4px;border-radius:3px}
.withdraw-btn{font-size:12px;color:#ff4d4f;background:none;border:none;cursor:pointer}

#inputBar{
  height:72px;background:#fff;border-top:1px solid #e5e6eb;
  display:flex;align-items:center;gap:12px;padding:0 24px;flex-shrink:0;
}
#msgInput{
  flex:1;height:44px;padding:0 18px;
  border:1px solid #e5e6eb;border-radius:10px;
  background:#fafafa;outline:none;
}
.send-btn{
  width:78px;height:44px;background:#0066cc;color:#fff;
  border:none;border-radius:10px;cursor:pointer;
}

.login-box{
  max-width:380px;margin:60px auto;padding:28px;
  background:#fff;border:1px solid #e5e6eb;border-radius:12px;
}
.login-box input{
  width:100%;height:44px;padding:0 16px;margin-bottom:16px;
  border:1px solid #e5e6eb;border-radius:10px;outline:none;
}
.login-box button{
  width:100%;height:44px;background:#0066cc;color:#fff;
  border:none;border-radius:10px;cursor:pointer;margin-top:8px;
}
.login-box button:last-of-type{background:#f1f2f3;color:#333;}
</style>
</head>

<body>
<div class="top-nav">
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar" id="topAvatar" onclick="goHome()">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-item active">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
  </div>
</div>

<div id="app">
  <div id="loginPage" class="login-box">
    <input id="user" placeholder="账号">
    <input id="pwd" placeholder="密码" type="password">
    <button onclick="login()">登录</button>
    <button onclick="reg()">注册</button>
  </div>

  <div id="chatPage" style="display:none;flex-direction:column;width:100%;height:100%;">
    <div id="msgBox"></div>
    <div id="inputBar">
      <input id="msgInput" placeholder="输入消息...">
      <button class="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
const ADMIN = [1];
const API = '/api';
let me, uid;

function ava(n){ return n?n[0].toUpperCase():'U' }
function admin(id){ return ADMIN.includes(Number(id)) }
function goHome(){ location.href='/users/'+uid }

window.onload=()=>{
  me=localStorage.getItem('username');
  uid=localStorage.getItem('uid');
  if(me&&uid) showChat();
  setInterval(loadMsg,2000);
}

function showChat(){
  loginPage.style.display='none';
  chatPage.style.display='flex';
  userHead.style.display='flex';
  miniName.innerText=me;
  miniUid.innerText=uid;
  topAvatar.innerText=ava(me);
  loadMsg();
}

async function login(){
  let u=user.value,p=pwd.value;
  let t=await (await fetch(API+'/login?user='+u+'&pwd='+p)).text();
  if(!t)return alert('失败');
  localStorage.setItem('username',u);
  localStorage.setItem('uid',t);
  location.reload();
}

async function reg(){
  let u=user.value,p=pwd.value;
  let t=await (await fetch(API+'/reg?user='+u+'&pwd='+p)).text();
  alert(t=='ok'?'成功':'失败');
}

async function sendMsg(){
  let m=msgInput.value.trim();
  if(!m)return;
  await fetch(API+'/send?uid='+uid+'&msg='+encodeURIComponent(m));
  msgInput.value='';
  loadMsg();
}

async function loadMsg(){
  let list=await(await fetch(API+'/msg')).json();
  let b=msgBox;
  let auto=Math.abs(b.scrollTop+b.clientHeight-b.scrollHeight)<20;
  b.innerHTML='';
  list.forEach(o=>{
    let isMe=o.uid==uid;
    b.innerHTML+=`
    <div class="message ${isMe?'me':''}">
      <div class="msg-avatar" onclick="location.href='/users/${o.uid}'">${ava(o.user)}</div>
      <div class="msg-content">
        <div class="msg-name">${o.user} ${admin(o.uid)?'<span class=admin-tag>管理员</span>':''} ${isMe||admin(uid)?'<button onclick=withdraw(${o.id}) class=withdraw-btn>撤回</button>':''}</div>
        <div class="msg-bubble">${o.msg}</div>
      </div>
    </div>`;
  });
  if(auto)b.scrollTop=b.scrollHeight;
}

async function withdraw(id){
  if(!confirm('撤回？'))return;
  await fetch(API+'?act=deleteMsg&uid='+uid+'&targetId='+id);
  loadMsg();
}
</script>
</body>
</html>
