<script>
// 加载导航栏并主动更新状态
fetch('nav.html')
.then(res => res.text())
.then(html => {
  document.getElementById('navContainer').innerHTML = html;
  // 导航栏加载完成后，主动更新用户信息
  updateNavUserState();
});

// 主动更新导航栏用户状态的函数
function updateNavUserState() {
  const u = localStorage.getItem('username');
  const uid = localStorage.getItem('uid');

  // 等导航栏DOM渲染完成再执行
  setTimeout(() => {
    const avatar = document.getElementById('topAvatar');
    const nameEl = document.getElementById('miniName');
    const uidEl = document.getElementById('miniUid');
    const logoutBtn = document.getElementById('logoutBtn');

    if (avatar && nameEl && uidEl && logoutBtn) {
      if (u && uid) {
        avatar.innerText = u.charAt(0).toUpperCase();
        nameEl.innerText = u;
        uidEl.innerText = uid;
        logoutBtn.style.display = 'block';
        // 绑定退出事件
        logoutBtn.onclick = () => {
          if (confirm('确定退出登录？')) {
            localStorage.clear();
            location.href = 'index.html';
          }
        };
        // 绑定头像跳转
        avatar.onclick = () => {
          location.href = 'personal.html?uid=' + uid;
        };
      } else {
        avatar.innerText = 'U';
        nameEl.innerText = '游客';
        uidEl.innerText = '未登录';
        logoutBtn.style.display = 'none';
      }
    }
  }, 100); // 给DOM渲染100ms缓冲时间
}

// 用户名
let u = localStorage.getItem('username')
if(u) document.getElementById('nick').innerText = u

// ========== 1. OpenClaw 风随机提示语 ==========
const openclawStyleMsgs = [
  "系统就绪，愿今天的代码无BUG。",
  "一切正常，开始你的创作吧。",
  "终端已唤醒，任务加载完成。",
  "环境准备完毕，随时可以开工。",
  "服务运行中，祝你思路清晰。",
  "初始化完成，今日状态：稳定。",
  "像 OpenClaw 一样，随时待命。"
]
document.getElementById('randomMsg').innerText = 
  openclawStyleMsgs[Math.floor(Math.random() * openclawStyleMsgs.length)]

// ========== 2. 从 forum.html 抓取真实帖子（可点击） ==========
let realPosts = []

// 先拉取论坛页，解析真实帖子列表
fetch('forum.html')
.then(res=>res.text())
.then(html=>{
  let div = document.createElement('div')
  div.innerHTML = html
  div.querySelectorAll('a.post-link').forEach(a=>{
    realPosts.push({
      title: a.innerText.trim(),
      link: a.getAttribute('href'),
      info: "来自论坛"
    })
  })
})

// 随机抽取真实帖子
document.getElementById('randomBtn').onclick = function(){
  if(realPosts.length === 0){
    document.getElementById('randomPost').innerHTML = `<div class="post-item">暂无帖子数据，请先访问论坛</div>`
    return
  }
  let p = realPosts[Math.floor(Math.random() * realPosts.length)]
  document.getElementById('randomPost').innerHTML = `
    <div class="post-item">
      <div class="title"><a href="${p.link}">${p.title}</a></div>
      <div class="info">${p.info}</div>
    </div>
  `
}
</script>
