<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio的小站</title>
<style>
/* ========== 全局 B 站风格：小圆角 + 清爽全屏 ========== */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

/* ========== 顶部导航栏（原侧边栏移到这里） ========== */
.top-nav{
  width:100%;
  height:56px;
  background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  position:fixed;
  top:0;
  left:0;
  z-index:999;
}

/* 左上角：头像 + 昵称 + UID */
.nav-left{
  display:flex;
  align-items:center;
  gap:12px;
}
.avatar{
  width:36px;
  height:36px;
  border-radius:50%;
  background:#0066cc;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}
.user-info-mini{
  display:flex;
  flex-direction:column;
  font-size:12px;
  color:#666;
  line-height:1.3;
}
.user-info-mini .name{
  font-weight:bold;
  color:#333;
}

/* 右上角：导航菜单 */
.nav-right{
  display:flex;
  gap:18px;
  align-items:center;
}
.nav-item{
  font-size:14px;
  color:#666;
  cursor:pointer;
  padding:6px 10px;
  border-radius:6px;
}
.nav-item.active{
  color:#0066cc;
  background:#e8f0fe;
}
.nav-item:hover{
  background:#f1f5ff;
}

/* UI 切换按钮 */
.ui-toggle{
  padding:6px 12px;
  background:#f1f2f3;
  border:1px solid #e5e6eb;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
}

/* ========== 主内容区 ========== */
.container{
  width:100%;
  height:calc(100% - 56px);
  margin-top:56px;
  display:flex;
  flex-direction:column;
  background:#f1f2f3;
}

/* 聊天区域 */
.chat-wrap{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* 消息列表 */
.msg-box{
  flex:1;
  padding:16px 24px;
  overflow-y:auto;
  background:#f9f9f9;
}
.msg-item{
  margin-bottom:12px;
  max-width:75%;
  display:flex;
  flex-direction:column;
}
.msg-item.me{
  margin-left:auto;
  align-items:flex-end;
}
.msg-name{
  font-size:12px;
  color:#888;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:6px;
}
.msg-bubble{
  padding:10px 14px;
  background:#fff;
  border:1px solid #e5e6eb;
  border-radius:8px; /* B 站小圆角 */
  font-size:14px;
  line-height:1.5;
  white-space:pre-wrap;
  word-break:break-all;
}
.msg-item.me .msg-bubble{
  background:#0066cc;
  color:#fff;
  border-color:#0066cc;
}
.revoke-btn{
  font-size:12px;
  color:#ff4d4f;
  background:none;
  border:none;
  cursor:pointer;
}

/* 输入框区域（保留小圆角） */
.input-wrap{
  height:60px;
  background:#fff;
  border-top:1px solid #e5e6eb;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 20px;
}
#msgInput{
  flex:1;
  height:38px;
  padding:0 14px;
  border:1px solid #e5e6eb;
  border-radius:8px;
  background:#fafafa;
  outline:none;
  font-size:14px;
}
.send-btn{
  width:70px;
  height:38px;
  background:#0066cc;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
}

/* 登录界面 */
.login-box{
  width:100%;
  max-width:360px;
  margin:80px auto;
  padding:24px;
  background:#fff;
  border:1px solid #e5e6eb;
  border-radius:12px;
}
.login-box input{
  width:100%;
  height:40px;
  padding:0 12px;
  margin-bottom:12px;
  border:1px solid #e5e6eb;
  border-radius:8px;
  outline:none;
}
.login-box button{
  width:100%;
  height:40px;
  background:#0066cc;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:6px;
}

/* 旧版 UI 完全保留你原版 */
body.old-ui{
  background:linear-gradient(135deg,#0f1419,#0a0c12);
}
body.old-ui .top-nav{
  background:rgba(255,255,255,.05);
  border-color:rgba(255,255,255,.08);
}
body.old-ui .nav-item{
  color:rgba(255,255,255,.8);
}
body.old-ui .ui-toggle{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.2);
  color:#fff;
}
body.old-ui .msg-box{
  background:transparent;
}
body.old-ui .msg-bubble{
  background:rgba(255,255,255,.07);
  border-color:rgba(255,255,255,.12);
  color:#fff;
}
body.old-ui .input-wrap{
  background:#0f1419;
  border-color:rgba(255,255,255,.08);
}
body.old-ui #msgInput{
  background:#262833;
  border-color:rgba(255,255,255,.15);
  color:#fff;
}

/* 滚动条美化 */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px}
</style>
</head>

<body>
<!-- 顶部导航：左上角头像+昵称+UID，右上角菜单 -->
<div class="top-nav">
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>

  <div class="nav-right">
    <div class="nav-item active">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
    <button class="ui-toggle" id="uiBtn" onclick="toggleUI()">旧版UI</button>
  </div>
</div>

<div class="container">
  <!-- 登录界面 -->
  <div id="loginPage" class="login-box" style="display:none">
    <input id="user" placeholder="账号">
    <input id="pwd" placeholder="密码" type="password">
    <button onclick="login()">登录</button>
    <button onclick="reg()" style="background:#f1f2f3;color:#333;margin-top:8px">注册</button>
  </div>

  <!-- 聊天界面 -->
  <div id="chatPage" class="chat-wrap" style="display:none">
    <div class="msg-box" id="msgBox"></div>
    <div class="input-wrap">
      <input id="msgInput" placeholder="输入消息..." autocomplete="off">
      <button class="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
const uiBtn = document.getElementById('uiBtn');
let username = '', uid = '';
const API = '/api';
let lastCount = 0;

// UI 切换
function toggleUI(){
  document.body.classList.toggle('old-ui');
  let old = document.body.classList.contains('old-ui');
  localStorage.setItem('ui', old);
  uiBtn.innerText = old ? '新版UI' : '旧版UI';
}

// 初始化
window.onload = () => {
  let old = localStorage.getItem('ui') === 'true';
  if(old){
    document.body.classList.add('old-ui');
    uiBtn.innerText = '新版UI';
  }
  checkLogin();
  setInterval(loadMsg, 2000);
};

// 登录状态
function checkLogin(){
  let u = localStorage.getItem('username');
  let id = localStorage.getItem('uid');
  if(u && id){
    username = u;
    uid = id;
    showChat();
  }else{
    showLogin();
  }
}

function showLogin(){
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('chatPage').style.display = 'none';
  document.getElementById('userHead').style.display = 'none';
}
function showChat(){
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('chatPage').style.display = 'flex';
  document.getElementById('userHead').style.display = 'flex';
  document.getElementById('miniName').innerText = username;
  document.getElementById('miniUid').innerText = uid;
  loadMsg();
}

// 登录注册
async function login(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  if(!u||!p)return alert('请输入账号密码');
  let res = await fetch(`${API}/login?user=${u}&pwd=${p}`);
  let t = await res.text();
  if(!t)return alert('登录失败');
  localStorage.setItem('username',u);
  localStorage.setItem('uid',t);
  username=u;uid=t;
  showChat();
}
async function reg(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  let res = await fetch(`${API}/reg?user=${u}&pwd=${p}`);
  alert(await res.text() === 'ok' ? '成功' : '失败');
}

// 发送消息
async function sendMsg(){
  let txt = document.getElementById('msgInput').value.trim();
  if(!txt)return;
  await fetch(`${API}/send?uid=${uid}&msg=${txt}`);
  document.getElementById('msgInput').value = '';
  loadMsg();
}

// 加载消息（已删除尾部空白）
async function loadMsg(){
  let res = await fetch(`${API}/msg`);
  let list = await res.json();
  let box = document.getElementById('msgBox');

  let autoScroll = Math.abs(box.scrollTop + box.clientHeight - box.scrollHeight) < 10;
  
  box.innerHTML = '';
  list.forEach(m => {
    let me = m.uid == uid;
    let del = (me || uid == 1) ? `<button class="revoke-btn" onclick="rev(${m.id})">撤回</button>` : '';

    let html = `
      <div class="msg-item ${me?'me':''}">
        <div class="msg-name">${m.user} ${del}</div>
        <div class="msg-bubble">${m.msg}</div>
      </div>
    `;
    box.innerHTML += html;
  });

  if(autoScroll) box.scrollTop = box.scrollHeight;
}

async function rev(id){
  if(!confirm('确定撤回？'))return;
  await fetch(`${API}?act=deleteMsg&uid=${uid}&targetId=${id}`);
  loadMsg();
}
</script>
</body>
</html>
