<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 - Ratstudio的小站</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui
        }
        body {
            background: linear-gradient(135deg, #0f1419, #0a0c12);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            display: flex;
            width: 680px;
            height: 750px;
            border-radius: 44px;
            overflow: hidden;
            background: rgba(255, 255, 255, .04);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 0 50px rgba(60, 120, 255, 0.25);
        }
        .sidebar {
            width: 140px;
            background: rgba(255, 255, 255, .05);
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid rgba(255, 255, 255, .08);
            border-radius: 44px 0 0 44px;
        }
        .item {
            padding: 14px;
            border-radius: 9999px;
            color: rgba(255, 255, 255, .8);
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid transparent;
        }
        .item:hover, .item.active {
            background: rgba(60, 130, 255, .25);
            color: #fff;
            border-color: rgba(100, 160, 255, .4);
            box-shadow: 0 0 12px rgba(80, 140, 255, .35);
        }
        .main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .top {
            background: rgba(255, 255, 255, .05);
            padding: 20px;
            color: #fff;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }
        .login {
            padding: 30px;
            flex: 1;
            overflow-y: auto;
        }
        .chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .user-info {
            padding: 12px 20px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .msg-box {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }
        .msg-item {
            max-width: 75%;
            width: fit-content;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .msg-item.me {
            margin-left: auto;
        }
        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .msg-item.me .name-row {
            flex-direction: row-reverse;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: #444;
            border-radius: 50%;
        }
        .username {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
        }
        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .msg-item.me .bubble {
            background: rgba(60, 120, 255, .25);
            margin-left: auto;
        }
        .uid {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }
        .msg-item.me .uid {
            text-align: right;
        }
        .input-box {
            display: flex;
            padding: 16px 20px;
            gap: 10px;
            align-items: center;
            background: rgba(255, 255, 255, .05);
            border-top: 1px solid rgba(255, 255, 255, .08);
        }
        #msgInput {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            border-radius: 24px;
            background: #262833;
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
            outline: none;
        }
        .input-box button {
            width: 70px;
            height: 44px;
            border-radius: 24px;
            background: #4080ff;
            color: #fff;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .admin-btn {
            background: rgba(255, 80, 80, .3);
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            margin-left: 6px;
        }
        .admin-tag {
            position: absolute;
            left: 20px;
            bottom: 12px;
            color: #ff4d4d;
            font-size: 12px;
            text-shadow: 0 0 6px #ff4d4d;
            display: none;
        }
        .version {
            position: absolute;
            right: 18px;
            bottom: 12px;
            color: #888;
            font-size: 12px;
        }
        input, button.login-reg {
            border-radius: 16px;
            padding: 12px;
            background: #262833;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 10px;
            width: 100%;
            font-size: 15px;
            outline: none;
        }
        button.login-reg {
            background: #4080ff;
            cursor: pointer;
            font-weight: 500;
        }
        .auto-login {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="item active">聊天室</div>
        <div class="item" onclick="alert('开发中')">论坛</div>
        <div class="item" onclick="alert('开发中')">更新日志</div>
        <div class="item" onclick="alert('开发中')">开发规划</div>
    </div>
    <div class="main">
        <div class="top"><span>聊天室</span></div>
        <div class="login" id="loginPage">
            <input id="user" placeholder="账号">
            <input id="pwd" placeholder="密码" type="password">
            <div class="auto-login">
                <input type="checkbox" id="autoLogin"> 10天自动登录
            </div>
            <button class="login-reg" onclick="reg()">注册</button>
            <button class="login-reg" onclick="login()">登录</button>
        </div>
        <div class="chat" id="chatPage">
            <div class="user-info">
                <span id="userInfoText"></span>
                <div>
                    <button class="admin-btn" id="clearBtn" style="display:none;" onclick="clearAllMsg()">清空</button>
                    <button class="admin-btn" id="delBtn" style="display:none;" onclick="deleteLastMsg()">撤回</button>
                </div>
            </div>
            <div class="msg-box" id="msgBox"></div>
            <div class="input-box">
                <input id="msgInput" placeholder="输入消息...">
                <button onclick="sendMsg()">发送</button>
            </div>
        </div>
        <div class="admin-tag" id="adminTag">管理员</div>
        <div class="version">V1.4.1（UID修复）</div>
    </div>
</div>
<script>
    let username = "";
    let uid = 0;

    // 清除异常缓存
    function clearBadCache() {
        localStorage.removeItem("username");
        localStorage.removeItem("uid");
        localStorage.removeItem("autoLogin");
        alert("本地缓存异常，已重置，请重新登录");
    }

    window.onload = async function () {
        const autoLogin = localStorage.getItem("autoLogin") === "true";
        const savedUser = localStorage.getItem("username") || "";
        const savedUid = parseInt(localStorage.getItem("uid") || "0");

        // 前端强校验UID
        if (autoLogin && savedUser && !isNaN(savedUid) && savedUid > 0) {
            username = savedUser;
            uid = savedUid;
            loginSuccess();
        } else if (autoLogin && (isNaN(savedUid) || savedUid <= 0)) {
            clearBadCache(); // 异常则清缓存
        }
    };

    async function login() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        const auto = document.getElementById("autoLogin").checked;
        if (!user || !pwd) return alert("请输入账号密码");

        const res = await fetch(`/api/chat?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        const data = await res.json();
        if (data.ok) {
            const parsedUid = parseInt(data.uid || "0");
            if (isNaN(parsedUid) || parsedUid <= 0) {
                return alert("登录异常：UID无效，请重试");
            }
            username = user;
            uid = parsedUid;

            if (auto) {
                localStorage.setItem("username", username);
                localStorage.setItem("uid", String(uid));
                localStorage.setItem("autoLogin", "true");
            }
            loginSuccess();
        } else {
            alert("账号或密码错误");
        }
    }

    async function reg() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        if (!user || !pwd) return alert("请输入账号密码");
        const res = await fetch(`/api/chat?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        const data = await res.json();
        alert(data.ok ? "注册成功" : "用户名已存在");
    }

    function loginSuccess() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "flex";
        document.getElementById("userInfoText").innerText = `${username} (UID:${uid})`;
        if (username === "Ratstudio") {
            document.getElementById("clearBtn").style.display = "inline-block";
            document.getElementById("delBtn").style.display = "inline-block";
            document.getElementById("adminTag").style.display = "block";
        }
        startSync();
    }

    async function sendMsg() {
        const input = document.getElementById("msgInput");
        const msg = input.value;
        if (!msg.trim()) return;
        await fetch(`/api/chat?act=send&user=${encodeURIComponent(username)}&msg=${encodeURIComponent(msg)}`);
        input.value = "";
        syncMsg();
    }

    async function syncMsg() {
        const res = await fetch("/api/chat?act=list");
        const list = await res.json();
        const box = document.getElementById("msgBox");
        box.innerHTML = "";

        list.forEach(item => {
            const itemUid = parseInt(item.uid || "0");
            const safeUid = isNaN(itemUid) ? 0 : itemUid; // 消息UID兜底
            const isMe = item.user === username;
            const div = document.createElement("div");
            div.className = "msg-item " + (isMe ? "me" : "");
            const showMsg = item.msg.replace(/\n/g, "<br>");
            div.innerHTML = `
                <div class="name-row">
                    <div class="avatar"></div>
                    <div class="username">${item.user}</div>
                </div>
                <div class="bubble">${showMsg}</div>
                <div class="uid">UID:${safeUid}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    // Shift+Enter换行
    document.getElementById("msgInput").addEventListener("keydown", e => {
        if (e.key === "Enter") {
            if (e.shiftKey) return;
            e.preventDefault();
            sendMsg();
        }
    });

    async function clearAllMsg() {
        if (!confirm("确定清空全部消息？")) return;
        await fetch(`/api/chat?act=clear&uid=${uid}`);
        syncMsg();
    }

    async function deleteLastMsg() {
        await fetch(`/api/chat?act=delete&uid=${uid}`);
        syncMsg();
    }

    function startSync() {
        syncMsg();
        setInterval(syncMsg, 2500);
    }
</script>
</body>
</html>
