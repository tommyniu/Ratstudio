<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RatStudio 全局聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0f14;color:#eee;font-family:system-ui}
.container{max-width:680px;margin:40px auto;padding:20px}
h2{text-align:center;margin-bottom:20px;color:#58a6ff}

/* 登录框样式和聊天框统一风格 */
.login-box,.chat-box{background:rgba(255,255,255,0.05);padding:20px;border-radius:16px}
.login-box{margin-bottom:15px}

input{width:100%;padding:10px;margin:6px 0;border-radius:12px;border:none;background:#222;color:#fff;outline:none}
button{width:100%;padding:10px;border-radius:12px;border:none;background:#2383ff;color:#fff;margin-top:6px;cursor:pointer}

#chat{display:none}
#msgList{height:500px;overflow-y:auto;padding:10px;background:rgba(255,255,255,0.03);border-radius:16px;margin-bottom:15px}
.msgItem{padding:8px 12px;margin:6px 0;border-radius:12px;background:rgba(255,255,255,0.07)}
.userName{color:#58a6ff;font-weight:bold;margin-right:6px}

.inputWrap{display:flex;gap:10px;align-items:center}
#nick{width:120px;padding:10px;border-radius:12px;border:none;background:#222;color:#fff;outline:none}
#input{flex:1;padding:10px;border-radius:12px;border:none;background:#222;color:#fff;outline:none}
#send{padding:10px 20px;border-radius:12px;border:none;background:#2383ff;color:#fff;cursor:pointer}
</style>
</head>
<body>
<div class="container">
  <!-- 登录注册 -->
  <div id="login">
    <div class="login-box">
      <h2>登录 / 注册</h2>
      <input id="user" placeholder="用户名">
      <input id="pwd" placeholder="密码" type="password">
      <button onclick="login()">登录</button>
      <button onclick="reg()">注册</button>
    </div>
  </div>

  <!-- 聊天界面（还原旧版UI） -->
  <div id="chat">
    <h2>RatStudio 全局聊天室</h2>
    <div id="msgList"></div>
    <div class="inputWrap">
      <input id="nick" placeholder="昵称" value="游客" disabled style="opacity:0.7">
      <input id="input" placeholder="输入消息...">
      <button id="send" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
let username = "";

async function login() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if(!u||!p) return alert("请输入用户名和密码");
  let res = await fetch(`/api/chat?act=login&user=${u}&pwd=${p}`);
  let d = await res.json();
  if (d.ok) {
    username = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
    document.getElementById("nick").value = username;
    loadMsg();
  } else {
    alert("登录失败，用户名或密码错误");
  }
}

async function reg() {
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pwd").value.trim();
  if(!u||!p) return alert("请输入用户名和密码");
  let res = await fetch(`/api/chat?act=reg&user=${u}&pwd=${p}`);
  let d = await res.json();
  alert(d.ok ? "注册成功，可直接登录" : "注册失败，用户名已存在");
}

async function sendMsg() {
  let msgInput = document.getElementById("input");
  let m = msgInput.value.trim();
  if(!m) return;
  await fetch(`/api/chat?act=send&user=${username}&msg=${encodeURIComponent(m)}`);
  msgInput.value = "";
  loadMsg();
}

async function loadMsg() {
  let res = await fetch("/api/chat?act=list");
  let list = await res.json();
  let html = "";
  list.forEach(item=>{
    html += `<div class="msgItem"><span class="userName">${item.user}</span>：${item.msg}</div>`;
  });
  document.getElementById("msgList").innerHTML = html;
  document.getElementById("msgList").scrollTop = document.getElementById("msgList").scrollHeight;
}

setInterval(loadMsg,2000);
</script>
</body>
</html>
