<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

/* 顶部导航 */
.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 24px;position:fixed;top:0;left:0;z-index:999;
}
.nav-left{display:flex;align-items:center;gap:12px;}
.avatar{
  width:38px;height:38px;border-radius:50%;
  background:#0066cc;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:16px;
}
.user-info-mini{
  display:flex;flex-direction:column;
  font-size:13px;color:#666;line-height:1.2;
}
.user-info-mini .name{font-weight:bold;color:#333;font-size:14px;}

.nav-right{display:flex;gap:24px;align-items:center;}
.nav-item{
  font:14px/1 sans-serif;color:#666;cursor:pointer;
  padding:8px 12px;border-radius:8px;transition:0.2s;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}
.nav-item:hover{background:#f1f5ff;}

/* 主容器布局固定 */
#app{
  position:fixed;
  top:56px;
  left:0;
  width:100%;
  height:calc(100% - 56px);
  display:flex;
  flex-direction:column;
}

/* 消息区域 */
#msgBox{
  flex:1;
  padding:20px 24px;
  overflow-y:auto;
  background:#f9f9f9;
}

/* 消息外层容器 */
.message{
  display:flex;
  gap:10px;
  margin-bottom:16px;
  max-width:68%;
  align-items:flex-start;
}
/* 自己消息：靠右 + 倒序 */
.message.me{
  margin-left:auto;
  flex-direction:row-reverse;
}

.msg-avatar{
  width:34px;height:34px;border-radius:50%;
  background:#0066cc;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:bold;
  flex-shrink:0;
}

.msg-content{
  display:flex;
  flex-direction:column;
  /* 关键：限制最大宽度，不让气泡无限拉长 */
  max-width:calc(100% - 50px);
}

/* 别人消息：名字居左 */
.msg-name{
  font-size:12px;
  color:#888;
  margin-bottom:4px;
  display:flex;
  align-items:center;
  gap:6px;
}
/* 自己消息：名字整行居右 */
.message.me .msg-name{
  justify-content:flex-end;
}

.admin-tag{
  background:#ff4d4f;color:#fff;
  font-size:10px;padding:1px 4px;
  border-radius:3px;
}

/* 气泡关键修复：宽度自适应，不被名字撑长 */
.msg-bubble{
  padding:10px 14px;
  background:#fff;
  border:1px solid #e5e6eb;
  border-radius:12px;
  font-size:14px;
  line-height:1.5;
  white-space:normal;
  word-break:break-all;
  width:fit-content;
  max-width:100%;
}
.message.me .msg-bubble{
  background:#0066cc;color:#fff;border-color:#0066cc;
}

.withdraw-btn{
  font-size:12px;color:#ff4d4f;background:none;border:none;cursor:pointer;
}

/* 输入栏固定底部 */
#inputBar{
  height:72px;
  background:#fff;
  border-top:1px solid #e5e6eb;
  display:flex;align-items:center;gap:12px;padding:0 24px;
  flex-shrink:0;
}
#msgInput{
  flex:1;height:44px;padding:0 18px;
  border:1px solid #e5e6eb;border-radius:10px;
  background:#fafafa;outline:none;font-size:14px;
}
.send-btn{
  width:78px;height:44px;background:#0066cc;color:#fff;
  border:none;border-radius:10px;cursor:pointer;font-size:14px;
}

/* 登录框 */
.login-box{
  width:90%;max-width:380px;margin:60px auto;padding:28px;
  background:#fff;border:1px solid #e5e6eb;border-radius:12px;
}
.login-box input{
  width:100%;height:44px;padding:0 16px;margin-bottom:16px;
  border:1px solid #e5e6eb;border-radius:10px;outline:none;font-size:14px;
}
.login-box button{
  width:100%;height:44px;background:#0066cc;color:#fff;
  border:none;border-radius:10px;cursor:pointer;margin-top:8px;font-size:14px;
}
.login-box button:last-of-type{background:#f1f2f3;color:#333;}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#dcdcdc;border-radius:3px}
</style>
</head>

<body>
<div class="top-nav">
  <div class="nav-left" id="userHead" style="display:none">
    <div class="avatar" id="topAvatar">U</div>
    <div class="user-info-mini">
      <div class="name" id="miniName">用户名</div>
      <div>UID: <span id="miniUid">1</span></div>
    </div>
  </div>
  <div class="nav-right">
    <div class="nav-item active">聊天室</div>
    <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
    <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
    <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
  </div>
</div>

<div id="app">
  <div id="loginPage" class="login-box">
    <input id="user" placeholder="账号">
    <input id="pwd" placeholder="密码" type="password">
    <button onclick="login()">登录</button>
    <button onclick="reg()">注册</button>
  </div>

  <div id="chatPage" style="display:none;flex-direction:column;width:100%;height:100%;">
    <div id="msgBox"></div>
    <div id="inputBar">
      <input id="msgInput" placeholder="输入消息..." autocomplete="off">
      <button class="send-btn" onclick="sendMsg()">发送</button>
    </div>
  </div>
</div>

<script>
const ADMIN_UIDS = [1];
const API = '/api';
let username = '', uid = '';

function getAvatarChar(name){
  return name ? name.charAt(0).toUpperCase() : 'U';
}
function isAdmin(uid){
  return ADMIN_UIDS.includes(Number(uid));
}

window.onload = () => {
  let u = localStorage.getItem('username');
  let id = localStorage.getItem('uid');
  if(u && id){
    username = u;
    uid = id;
    showChat();
  }
  setInterval(loadMsg, 2000);
};

function showChat(){
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('chatPage').style.display = 'flex';
  document.getElementById('userHead').style.display = 'flex';
  document.getElementById('miniName').innerText = username;
  document.getElementById('miniUid').innerText = uid;
  document.getElementById('topAvatar').innerText = getAvatarChar(username);
  loadMsg();
}

async function login(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  let res = await fetch(`${API}/login?user=${u}&pwd=${p}`);
  let t = await res.text();
  if(!t)return alert('登录失败');
  localStorage.setItem('username',u);
  localStorage.setItem('uid',t);
  location.reload();
}
async function reg(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  let res = await fetch(`${API}/reg?user=${u}&pwd=${p}`);
  alert(await res.text() === 'ok' ? '成功' : '失败');
}

async function sendMsg(){
  let txt = document.getElementById('msgInput').value.trim();
  if(!txt)return;
  await fetch(`${API}/send?uid=${uid}&msg=${txt}`);
  document.getElementById('msgInput').value = '';
  loadMsg();
}

async function loadMsg(){
  let res = await fetch(`${API}/msg`);
  let list = await res.json();
  let box = document.getElementById('msgBox');
  let auto = Math.abs(box.scrollTop + box.clientHeight - box.scrollHeight) < 20;

  box.innerHTML = '';
  list.forEach(m => {
    let me = m.uid == uid;
    let char = getAvatarChar(m.user);
    let adminBadge = isAdmin(m.uid) ? '<span class="admin-tag">管理员</span>' : '';
    let withdraw = (me || isAdmin(uid)) ? `<button class="withdraw-btn" onclick="withdraw(${m.id})">撤回</button>` : '';

    box.innerHTML += `
      <div class="message ${me?'me':''}">
        <div class="msg-avatar">${char}</div>
        <div class="msg-content">
          <div class="msg-name">${m.user} ${adminBadge} ${withdraw}</div>
          <div class="msg-bubble">${m.msg}</div>
        </div>
      </div>
    `;
  });

  if(auto) box.scrollTop = box.scrollHeight;
}

async function withdraw(id){
  if(!confirm('确定撤回？')) return;
  await fetch(`${API}?act=deleteMsg&uid=${uid}&targetId=${id}`);
  loadMsg();
}
</script>

</body>
</html>
