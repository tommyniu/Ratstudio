<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio的小站</title>
<style>
/* ========== 新版 B 站风格：小圆角、顶部导航 ========== */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
html,body{width:100%;height:100%;overflow:hidden;background:#f1f2f3;color:#333}

/* 顶部导航 */
.top-nav{
  width:100%;height:56px;background:#fff;
  border-bottom:1px solid #e5e6eb;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:fixed;top:0;left:0;z-index:999;
}
/* 左上角：头像 + 昵称 + UID */
.nav-left{display:flex;align-items:center;gap:12px;}
.avatar{
  width:36px;height:36px;border-radius:50%;
  background:#0066cc;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-weight:bold;font-size:14px;
}
.user-info-mini{font-size:12px;color:#666;line-height:1.3;}
.user-info-mini .name{font-weight:bold;color:#333;}

/* 右上角菜单 */
.nav-right{display:flex;gap:18px;align-items:center;}
.nav-item{
  font-size:14px;color:#666;cursor:pointer;
  padding:6px 10px;border-radius:6px;
}
.nav-item.active{color:#0066cc;background:#e8f0fe;}
.ui-toggle{
  padding:6px 12px;background:#f1f2f3;
  border:1px solid #e5e6eb;border-radius:6px;
  font-size:13px;cursor:pointer;
}

/* 主内容 */
.container{
  width:100%;height:calc(100% - 56px);
  margin-top:56px;display:flex;flex-direction:column;
}

/* 消息列表 + 一侧头像（彻底去空格） */
.msg-box{
  flex:1;padding:16px 24px;overflow-y:auto;background:#f9f9f9;
}
.message{
  display:flex;gap:8px;margin-bottom:12px;
  max-width:75%;align-items:flex-start;
}
.message.me{margin-left:auto;flex-direction:row-reverse;}
.msg-avatar{
  width:30px;height:30px;border-radius:50%;
  background:#0066cc;color:#fff;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:bold;
  flex-shrink:0;
}
.msg-content{
  display:flex;flex-direction:column;min-width:0;
}
.msg-name{
  font-size:12px;color:#888;margin-bottom:4px;
}
.msg-bubble{
  padding:8px 12px;background:#fff;border:1px solid #e5e6eb;
  border-radius:8px;font-size:14px;line-height:1.4;
  white-space:normal;word-break:break-all;
  /* 关键：去掉尾部空白 */
  width:fit-content !important;
  max-width:100%;
}
.message.me .msg-bubble{
  background:#0066cc;color:#fff;border-color:#0066cc;
}
.revoke-btn{
  font-size:12px;color:#ff4d4f;background:none;border:none;cursor:pointer;
}

/* 输入框（小圆角） */
.input-wrap{
  height:60px;background:#fff;border-top:1px solid #e5e6eb;
  display:flex;align-items:center;gap:10px;padding:0 20px;
}
#msgInput{
  flex:1;height:38px;padding:0 14px;
  border:1px solid #e5e6eb;border-radius:8px;
  background:#fafafa;outline:none;
}
.send-btn{
  width:70px;height:38px;background:#0066cc;color:#fff;
  border:none;border-radius:8px;cursor:pointer;
}

/* 登录 */
.login-box{
  max-width:360px;margin:80px auto;padding:24px;
  background:#fff;border:1px solid #e5e6eb;border-radius:12px;
}
.login-box input{
  width:100%;height:40px;padding:0 12px;margin-bottom:12px;
  border:1px solid #e5e6eb;border-radius:8px;outline:none;
}
.login-box button{
  width:100%;height:40px;background:#0066cc;color:#fff;
  border:none;border-radius:8px;cursor:pointer;margin-top:6px;
}

/* ========== 旧版 UI：100% 完整套用你原版代码（不是改色） ========== */
body.old-ui{
  background:linear-gradient(135deg,#0f1419,#0a0c12) !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  height:100vh !important;
  padding:0 !important;
  margin:0 !important;
}
body.old-ui .container{
  display:flex !important;
  width:680px !important;
  height:750px !important;
  border-radius:44px !important;
  overflow:hidden !important;
  background:rgba(255,255,255,.04) !important;
  backdrop-filter:blur(30px) !important;
  border:1px solid rgba(255,255,255,.1) !important;
  box-shadow:0 0 50px rgba(60,120,255,0.25) !important;
  margin-top:0 !important;
}
body.old-ui .top-nav{display:none !important;}
body.old-ui .top-nav *{display:none !important;}

body.old-ui .sidebar{
  width:140px !important;
  background:rgba(255,255,255,.05) !important;
  padding:30px 10px !important;
  display:flex !important;
  flex-direction:column !important;
  gap:10px !important;
  border-right:1px solid rgba(255,255,255,.08) !important;
}
body.old-ui .sidebar-item{
  padding:14px !important;
  border-radius:16px !important;
  color:rgba(255,255,255,.8) !important;
  text-align:center !important;
  cursor:pointer !important;
  transition:all 0.2s !important;
  border:1px solid transparent !important;
}
body.old-ui .sidebar-item.active,
body.old-ui .sidebar-item:hover{
  background:rgba(60,130,255,.25) !important;
  color:#fff !important;
  border-color:rgba(100,160,255,0.4) !important;
}

body.old-ui .old-main{
  flex:1 !important;
  position:relative !important;
  display:flex !important;
  flex-direction:column !important;
}
body.old-ui .old-top{
  background:rgba(255,255,255,.05) !important;
  padding:20px !important;
  color:#fff !important;
  font-weight:600 !important;
  display:flex !important;
  justify-content:space-between !important;
  align-items:center !important;
  border-bottom:1px solid rgba(255,255,255,.08) !important;
}
body.old-ui .old-ui-button{
  background:rgba(255,255,255,.08) !important;
  border:1px solid rgba(255,255,255,.2) !important;
  color:#eee !important;
  padding:6px 12px !important;
  border-radius:8px !important;
}

/* 旧版内消息样式 */
body.old-ui .msg-box{background:transparent !important;}
body.old-ui .msg-bubble{
  background:rgba(255,255,255,.07) !important;
  border-color:rgba(255,255,255,.12) !important;
  color:#fff !important;
}
body.old-ui .message.me .msg-bubble{
  background:rgba(60,130,255,.25) !important;
  border-color:rgba(100,160,255,0.4) !important;
}
body.old-ui .input-wrap{
  background:#0f1419 !important;
  border-color:rgba(255,255,255,.08) !important;
}
body.old-ui #msgInput{
  background:#262833 !important;
  border-color:rgba(255,255,255,.15) !important;
  color:#fff !important;
}

/* 旧版时隐藏新版导航，显示旧版界面 */
#oldLayout{display:none;}
body.old-ui #oldLayout{display:flex !important;}
body.old-ui #newLayout{display:none !important;}

::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
</style>
</head>

<body>
<!-- 旧版完整布局（100% 原版） -->
<div id="oldLayout">
  <div class="container">
    <div class="sidebar">
      <div class="sidebar-item active" onclick="location.href='index.html'">聊天室</div>
      <div class="sidebar-item" onclick="location.href='forum.html'">论坛</div>
      <div class="sidebar-item" onclick="location.href='history.html'">更新日志</div>
      <div class="sidebar-item" onclick="location.href='plan.html'">开发规划</div>
    </div>
    <div class="old-main">
      <div class="old-top">
        <span>聊天室</span>
        <button class="old-ui-button" id="oldUiBtn" onclick="toggleUI()">新版UI</button>
      </div>
      <div id="oldChat" style="display:flex;flex-direction:column;height:100%;">
        <div class="msg-box" id="oldMsgBox" style="flex:1;padding:16px;overflow-y:auto;"></div>
        <div class="input-wrap">
          <input id="oldMsgInput" placeholder="输入消息..." style="flex:1;height:38px;padding:0 14px;border-radius:8px;background:#262833;color:#fff;border:1px solid rgba(255,255,255,.15);">
          <button class="send-btn" onclick="sendMsgOld()">发送</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新版布局 -->
<div id="newLayout">
  <div class="top-nav">
    <div class="nav-left" id="userHead" style="display:none">
      <div class="avatar" id="topAvatar">U</div>
      <div class="user-info-mini">
        <div class="name" id="miniName">用户名</div>
        <div>UID: <span id="miniUid">1</span></div>
      </div>
    </div>
    <div class="nav-right">
      <div class="nav-item active">聊天室</div>
      <div class="nav-item" onclick="location.href='forum.html'">论坛</div>
      <div class="nav-item" onclick="location.href='history.html'">更新日志</div>
      <div class="nav-item" onclick="location.href='plan.html'">开发规划</div>
      <button class="ui-toggle" id="uiBtn" onclick="toggleUI()">旧版UI</button>
    </div>
  </div>

  <div class="container">
    <div id="loginPage" class="login-box" style="display:none">
      <input id="user" placeholder="账号">
      <input id="pwd" placeholder="密码" type="password">
      <button onclick="login()">登录</button>
      <button onclick="reg()" style="background:#f1f2f3;color:#333;margin-top:8px">注册</button>
    </div>

    <div id="chatPage" style="display:flex;flex-direction:column;flex:1;">
      <div class="msg-box" id="msgBox"></div>
      <div class="input-wrap">
        <input id="msgInput" placeholder="输入消息...">
        <button class="send-btn" onclick="sendMsg()">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
const uiBtn = document.getElementById('uiBtn');
const oldUiBtn = document.getElementById('oldUiBtn');
let username = '', uid = '';
const API = '/api';

// ========== UI 切换：旧版 = 完整原版界面 ==========
function toggleUI(){
  document.body.classList.toggle('old-ui');
  let isOld = document.body.classList.contains('old-ui');
  localStorage.setItem('ui', isOld);
  uiBtn.innerText = isOld ? '新版UI' : '旧版UI';
  if(oldUiBtn) oldUiBtn.innerText = isOld ? '新版UI' : '旧版UI';
}

// 初始化
window.onload = () => {
  let old = localStorage.getItem('ui') === 'true';
  if(old){
    document.body.classList.add('old-ui');
    if(uiBtn) uiBtn.innerText = '新版UI';
  }
  checkLogin();
  setInterval(() => {
    loadMsg();
    loadOldMsg();
  }, 2000);
};

// 头像 = 昵称首字母
function getAvatarChar(name){
  if(!name) return 'U';
  return name.charAt(0).toUpperCase();
}

// 登录状态
function checkLogin(){
  let u = localStorage.getItem('username');
  let id = localStorage.getItem('uid');
  if(u && id){
    username = u; uid = id;
    showChat();
  }else{
    showLogin();
  }
}

function showLogin(){
  document.getElementById('loginPage').style.display = 'block';
  document.getElementById('chatPage').style.display = 'none';
  document.getElementById('userHead').style.display = 'none';
}
function showChat(){
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('chatPage').style.display = 'flex';
  document.getElementById('userHead').style.display = 'flex';
  document.getElementById('miniName').innerText = username;
  document.getElementById('miniUid').innerText = uid;
  document.getElementById('topAvatar').innerText = getAvatarChar(username);
  loadMsg();
}

// 登录 / 注册
async function login(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  let res = await fetch(`${API}/login?user=${u}&pwd=${p}`);
  let t = await res.text();
  if(!t) return alert('登录失败');
  localStorage.setItem('username', u);
  localStorage.setItem('uid', t);
  location.reload();
}
async function reg(){
  let u = document.getElementById('user').value.trim();
  let p = document.getElementById('pwd').value.trim();
  let res = await fetch(`${API}/reg?user=${u}&pwd=${p}`);
  alert(await res.text() === 'ok' ? '成功' : '失败');
}

// ========== 新版发消息 ==========
async function sendMsg(){
  let txt = document.getElementById('msgInput').value.trim();
  if(!txt) return;
  await fetch(`${API}/send?uid=${uid}&msg=${txt}`);
  document.getElementById('msgInput').value = '';
  loadMsg();
}

// ========== 新版加载消息（无尾部空格） ==========
async function loadMsg(){
  let res = await fetch(`${API}/msg`);
  let list = await res.json();
  let box = document.getElementById('msgBox');
  let autoScroll = Math.abs(box.scrollTop + box.clientHeight - box.scrollHeight) < 10;

  box.innerHTML = '';
  list.forEach(m => {
    let me = m.uid == uid;
    let char = getAvatarChar(m.user);
    box.innerHTML += `
      <div class="message ${me?'me':''}">
        <div class="msg-avatar">${char}</div>
        <div class="msg-content">
          <div class="msg-name">${m.user}</div>
          <div class="msg-bubble">${m.msg}</div>
        </div>
      </div>
    `;
  });

  if(autoScroll) box.scrollTop = box.scrollHeight;
}

// ========== 旧版消息 ==========
async function sendMsgOld(){
  let txt = document.getElementById('oldMsgInput').value.trim();
  if(!txt) return;
  await fetch(`${API}/send?uid=${uid}&msg=${txt}`);
  document.getElementById('oldMsgInput').value = '';
  loadOldMsg();
}
async function loadOldMsg(){
  let res = await fetch(`${API}/msg`);
  let list = await res.json();
  let box = document.getElementById('oldMsgBox');
  if(!box) return;
  box.innerHTML = '';
  list.forEach(m => {
    let me = m.uid == uid;
    box.innerHTML += `
      <div class="message ${me?'me':''}">
        <div class="msg-bubble">${m.msg}</div>
      </div>
    `;
  });
}
</script>
</body>
</html>
