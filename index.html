<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f1419, #0a0c12);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .window {
            width: 680px;
            height: 750px;
            border-radius: 44px;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            padding: 20px;
            color: #fff;
            font-weight: 600;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        /* 登录 */
        .login {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .login input {
            padding: 14px;
            border-radius: 16px;
            background: #262833;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            outline: none;
        }
        .login-row {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 14px;
        }
        .login button {
            padding: 14px;
            border-radius: 16px;
            background: #4080ff;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        /* 聊天布局 */
        .chat {
            flex: 1;
            display: none;
            flex-direction: column;
        }
        .user-bar {
            padding: 12px 20px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .admin-btn {
            background: rgba(255,80,80,0.3);
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            margin-left: 6px;
        }

        /* 消息区域 —— 完全修复 */
        .msg-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }
        .msg {
            max-width: 80%;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }
        .msg.me {
            margin-left: auto;
            align-items: flex-end;
        }
        .msg-name {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 4px;
        }
        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            white-space: pre-wrap;
            word-break: break-word;
            width: fit-content;
            max-width: 100%;
        }
        .msg.me .msg-bubble {
            background: rgba(60,120,255,0.25);
        }
        .msg-uid {
            font-size: 11px;
            color: rgba(255,255,255,0.3);
            margin-top: 4px;
        }

        /* 输入框 —— 永远不被遮挡 */
        .input-bar {
            display: flex;
            padding: 16px 20px;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
        }
        #msgInput {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            border-radius: 24px;
            background: #262833;
            border: 1px solid rgba(255,255,255,0.15);
            color: #fff;
            outline: none;
        }
        .send-btn {
            width: 70px;
            height: 44px;
            border-radius: 24px;
            background: #4080ff;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        .tag {
            padding: 0 20px 14px;
            color: #888;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .admin-tag {
            color: #ff4d4d;
            display: none;
        }
    </style>
</head>

<body>
<div class="window">
    <div class="top-bar">聊天室</div>

    <!-- 登录 -->
    <div class="login" id="loginPage">
        <input id="user" placeholder="账号">
        <input id="pwd" placeholder="密码" type="password">
        <div class="login-row">
            <input type="checkbox" id="autoLogin">
            <span>10天自动登录</span>
        </div>
        <button onclick="reg()">注册</button>
        <button onclick="login()">登录</button>
    </div>

    <!-- 聊天 -->
    <div class="chat" id="chatPage">
        <div class="user-bar">
            <span id="userInfo"></span>
            <div>
                <button class="admin-btn" id="clearBtn" onclick="clearAll()" style="display:none;">清空</button>
                <button class="admin-btn" id="delBtn" onclick="delLast()" style="display:none;">撤回</button>
            </div>
        </div>

        <div class="msg-container" id="msgBox"></div>

        <div class="input-bar">
            <input id="msgInput" placeholder="Shift+Enter 换行">
            <button class="send-btn" onclick="send()">发送</button>
        </div>
    </div>

    <div class="tag">
        <span class="admin-tag" id="adminTag">管理员</span>
        <span>V2.0 最终版</span>
    </div>
</div>

<script>
    let username = "";
    let uid = 0;

    // 自动登录
    window.onload = () => {
        const auto = localStorage.getItem("auto") === "1";
        const user = localStorage.getItem("user");
        const u = parseInt(localStorage.getItem("uid") || 0);
        if (auto && user && u > 0) {
            username = user;
            uid = u;
            openChat();
        }
    };

    // 登录
    async function login() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        const auto = document.getElementById("autoLogin").checked;

        const r = await fetch(`/api/chat?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        const d = await r.json();
        if (!d.ok) return alert("账号密码错误");

        username = user;
        uid = d.uid;
        if (auto) {
            localStorage.setItem("user", user);
            localStorage.setItem("uid", d.uid);
            localStorage.setItem("auto", "1");
        }
        openChat();
    }

    // 注册
    async function reg() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        const r = await fetch(`/api/chat?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        const d = await r.json();
        alert(d.ok ? "成功" : "已存在");
    }

    // 打开聊天
    function openChat() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "flex";
        document.getElementById("userInfo").innerText = `${username} (UID:${uid})`;

        if (username === "Ratstudio") {
            document.getElementById("clearBtn").style.display = "inline-block";
            document.getElementById("delBtn").style.display = "inline-block";
            document.getElementById("adminTag").style.display = "block";
        }
        startSync();
    }

    // 发送
    async function send() {
        const i = document.getElementById("msgInput");
        const t = i.value.trim();
        if (!t) return;
        await fetch(`/api/chat?act=send&user=${encodeURIComponent(username)}&msg=${encodeURIComponent(i.value)}`);
        i.value = "";
        sync();
    }

    // 同步消息
    async function sync() {
        const r = await fetch("/api/chat?act=list");
        const list = await r.json();
        const box = document.getElementById("msgBox");
        box.innerHTML = "";

        list.forEach(m => {
            const isMe = m.user === username;
            const div = document.createElement("div");
            div.className = "msg " + (isMe ? "me" : "");
            div.innerHTML = `
                <div class="msg-name">${m.user}</div>
                <div class="msg-bubble">${m.msg.replace(/\n/g, "<br>")}</div>
                <div class="msg-uid">UID:${m.uid}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    // 快捷键
    document.getElementById("msgInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    // 管理员
    async function clearAll() { if (confirm("确定？")) await fetch(`/api/chat?act=clear&uid=${uid}`), sync(); }
    async function delLast() { await fetch(`/api/chat?act=delete&uid=${uid}`), sync(); }

    function startSync() { sync(); setInterval(sync, 2500); }
</script>
</body>
</html>
