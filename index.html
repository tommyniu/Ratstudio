<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 - RatStudio的小站</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui
        }

        body {
            background: linear-gradient(135deg, #0f1419, #0a0c12);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh
        }

        .container {
            display: flex;
            width: 680px;
            height: 750px;
            border-radius: 44px;
            overflow: hidden;
            background: rgba(255, 255, 255, .04);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 0 50px rgba(60, 120, 255, 0.25);
        }

        .sidebar {
            width: 140px;
            background: rgba(255, 255, 255, .05);
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid rgba(255, 255, 255, .08);
        }

        .item {
            padding: 14px;
            border-radius: 16px;
            color: rgba(255, 255, 255, .8);
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid transparent;
        }

        .item:hover,
        .item.active {
            background: rgba(60, 130, 255, .25);
            color: #fff;
            border-color: rgba(100, 160, 255, .4);
            box-shadow: 0 0 12px rgba(80, 140, 255, .35);
        }

        .main {
            flex: 1;
            position: relative
        }

        .top {
            background: rgba(255, 255, 255, .05);
            padding: 20px;
            color: #fff;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .login {
            padding: 30px;
            height: 630px;
            overflow-y: auto;
        }

        .chat {
            display: none;
        }

        .msg-box {
            padding: 20px;
            overflow-y: auto;
            height: 470px;
        }

        .msg-item {
            max-width: 75%;
            width: fit-content;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;
        }

        .msg-item.me {
            margin-left: auto;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-item.me .name-row {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #444;
            border-radius: 50%;
        }

        .username {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            width: fit-content;
            max-width: 100%;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .msg-item.me .bubble {
            background: rgba(60, 120, 255, .25);
            margin-left: auto;
        }

        .uid {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .msg-item.me .uid {
            text-align: right;
        }

        .input-box {
            display: flex;
            padding: 12px 20px;
            gap: 8px;
            align-items: center;
        }

        #msgInput {
            flex: 1;
            padding: 12px;
            border-radius: 24px;
            background: #262833;
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
        }

        /* 👇 这里是改小后的发送按钮 */
        .input-box button {
            flex: 0 0 70px;
            padding: 8px 12px;
            border-radius: 12px;
            background: #4080ff;
            color: #fff;
            border: none;
            font-size: 14px;
        }

        .user-info {
            padding: 12px 20px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-btn {
            background: rgba(255, 80, 80, .3);
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            color: #fff;
        }

        .admin-tag {
            position: absolute;
            left: 20px;
            bottom: 12px;
            color: #ff4d4d;
            font-size: 12px;
            text-shadow: 0 0 6px #ff4d4d;
            display: none;
        }

        .version {
            position: absolute;
            right: 18px;
            bottom: 12px;
            color: #888;
            font-size: 12px;
        }

        input, button {
            border-radius: 12px;
            padding: 12px;
            background: #262833;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 10px;
            width: 100%;
            font-size: 15px;
        }

        button {
            background: #4080ff;
            cursor: pointer;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="item active" onclick="switchTo('chat')">聊天室</div>
        <div class="item" onclick="alert('即将上线')">论坛</div>
        <div class="item" onclick="alert('即将上线')">更新日志</div>
        <div class="item" onclick="alert('即将上线')">开发规划</div>
    </div>

    <div class="main">
        <div class="top">
            <span>聊天室</span>
        </div>

        <div class="login" id="loginPage">
            <input id="user" placeholder="账号">
            <input id="pwd" placeholder="密码" type="password">
            <button onclick="reg()">注册</button>
            <button onclick="login()">登录</button>
        </div>

        <div class="chat" id="chatPage">
            <div class="user-info">
                <span id="userInfoText"></span>
                <button class="admin-btn" id="clearBtn" style="display:none;" onclick="clearAllMsg()">清空消息</button>
            </div>
            <div class="msg-box" id="msgBox"></div>
            <div class="input-box">
                <input id="msgInput" placeholder="输入消息...">
                <button onclick="sendMsg()">发送</button>
            </div>
        </div>

        <div class="admin-tag" id="adminTag">管理员</div>
        <div class="version">V1.2.3</div>
    </div>
</div>

<script>
    let username = "";

    // 登录
    async function login() {
        let u = document.getElementById("user").value.trim();
        let p = document.getElementById("pwd").value.trim();
        if (!u || !p) return alert("请输入账号密码");
        let res = await fetch(`/api/chat?act=login&user=${u}&pwd=${p}`);
        let d = await res.json();
        if (d.ok) {
            username = u;
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("chatPage").style.display = "block";
            document.getElementById("userInfoText").innerText = `用户：${username}`;
            syncMsg();
        } else {
            alert("登录失败");
        }
    }

    // 注册
    async function reg() {
        let u = document.getElementById("user").value.trim();
        let p = document.getElementById("pwd").value.trim();
        if (!u || !p) return alert("请输入账号密码");
        let res = await fetch(`/api/chat?act=reg&user=${u}&pwd=${p}`);
        let d = await res.json();
        alert(d.ok ? "注册成功" : "注册失败");
    }

    // 发送消息
    async function sendMsg() {
        let i = document.getElementById("msgInput");
        let m = i.value.trim();
        if (!m || !username) return;
        await fetch(`/api/chat?act=send&user=${username}&msg=${encodeURIComponent(m)}`);
        i.value = "";
        syncMsg();
    }

    // 同步消息
    async function syncMsg() {
        let res = await fetch("/api/chat?act=list");
        let list = await res.json();
        let box = document.getElementById("msgBox");
        box.innerHTML = "";
        list.forEach(item => {
            let isMe = item.user === username;
            let div = document.createElement("div");
            div.className = "msg-item " + (isMe ? "me" : "");
            div.innerHTML = `
                <div class="name-row">
                    <div class="avatar"></div>
                    <div class="username">${item.user}</div>
                </div>
                <div class="bubble">${item.msg.replace(/</g, "&lt;")}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    // Ctrl + Enter 发送
    document.getElementById("msgInput").addEventListener("keydown", e => {
        if (e.ctrlKey && e.key === "Enter") sendMsg();
    });

    setInterval(syncMsg, 2000);

    // 侧边栏切换
    function switchTo(name) {
        if (name === "chat") {
            document.getElementById("loginPage").style.display = "none";
            document.getElementById("chatPage").style.display = "block";
        }
    }

    // 清空消息（管理员）
    async function clearAllMsg() {
        if (!confirm("确定清空？")) return;
        await fetch("/api/chat?act=clear");
        syncMsg();
    }
</script>
</body>
</html>
