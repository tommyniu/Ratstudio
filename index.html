<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RatStudio 聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0f14;color:#eee;font-family:system-ui}
.container{max-width:680px;margin:40px auto;padding:20px}
.box{background:rgba(255,255,255,.05);padding:20px;border-radius:16px;margin-bottom:10px}
h2{text-align:center;margin-bottom:16px;color:#58a6ff}
input{width:100%;padding:10px;margin:6px 0;border-radius:12px;border:none;background:#222;color:#fff}
button{width:100%;padding:10px;border-radius:12px;border:none;background:#2383ff;color:#fff;margin-top:6px}
#chat{display:none}
#msgList{height:400px;overflow-y:auto;padding:10px;background:rgba(255,255,255,0.03);border-radius:12px;margin:10px 0}
.msg{padding:8px 12px;margin:6px 0;background:rgba(255,255,255,.07);border-radius:10px}
.user{color:#58a6ff;font-weight:bold}
.inputBar{display:flex;gap:8px}
</style>
</head>
<body>
<div class="container">
  <div id="login">
    <div class="box">
      <h2>登录 / 注册</h2>
      <input id="user" placeholder="用户名">
      <input id="pwd" placeholder="密码" type="password">
      <button onclick="login()">登录</button>
      <button onclick="reg()">注册</button>
    </div>
  </div>

  <div id="chat">
    <div class="box">
      <h2>全局聊天室</h2>
      <div id="msgList"></div>
      <div class="inputBar">
        <input id="msg" placeholder="输入消息...">
        <button onclick="send()" style="width:100px">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
let username = "";

async function login() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pwd").value;
  let res = await fetch(`/api/chat?act=login&user=${u}&pwd=${p}`);
  let d = await res.json();
  if (d.ok) {
    username = u;
    document.getElementById("login").style.display = "none";
    document.getElementById("chat").style.display = "block";
    loadMsg();
  } else {
    alert("登录失败");
  }
}

async function reg() {
  let u = document.getElementById("user").value;
  let p = document.getElementById("pwd").value;
  let res = await fetch(`/api/chat?act=reg&user=${u}&pwd=${p}`);
  let d = await res.json();
  alert(d.ok ? "注册成功" : "注册失败（用户名已存在）");
}

async function send() {
  let m = document.getElementById("msg").value;
  if (!m) return;
  await fetch(`/api/chat?act=send&user=${username}&msg=${encodeURIComponent(m)}`);
  document.getElementById("msg").value = "";
  loadMsg();
}

async function loadMsg() {
  let res = await fetch("/api/chat?act=list");
  let list = await res.json();
  let html = "";
  list.forEach(item => {
    html += `<div class="msg"><span class="user">${item.user}</span>：${item.msg}</div>`;
  });
  document.getElementById("msgList").innerHTML = html;
  document.getElementById("msgList").scrollTop = 999999;
}

setInterval(loadMsg, 2000);
</script>
</body>
</html>
