<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#111;color:#fff}
.container{max-width:600px;margin:20px auto;padding:10px }
.msg-box{height:400px;overflow-y:auto;background:#222;padding:10px;border-radius:10px;margin-bottom:10px}
.msg-item{margin:8px 0;display:flex;flex-direction:column}
.msg-item.me{align-items:flex-end}
.bubble{background:#333;padding:8px 12px;border-radius:12px;max-width:70%}
.msg-item.me .bubble{background:#0066ff}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;background:#222;color:#fff}
button{padding:10px 16px;background:#0066ff;color:#fff;border:none;border-radius:8px;margin-top:5px}
</style>
</head>
<body>
<div class="container">
  <div>
    <input id="user" placeholder="账号">
    <input id="pwd" placeholder="密码" type="password">
    <button onclick="reg()">注册</button>
    <button onclick="login()">登录</button>
  </div>

  <div class="msg-box" id="msgBox"></div>

  <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
  <button onclick="sendMsg()">发送</button>
</div>

<script>
const API = "https://rs-pro.ltc114514191.workers.dev";
let username = "";
let uid = "";

async function login() {
  const user = document.getElementById("user").value;
  const pwd = document.getElementById("pwd").value;
  const res = await fetch(`${API}/?act=login&user=${user}&pwd=${pwd}`);
  const t = await res.text();
  if (!t) return alert("失败");
  username = user;
  uid = t;
  localStorage.setItem("username", user);
  localStorage.setItem("uid", t);
  alert("登录成功");
  loadMsg();
}

async function reg() {
  const user = document.getElementById("user").value;
  const pwd = document.getElementById("pwd").value;
  const res = await fetch(`${API}/?act=reg&user=${user}&pwd=${pwd}`);
  const t = await res.text();
  alert(t === "ok" ? "成功" : "已存在");
}

async function sendMsg() {
  const txt = document.getElementById("msgInput").value;
  if (!txt || !uid) return;
  await fetch(`${API}/?act=send&uid=${uid}&msg=${encodeURIComponent(txt)}`);
  document.getElementById("msgInput").value = "";
  loadMsg();
}

async function loadMsg() {
  const res = await fetch(`${API}/?act=msg`);
  const list = await res.json();
  const box = document.getElementById("msgBox");
  box.innerHTML = "";
  list.forEach(m => {
    const div = document.createElement("div");
    div.className = "msg-item " + (m.uid == uid ? "me" : "");
    div.innerHTML = `<div class="bubble">${m.msg}</div><div style="font-size:12px">${m.user}</div>`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

window.onload = () => {
  username = localStorage.getItem("username");
  uid = localStorage.getItem("uid");
  if (uid) loadMsg();
};
</script>
</body>
</html>
