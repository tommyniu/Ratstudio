<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio的小站</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:linear-gradient(135deg,#0f1419,#0a0c12);display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
.container{
  display:flex;width:680px;height:750px;border-radius:44px;overflow:hidden;
  background:rgba(255,255,255,.04);backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 50px rgba(60,120,255,0.25);
  position:relative;
}
.sidebar{
  width:140px;background:rgba(255,255,255,.05);padding:30px 10px;
  display:flex;flex-direction:column;gap:10px;
  border-right:1px solid rgba(255,255,255,.08);
}
.item{
  padding:14px;border-radius:16px;color:rgba(255,255,255,.8);text-align:center;
  cursor:pointer;transition:all 0.2s;border:1px solid transparent;
}
.item:hover,.item.active{
  background:rgba(60,130,255,.25);color:#fff;
  border-color:rgba(100,160,255,0.4);box-shadow:0 0 12px rgba(80,140,255,0.35);
}
.main{flex:1;display:flex;flex-direction:column;height:100%}
.top{
  background:rgba(255,255,255,.05);padding:20px;color:#fff;font-weight:600;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.user-info{padding:12px 20px;color:#ccc;display:flex;justify-content:space-between;align-items:center}
.msg-box{
  flex:1;padding:10px 20px;overflow-y:auto;padding-bottom:90px;
}
.msg-item{display:flex;width:100%;margin-bottom:16px}
.msg-item.me{justify-content:flex-end}
.msg-wrap{max-width:75%;display:flex;flex-direction:column}
.name-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.msg-item.me .name-row{flex-direction:row-reverse}
.avatar{width:32px;height:32px;background:#444;border-radius:50%;flex-shrink:0}
.username{font-size:13px;color:rgba(255,255,255,.75)}
.admin-tag{
  font-size:11px;color:#ff5555;border:1px solid #ff5555;border-radius:6px;padding:1px 6px;margin-left:6px;
}
.msg-item.me .admin-tag{margin-right:6px;margin-left:0}
.bubble{
  padding:10px 14px;border-radius:18px;background:rgba(255,255,255,.07);color:#fff;
  white-space:pre-wrap;word-break:break-all;width:fit-content;
}
.msg-item.me .bubble{background:rgba(60,120,255,.25)}
.uid{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.input-box{
  position:absolute;left:140px;bottom:0;width:calc(100% - 140px);height:70px;
  display:flex;align-items:center;padding:0 16px;gap:10px;
  border-top:1px solid rgba(255,255,255,.08);background:#0f1419;z-index:10;
}
#msgInput{
  flex:1;height:44px;border-radius:24px;padding:0 16px;
  background:#262833;border:1px solid rgba(255,255,255,.15);color:#fff;outline:none;
}
.input-box button{
  width:70px;height:44px;border-radius:24px;background:#4080ff;color:#fff;border:none;cursor:pointer;
}
.admin-btn{
  background:rgba(255,80,80,.3);border:none;padding:6px 10px;border-radius:12px;color:#fff;margin-left:6px;
}
.version{position:absolute;right:18px;bottom:12px;color:#888;font-size:12px}
.bottom-admin{
  position:absolute;left:18px;bottom:12px;color:#ff5555;font-size:12px;display:none;
}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="item active">聊天室</div>
<div class="item" onclick="location.href='forum.html'">论坛</div>
<div class="item" onclick="location.href='history.html'">更新日志</div>
<div class="item" onclick="location.href='plan.html'">开发规划</div>
</div>
<div class="main">
<div class="top"><span>聊天室</span></div>
<div class="login" id="loginPage" style="flex:1;padding:30px;overflow-y:auto">
<input id="user" placeholder="账号" style="width:100%;padding:12px;border-radius:16px;background:#262833;border:1px solid rgba(255,255,255,.15);color:#fff;margin-bottom:10px;outline:none">
<input id="pwd" placeholder="密码" type="password" style="width:100%;padding:12px;border-radius:16px;background:#262833;border:1px solid rgba(255,255,255,.15);color:#fff;margin-bottom:10px;outline:none">
<div style="color:#fff;font-size:14px;margin-bottom:10px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="autoLogin"> 10天自动登录</div>
<button onclick="reg()" style="width:100%;padding:12px;border-radius:16px;background:#4080ff;color:#fff;border:none;margin-bottom:10px;cursor:pointer">注册</button>
<button onclick="login()" style="width:100%;padding:12px;border-radius:16px;background:#4080ff;color:#fff;border:none;cursor:pointer">登录</button>
</div>
<div class="chat" id="chatPage" style="display:none;flex-direction:column;height:100%">
<div class="user-info">
<span id="userInfoText"></span>
<div>
<button class="admin-btn" id="clearBtn" style="display:none;" onclick="clearAllMsg()">清空</button>
<button class="admin-btn" id="delBtn" style="display:none;" onclick="deleteLastMsg()">撤回</button>
</div>
</div>
<div class="msg-box" id="msgBox"></div>
</div>
<div class="bottom-admin" id="bottomAdminTip">管理员</div>
<div class="version">V1.3.2</div>
</div>
<div class="input-box">
<input id="msgInput" placeholder="Shift+Enter换行">
<button onclick="sendMsg()">发送</button>
</div>
</div>

<script>
let username = "", uid = "";
const ADMIN = "Ratstudio";

window.onload = function () {
  let u = localStorage.getItem("username");
  let id = localStorage.getItem("uid");
  if (u && id) {
    username = u;
    uid = id;
    loginSuccess();
  }
};

async function login() {
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  let auto = document.getElementById("autoLogin").checked;
  let r = await fetch("/api/login?user=" + encodeURIComponent(user) + "&pwd=" + encodeURIComponent(pwd));
  let t = await r.text();
  if (!t) { alert("失败"); return; }
  localStorage.setItem("username", user);
  localStorage.setItem("uid", t);
  username = user;
  uid = t;
  loginSuccess();
}

async function reg() {
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  let r = await fetch("/api/reg?user=" + encodeURIComponent(user) + "&pwd=" + encodeURIComponent(pwd));
  let t = await r.text();
  alert(t === "ok" ? "成功" : "已存在");
}

function loginSuccess() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("chatPage").style.display = "flex";
  document.getElementById("userInfoText").innerText = username + " (" + uid + ")";
  if (username === ADMIN) {
    document.getElementById("clearBtn").style.display = "inline-block";
    document.getElementById("delBtn").style.display = "inline-block";
    document.getElementById("bottomAdminTip").style.display = "block";
  }
  loadMsg();
}

async function sendMsg() {
  let txt = document.getElementById("msgInput").value;
  if (!txt) return;
  await fetch("/api/send?uid=" + uid + "&msg=" + encodeURIComponent(txt));
  document.getElementById("msgInput").value = "";
  loadMsg();
}

async function loadMsg() {
  let r = await fetch("/api/msg");
  let list = await r.json();
  let box = document.getElementById("msgBox");
  box.innerHTML = "";
  list.forEach(m => {
    let div = document.createElement("div");
    div.className = "msg-item " + (m.uid == uid ? "me" : "");
    let adminBadge = m.user === ADMIN ? '<span class="admin-tag">管理员</span>' : "";
    div.innerHTML = `
      <div class="msg-wrap">
        <div class="name-row"><div class="avatar"></div><div class="username">${m.user}</div>${adminBadge}</div>
        <div class="bubble">${m.msg}</div>
        <div class="uid">UID:${m.uid}</div>
      </div>`;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

async function clearAllMsg() { await fetch("/api/clear"); loadMsg(); }
async function deleteLastMsg() { await fetch("/api/delete"); loadMsg(); }
</script>
</body>
</html>
