<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, sans-serif;
        }

        body {
            background: #0f1419;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app {
            width: 680px;
            height: 750px;
            border-radius: 24px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            padding: 16px;
            color: #fff;
            font-weight: bold;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .login {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .login input {
            padding: 14px;
            border-radius: 12px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
        }

        .login button {
            padding: 14px;
            border-radius: 12px;
            background: #4080ff;
            color: white;
            border: none;
        }

        .chat {
            flex: 1;
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .user-bar {
            padding: 12px 16px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .msg-box {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }

        .msg {
            max-width: 75%;
            margin-bottom: 14px;
        }

        .msg.me {
            margin-left: auto;
            text-align: right;
        }

        .msg-name {
            font-size: 12px;
            color: #888;
            margin-bottom: 4px;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            background: rgba(255,255,255,0.07);
            color: #fff;
            word-break: break-word;
            display: inline-block;
        }

        .msg.me .msg-bubble {
            background: rgba(60,120,255,0.25);
        }

        .input-bar {
            display: flex;
            padding: 12px;
            gap: 10px;
            border-top: 1px solid rgba(255,255,255,0.08);
            background: #111;
        }

        #msgInput {
            flex: 1;
            height: 44px;
            border-radius: 22px;
            padding: 0 16px;
            background: #222;
            border: 1px solid #444;
            color: #fff;
            outline: none;
        }

        .send-btn {
            width: 70px;
            height: 44px;
            border-radius: 22px;
            background: #4080ff;
            color: white;
            border: none;
        }

        .admin-btn {
            background: rgba(255,80,80,0.3);
            border: none;
            padding: 4px 8px;
            border-radius: 8px;
            color: #fff;
            margin-left: 6px;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: #666;
            padding: 6px;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">聊天室</div>

    <div class="login" id="loginPage">
        <input id="user" placeholder="账号">
        <input id="pwd" placeholder="密码" type="password">
        <label style="color:#fff; font-size:14px;"><input type="checkbox" id="autoLogin"> 10天自动登录</label>
        <button onclick="reg()">注册</button>
        <button onclick="login()">登录</button>
    </div>

    <div class="chat" id="chatPage">
        <div class="user-bar">
            <span id="userInfo"></span>
            <div>
                <button class="admin-btn" id="clearBtn" style="display:none;" onclick="clearAll()">清空</button>
                <button class="admin-btn" id="delBtn" style="display:none;" onclick="delLast()">撤回</button>
            </div>
        </div>

        <div class="msg-box" id="msgBox"></div>

        <div class="input-bar">
            <input id="msgInput" placeholder="Shift+Enter换行">
            <button class="send-btn" onclick="send()">发送</button>
        </div>
    </div>

    <div class="footer">V2.1 修复版</div>
</div>

<script>
    let username = "";
    let uid = 0;

    window.onload = () => {
        const auto = localStorage.getItem("auto") === "1";
        const user = localStorage.getItem("user");
        const u = parseInt(localStorage.getItem("uid") || "0");
        if (auto && user && u > 0) {
            username = user;
            uid = u;
            openChat();
        }
    };

    async function login() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        const auto = document.getElementById("autoLogin").checked;

        const r = await fetch(`/api/chat?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        const d = await r.json();
        if (!d.ok) return alert("账号密码错误");

        username = user;
        uid = d.uid;
        if (auto) {
            localStorage.setItem("user", user);
            localStorage.setItem("uid", d.uid);
            localStorage.setItem("auto", "1");
        }
        openChat();
    }

    async function reg() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        const r = await fetch(`/api/chat?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        const d = await r.json();
        alert(d.ok ? "注册成功" : "用户名已存在");
    }

    function openChat() {
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "flex";
        document.getElementById("userInfo").innerText = `${username} (UID:${uid})`;

        if (username === "Ratstudio") {
            document.getElementById("clearBtn").style.display = "inline-block";
            document.getElementById("delBtn").style.display = "inline-block";
        }
        sync();
        setInterval(sync, 2500);
    }

    async function send() {
        const i = document.getElementById("msgInput");
        const t = i.value;
        if (!t.trim()) return;
        await fetch(`/api/chat?act=send&user=${encodeURIComponent(username)}&msg=${encodeURIComponent(t)}`);
        i.value = "";
        sync();
    }

    async function sync() {
        const r = await fetch("/api/chat?act=list");
        const list = await r.json();
        const box = document.getElementById("msgBox");
        box.innerHTML = "";

        list.forEach(m => {
            const isMe = m.user === username;
            const div = document.createElement("div");
            div.className = "msg " + (isMe ? "me" : "");
            div.innerHTML = `
                <div class="msg-name">${m.user}</div>
                <div class="msg-bubble">${m.msg.replace(/\n/g,"<br>")}</div>
            `;
            box.appendChild(div);
        });
        box.scrollTop = box.scrollHeight;
    }

    document.getElementById("msgInput").addEventListener("keydown", e => {
        if (e.key === "Enter" && !e.shiftKey) {
            e.preventDefault();
            send();
        }
    });

    async function clearAll() {
        if (!confirm("确定清空所有消息？")) return;
        await fetch(`/api/chat?act=clear&uid=${uid}`);
        sync();
    }

    async function delLast() {
        await fetch(`/api/chat?act=delete&uid=${uid}`);
        sync();
    }
</script>
</body>
</html>
