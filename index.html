<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 - Ratstudio的小站</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui
        }

        body {
            background: linear-gradient(135deg, #0f1419, #0a0c12);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh
        }

        .container {
            display: flex;
            width: 680px;
            height: 750px;
            border-radius: 44px;
            overflow: hidden;
            background: rgba(255, 255, 255, .04);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 0 50px rgba(60, 120, 255, 0.25);
        }

        .sidebar {
            width: 140px;
            background: rgba(255, 255, 255, .05);
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid rgba(255, 255, 255, .08);
            border-radius: 44px 0 0 44px;
        }

        .item {
            padding: 14px;
            border-radius: 9999px;
            color: rgba(255, 255, 255, .8);
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid transparent;
        }

        .item:hover,
        .item.active {
            background: rgba(60, 130, 255, .25);
            color: #fff;
            border-color: rgba(100, 160, 255, .4);
            box-shadow: 0 0 12px rgba(80, 140, 255, .35);
        }

        .main {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .top {
            background: rgba(255, 255, 255, .05);
            padding: 20px;
            color: #fff;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }

        .login {
            padding: 30px;
            flex: 1;
            overflow-y: auto;
        }

        .chat {
            display: none;
            flex-direction: column;
            flex: 1;
        }

        .user-info {
            padding: 12px 20px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .msg-box {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
        }

        .msg-item {
            max-width: 75%;
            width: fit-content;
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
        }

        .msg-item.me {
            margin-left: auto;
        }

        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-item.me .name-row {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: #444;
            border-radius: 50%;
        }

        .username {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
        }

        .bubble {
            padding: 10px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .msg-item.me .bubble {
            background: rgba(60, 120, 255, .25);
            margin-left: auto;
        }

        .uid {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
        }

        .msg-item.me .uid {
            text-align: right;
        }

        .input-box {
            display: flex;
            padding: 16px 20px;
            gap: 10px;
            align-items: center;
            margin-top: auto;
        }

        #msgInput {
            flex: 1;
            height: 44px;
            padding: 0 16px;
            border-radius: 24px;
            background: #262833;
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
            outline: none;
        }

        .input-box button {
            width: 70px;
            height: 44px;
            border-radius: 24px;
            background: #4080ff;
            color: #fff;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }

        .admin-btn {
            background: rgba(255, 80, 80, .3);
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            margin-left: 6px;
        }

        .admin-tag {
            position: absolute;
            left: 20px;
            bottom: 12px;
            color: #ff4d4d;
            font-size: 12px;
            text-shadow: 0 0 6px #ff4d4d;
            display: none;
        }

        .version {
            position: absolute;
            right: 18px;
            bottom: 12px;
            color: #888;
            font-size: 12px;
        }

        input, button.login-reg {
            border-radius: 16px;
            padding: 12px;
            background: #262833;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 10px;
            width: 100%;
            font-size: 15px;
            outline: none;
        }

        button.login-reg {
            background: #4080ff;
            cursor: pointer;
            font-weight: 500;
        }

        .auto-login {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sidebar">
        <div class="item active">聊天室</div>
        <div class="item" onclick="alert('开发中')">论坛</div>
        <div class="item" onclick="alert('开发中')">更新日志</div>
        <div class="item" onclick="alert('开发中')">开发规划</div>
    </div>

    <div class="main">
        <div class="top">
            <span>聊天室</span>
        </div>

        <div class="login" id="loginPage">
            <input id="user" placeholder="账号">
            <input id="pwd" placeholder="密码" type="password">
            <div class="auto-login">
                <input type="checkbox" id="autoLogin"> 10天自动登录
            </div>
            <button class="login-reg" onclick="reg()">注册</button>
            <button class="login-reg" onclick="login()">登录</button>
        </div>

        <div class="chat" id="chatPage">
            <div class="user-info">
                <span id="userInfoText"></span>
                <div>
                    <button class="admin-btn" id="clearBtn" style="display:none;" onclick="clearAllMsg()">清空</button>
                    <button class="admin-btn" id="delBtn" style="display:none;" onclick="deleteLastMsg()">撤回</button>
                </div>
            </div>
            <div class="msg-box" id="msgBox"></div>

            <div class="input-box">
                <input id="msgInput" placeholder="输入消息...">
                <button onclick="sendMsg()">发送</button>
            </div>
        </div>

        <div class="admin-tag" id="adminTag">管理员</div>
        <div class="version">V2.0</div>
    </div>
</div>

<script>
    let username = localStorage.getItem("username") || "";
    let uid = localStorage.getItem("uid") || "";
    let autoLogin = localStorage.getItem("autoLogin") === "true";

    window.onload = async function () {
        if (autoLogin && username && uid) {
            loginSuccess(username, uid);
        }
    };

    // 登录
    async function login() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        const auto = document.getElementById("autoLogin").checked;
        if (!user || !pwd) return alert("请输入账号密码");

        const res = await fetch(`/api/chat?act=login&user=${user}&pwd=${pwd}`);
        const data = await res.json();
        if (data.ok) {
            loginSuccess(user, data.uid);
            if (auto) {
                localStorage.setItem("username", user);
                localStorage.setItem("uid", data.uid);
                localStorage.setItem("autoLogin", "true");
            }
        } else {
            alert("账号或密码错误");
        }
    }

    // 注册
    async function reg() {
        const user = document.getElementById("user").value.trim();
        const pwd = document.getElementById("pwd").value.trim();
        if (!user || !pwd) return alert("请输入账号密码");
        const res = await fetch(`/api/chat?act=reg&user=${user}&pwd=${pwd}`);
        const data = await res.json();
        alert(data.ok ? "注册成功" : "用户名已存在");
    }

    // 登录成功
    function loginSuccess(user, myUid) {
        username = user;
        uid = parseInt(myUid);
        document.getElementById("loginPage").style.display = "none";
        document.getElementById("chatPage").style.display = "flex";
        document.getElementById("userInfoText").innerText = `${username} (UID:${uid})`;

        // 管理员权限
        if (username === "Ratstudio") {
            document.getElementById("clearBtn").style.display = "inline-block";
            document.getElementById("delBtn").style.display = "inline-block";
            document.getElementById("adminTag").style.display = "block";
        }
        startSync();
    }

    // 发送
    async function sendMsg() {
        const i = document.getElementById("msgInput");
        const msg = i.value.trim();
        if (!msg) return;
        await fetch(`/api/chat?act=send&user=${username}&msg=${encodeURIComponent(msg)}`);
        i.value = "";
        syncMsg();
    }

    // 消息同步
    async function syncMsg() {
        const res = await fetch("/api/chat?act=list");
        const list = await res.json();
        const box = document.getElementById("msgBox");
        box.innerHTML = "";

        list.forEach((item, index) => {
            const isMe = item.user === username;
            const div = document.createElement("div");
            div.className = "msg-item " + (isMe ? "me" : "");
            const showMsg = item.msg.replace(/\n/g, "<br>");
            div.innerHTML = `
                <div class="name-row">
                    <div class="avatar"></div>
                    <div class="username">${item.user}</div>
                </div>
                <div class="bubble">${showMsg}</div>
                <div class="uid">UID: ${item.uid}</div>
            `;
            box.appendChild(div);
        });

        box.scrollTop = box.scrollHeight;
    }

    // Shift+Enter 换行
    document.getElementById("msgInput").addEventListener("keydown", e => {
        if (e.key === "Enter") {
            if (e.shiftKey) return;
            e.preventDefault();
            sendMsg();
        }
    });

    // 清空
    async function clearAllMsg() {
        if (!confirm("确定清空全部消息？")) return;
        await fetch(`/api/chat?act=clear&uid=${uid}`);
        syncMsg();
    }

    // 撤回最后一条（管理员）
    async function deleteLastMsg() {
        await fetch(`/api/chat?act=delete&uid=${uid}&index=-1`);
        syncMsg();
    }

    function startSync() {
        syncMsg();
        setInterval(syncMsg, 2500);
    }
</script>
</body>
</html>
