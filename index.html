<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>聊天室 - RatStudio的小站</title>
<style>
/* 全局重置 */
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Robintosh, sans-serif}
body{background:#f5f5f5;color:#333;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}

/* 新版贴吧风格UI */
.container{
  width:680px;height:750px;border-radius:20px;overflow:hidden;
  background:#fff;box-shadow:0 10px 40px rgba(0,0,0,0.1);
  display:flex;position:relative;
}
.sidebar{
  width:150px;background:#fafafa;border-right:1px solid #eee;
  display:flex;flex-direction:column;padding:20px 10px;gap:8px;
}
.item{
  padding:12px 14px;border-radius:12px;text-align:center;
  font-size:14px;color:#666;cursor:pointer;
}
.item.active{background:#e8f3ff;color:#0066cc;font-weight:500}
.main{flex:1;display:flex;flex-direction:column}
.top-bar{
  padding:16px 20px;background:#fff;border-bottom:1px solid #eee;
  display:flex;justify-content:space-between;align-items:center;
}
.top-bar h2{font-size:18px;font-weight:600}
.old-ui-btn{
  padding:6px 12px;background:#eee;border:none;border-radius:8px;
  font-size:13px;cursor:pointer;color:#555;
}

/* 消息气泡 - 贴吧简洁风 */
.msg-box{flex:1;padding:16px 20px;overflow-y:auto;background:#f9f9f9}
.msg-item{margin-bottom:12px;max-width:80%}
.msg-item.me{margin-left:auto}
.bubble{
  padding:10px 14px;border-radius:16px;background:#fff;border:1px solid #eee;
  font-size:14px;line-height:1.5
}
.msg-item.me .bubble{background:#0066cc;color:#fff;border:none}
.name{font-size:12px;color:#999;margin-bottom:4px}
.uid{font-size:11px;color:#ccc;margin-top:4px}
.revoke-btn{font-size:12px;color:#ff4d4f;background:none;border:none;cursor:pointer;margin-left:6px}

/* 输入框 */
.input-box{
  padding:10px 16px;border-top:1px solid #eee;display:flex;gap:10px;
  background:#fff;
}
#msgInput{
  flex:1;height:40px;border-radius:20px;padding:0 16px;
  border:1px solid #eee;background:#fafafa;outline:none;
}
.input-box button{
  width:60px;border-radius:20px;background:#0066cc;color:#fff;border:none;cursor:pointer;
}

/* 旧版UI覆盖样式 */
.old-ui .container{
  background:rgba(255,255,255,.04);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1);
}
.old-ui body{background:linear-gradient(135deg,#0f1419,#0a0c12);color:#fff}
.old-ui .sidebar{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
.old-ui .item{color:rgba(255,255,255,.8)}
.old-ui .top-bar{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.08)}
.old-ui .msg-box{background:transparent}
.old-ui .bubble{background:rgba(255,255,255,.07);color:#fff;border-color:rgba(255,255,255,.1)}
.old-ui .input-box{background:#0f1419;border-color:rgba(255,255,255,.08)}
.old-ui #msgInput{background:#262833;border-color:rgba(255,255,255,.15);color:#fff}

/* 其他原有样式保留 */
.login{padding:30px}
.login input{width:100%;padding:12px;margin-bottom:10px;border-radius:12px;border:1px solid #eee;outline:none}
.old-ui .login input{background:#262833;border-color:rgba(255,255,255,.15);color:#fff}
.user-info{padding:12px 20px;color:#666;display:flex;justify-content:space-between}
.old-ui .user-info{color:#ccc}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="item active">聊天室</div>
    <div class="item" onclick="location.href='forum.html'">论坛</div>
    <div class="item" onclick="location.href='history.html'">更新日志</div>
    <div class="item" onclick="location.href='plan.html'">开发计划</div>
  </div>
  <div class="main">
    <div class="top-bar">
      <h2>聊天室</h2>
      <button class="old-ui-btn" onclick="toggleOldUI()">旧版UI</button>
    </div>
    <div id="loginPage" style="flex:1;padding:30px;display:none">
      <input id="user" placeholder="账号">
      <input id="pwd" placeholder="密码" type="password">
      <button onclick="login()" style="width:100%;padding:12px;background:#0066cc;color:#fff;border:none;border-radius:12px;margin-top:10px">登录</button>
      <button onclick="reg()" style="width:100%;padding:12px;background:#eee;border:none;border-radius:12px;margin-top:10px">注册</button>
    </div>
    <div id="chatPage" style="display:none;flex-direction:column;flex:1">
      <div class="user-info">
        <span id="userInfoText"></span>
        <div>
          <button onclick="clearAllMsg()" style="padding:6px 10px;background:#eee;border:none;border-radius:8px">清空</button>
          <button onclick="logout()" style="padding:6px 10px;background:#eee;border:none;border-radius:8px;margin-left:6px">退出</button>
        </div>
      </div>
      <div class="msg-box" id="msgBox"></div>
      <div class="input-box">
        <input id="msgInput" placeholder="输入消息...">
        <button onclick="sendMsg()">发送</button>
      </div>
    </div>
  </div>
</div>

<script>
// UI切换
function toggleOldUI(){
  document.body.classList.toggle("old-ui");
  localStorage.setItem("oldUI", document.body.classList.contains("old-ui"));
}
window.onload = () => {
  if(localStorage.getItem("oldUI") === "true"){
    document.body.classList.add("old-ui");
  }
}

// 原有逻辑
let username = "", uid = "";
const API = "/api";

window.onloadExtra = () => {
  let u = localStorage.getItem("username");
  let id = localStorage.getItem("uid");
  if(u&&id){ username=u; uid=id; loginSuccess(); }
};
setTimeout(window.onloadExtra,10);

function logout(){
  localStorage.clear();
  username="";uid="";
  document.getElementById("chatPage").style.display="none";
  document.getElementById("loginPage").style.display="block";
}

async function login(){
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  let r = await fetch(`${API}/login?user=${user}&pwd=${pwd}`);
  let t = await r.text();
  if(!t){alert("错误");return;}
  localStorage.setItem("username",user);
  localStorage.setItem("uid",t);
  username=user;uid=t;
  loginSuccess();
}

async function reg(){
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  let r = await fetch(`${API}/reg?user=${user}&pwd=${pwd}`);
  let t = await r.text();
  alert(t==="ok"?"成功":"已存在");
}

function loginSuccess(){
  document.getElementById("loginPage").style.display="none";
  document.getElementById("chatPage").style.display="flex";
  document.getElementById("userInfoText").innerText=username+" ("+uid+")";
  loadMsg();
  setInterval(loadMsg,2000);
}

async function sendMsg(){
  let txt = document.getElementById("msgInput").value.trim();
  if(!txt)return;
  await fetch(`${API}/send?uid=${uid}&msg=${txt}`);
  document.getElementById("msgInput").value="";
  loadMsg();
}

async function loadMsg(){
  let r = await fetch(`${API}/msg`);
  let list = await r.json();
  let box = document.getElementById("msgBox");
  box.innerHTML = "";
  list.forEach((m,i)=>{
    let isMe = m.uid==uid;
    let btn = (isMe || uid==1) ? `<button class="revoke-btn" onclick="revoke(${i})">撤回</button>` : "";
    box.innerHTML += `
      <div class="msg-item ${isMe?'me':''}">
        <div class="name">${m.user} ${btn}</div>
        <div class="bubble">${m.msg}</div>
        <div class="uid">UID:${m.uid}</div>
      </div>
    `;
  });
  setTimeout(()=>box.scrollTop=box.scrollHeight,0);
}

async function revoke(i){
  if(!confirm("确定？"))return;
  await fetch(`${API}?act=deleteMsg&uid=${uid}&targetId=${i}`);
  loadMsg();
}

async function clearAllMsg(){
  await fetch(`${API}/clear?uid=${uid}`);
  loadMsg();
}
</script>
</body>
</html>
