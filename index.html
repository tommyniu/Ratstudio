<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊天室 - RatStudio</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:system-ui }
body {
  background: linear-gradient(135deg,#0f1419,#0a0c12);
  color: #fff;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.top-bar {
  padding: 16px 20px;
  background: rgba(255,255,255,.05);
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.nav a {
  color: #aaa;
  text-decoration: none;
  margin-left: 16px;
}
.nav a.active { color:#4080ff; font-weight:bold }

#msgBox {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
}
.msg {
  padding: 10px 14px;
  background: rgba255,255,255,.07;
  background: rgba(255,255,255,.07);
  border-radius: 12px;
  margin-bottom: 10px;
  max-width: 90%;
  position: relative;
}
.msg.admin {
  border: 1px solid rgba(64,128,255,.3);
}
.msg .name {
  font-size: 13px;
  color: #8cf;
  margin-bottom: 4px;
}
.msg .content {
  font-size: 14px;
  line-height: 1.5;
}
.del-btn {
  margin-left: 10px;
  font-size: 12px;
  color: #f66;
  background: transparent;
  border: none;
  cursor: pointer;
}

.input-wrap {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,.08);
  display: flex;
  gap: 10px;
}
#msgInput {
  flex:1;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 12px;
  padding: 12px 16px;
  color: #fff;
  outline: none;
}
#sendBtn {
  padding: 12px 20px;
  background: #4080ff;
  border: none;
  border-radius: 12px;
  color: #fff;
  cursor: pointer;
}

.login-mask {
  position: fixed;
  inset:0;
  background: rgba(0,0,0,.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 999;
}
.login-pop {
  background: #1a1c25;
  padding: 30px;
  border-radius: 20px;
  width: 90%;
  max-width: 360px;
  border: 1px solid rgba(255,255,255,.15);
}
.login-pop input {
  width:100%;
  margin-bottom: 12px;
  padding: 12px;
  background: #262833;
  border: 1px solid rgba(255,255,255,.15);
  border-radius: 12px;
  color: #fff;
  outline: none;
}
.login-pop button {
  width: 100%;
  padding: 12px;
  background: #4080ff;
  border: none;
  border-radius: 12px;
  color: #fff;
  margin-bottom: 8px;
  cursor: pointer;
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="title">公共聊天室</div>
  <div class="nav">
    <a href="index.html" class="active">聊天</a>
    <a href="forum.html">论坛</a>
    <a href="history.html">更新日志</a>
    <a href="plan.html">开发规划</a>
  </div>
</div>

<div id="msgBox"></div>

<div class="input-wrap">
  <input type="text" id="msgInput" placeholder="输入消息..." autocomplete="off">
  <button id="sendBtn">发送</button>
</div>

<!-- 登录弹窗 -->
<div class="login-mask" id="loginMask">
  <div class="login-pop">
    <input id="userName" placeholder="用户名">
    <input id="userPwd" placeholder="密码" type="password">
    <button onclick="login()">登录</button>
    <button onclick="reg()">注册</button>
  </div>
</div>

<script>
const API = "/api";
let myUid = localStorage.getItem('uid') || "";
let myName = localStorage.getItem('username') || "";
const ADMIN_UID = 1;

// 未登录弹出登录框
function checkLogin() {
  if(!myUid || !myName) {
    document.getElementById('loginMask').style.display = 'flex';
  } else {
    document.getElementById('loginMask').style.display = 'none';
    loadMsg();
  }
}

// 登录
async function login() {
  let user = document.getElementById('userName').value.trim();
  let pwd = document.getElementById('userPwd').value.trim();
  if(!user||!pwd) return alert('请填写账号密码');
  let res = await fetch(`${API}/api/login?user=${user}&pwd=${pwd}`);
  let uid = await res.text();
  if(!uid) return alert('账号密码错误');
  localStorage.setItem('username',user);
  localStorage.setItem('uid',uid);
  myUid = uid;
  myName = user;
  location.reload();
}

// 注册
async function reg() {
  let user = document.getElementById('userName').value.trim();
  let pwd = document.getElementById('userPwd').value.trim();
  if(!user||!pwd) return alert('请填写账号密码');
  let res = await fetch(`${API}/api/reg?user=${user}&pwd=${pwd}`);
  let txt = await res.text();
  if(txt === 'no') return alert('用户名已存在');
  alert('注册成功，请登录');
}

// 加载消息
async function loadMsg() {
  let res = await fetch(`${API}/api/msg?_=${Date.now()}`);
  let list = await res.json();
  let box = document.getElementById('msgBox');
  box.innerHTML = '';

  list.forEach((item, idx) => {
    let canDel = (Number(myUid) === item.uid) || (Number(myUid) === ADMIN_UID);
    let html = `
    <div class="msg ${item.isAdmin?'admin':''}">
      <div class="name">${item.user} ${item.isAdmin?'【管理员】':''}</div>
      <div class="content">${item.msg}
        ${canDel ? `<button class="del-btn" onclick="delMsg(${idx})">撤回</button>` : ''}
      </div>
    </div>
    `;
    box.innerHTML += html;
  });
  box.scrollTop = box.scrollHeight;
}

// 撤回指定消息
async function delMsg(idx) {
  if(!confirm('确定撤回这条消息？')) return;
  let res = await fetch(`${API}?act=deleteMsg&uid=${myUid}&targetId=${idx}`);
  let txt = await res.text();
  if(txt === 'ok') {
    loadMsg();
  } else {
    alert('无权撤回');
  }
}

// 发送消息
document.getElementById('sendBtn').onclick = sendMsg;
document.getElementById('msgInput').onkeydown = e => {
  if(e.key === 'Enter') sendMsg();
};

async function sendMsg() {
  let val = document.getElementById('msgInput').value.trim();
  if(!val) return;
  await fetch(`${API}/api/send?uid=${myUid}&msg=${encodeURIComponent(val)}`);
  document.getElementById('msgInput').value = '';
  loadMsg();
}

// 轮询刷新
setInterval(loadMsg,2000);
checkLogin();
</script>
</body>
</html>
