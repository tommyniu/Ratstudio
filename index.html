<script>
let username = "", uid = "";
const ADMIN = "Ratstudio";

window.onload = function () {
  let u = localStorage.getItem("username");
  let id = localStorage.getItem("uid");
  if (u && id) { username = u; uid = id; loginSuccess(); }
};

// ✅ 登录：和后端对齐
async function login() {
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  fetch(`/?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`)
  .then(r=>r.text()).then(t=>{
    if(!t){alert("登录失败");return;}
    localStorage.setItem("username", user);
    localStorage.setItem("uid", t);
    username = user; uid = t; loginSuccess();
  });
}

// ✅ 注册：和后端对齐
async function reg() {
  let user = document.getElementById("user").value;
  let pwd = document.getElementById("pwd").value;
  fetch(`/?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`)
  .then(r=>r.text()).then(t=>{ alert(t==="ok"?"注册成功":"已存在"); });
}

function loginSuccess() {
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("chatPage").style.display = "flex";
  document.getElementById("userInfoText").innerText = username + " (" + uid + ")";
  if (username === ADMIN) {
    document.getElementById("clearBtn").style.display = "inline-block";
    document.getElementById("delBtn").style.display = "inline-block";
    document.getElementById("bottomAdminTip").style.display = "block";
  }
  loadMsg();
}

// ✅ 发送消息：和后端对齐
async function sendMsg() {
  let txt = document.getElementById("msgInput").value;
  if (!txt) return;
  fetch(`/?act=send&uid=${uid}&msg=${encodeURIComponent(txt)}`)
  .then(()=>{ document.getElementById("msgInput").value = ""; loadMsg(); });
}

// ✅ 加载消息：和后端对齐
async function loadMsg() {
  fetch("/?act=msg")
  .then(r=>r.json())
  .then(list=>{
    let box = document.getElementById("msgBox");
    box.innerHTML = "";
    list.forEach(m=>{
      let div = document.createElement("div");
      div.className = "msg-item " + (m.uid == uid ? "me" : "");
      let adminBadge = m.user === ADMIN ? '<span class="admin-tag">管理员</span>' : "";
      div.innerHTML = `
        <div class="msg-wrap">
          <div class="name-row"><div class="avatar"></div><div class="username">${m.user}</div>${adminBadge}</div>
          <div class="bubble">${m.msg}</div>
          <div class="uid">UID:${m.uid}</div>
        </div>`;
      box.appendChild(div);
    });
    box.scrollTop = box.scrollHeight;
  });
}

// ✅ 管理员功能：和后端对齐
async function clearAllMsg() { fetch(`/?act=clear&uid=${uid}`).then(loadMsg); }
async function deleteLastMsg() { fetch(`/?act=delete&uid=${uid}`).then(loadMsg); }
</script>
