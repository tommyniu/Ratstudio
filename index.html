<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>主页 - RatStudio的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f8fa;padding-top:80px}

.container{max-width:1000px;margin:0 auto;padding:0 20px}
.welcome{background:#fff;padding:30px;border-radius:16px;margin-bottom:20px}
.welcome h1{font-size:22px;margin-bottom:10px}
.welcome p{color:#666}

.quick{background:#fff;padding:24px;border-radius:16px;margin-bottom:20px}
.quick h3{margin-bottom:16px}
.quick .items{display:flex;gap:16px;flex-wrap:wrap}
.quick .item{padding:12px 16px;background:#f5f5f5;border-radius:8px;color:#333;text-decoration:none}
.quick .item:hover{background:#e8f0fe}

.recommend{background:#fff;padding:24px;border-radius:16px}
.recommend h3{margin-bottom:16px}
.random-btn{padding:10px 16px;background:#0066cc;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-bottom:16px}
.post-item{padding:16px;border-bottom:1px solid #eee}
.post-item:last-child{border-bottom:none}
.post-item .title{font-weight:bold;margin-bottom:6px}
.post-item .info{font-size:12px;color:#999}
.post-item a{color:#0066cc;text-decoration:none}
</style>
</head>

<body>

<div id="navContainer"></div>

<div class="container">
  <div class="welcome">
    <h1>👋 <span id="nick">游客</span>，欢迎回来</h1>
    <p id="randomMsg">正在加载…</p>
  </div>

  <div class="quick">
    <h3>⚡ 快捷导航</h3>
    <div class="items">
      <a class="item" href="forum.html">进入论坛</a>
      <a class="item" href="chat.html">聊天室</a>
      <a class="item" href="personal.html">个人中心</a>
    </div>
  </div>

  <div class="recommend">
    <h3>📌 每日推荐</h3>
    <button class="random-btn" id="randomBtn">🎲 随机抽取一篇帖子</button>
    <div id="randomPost"></div>
  </div>
</div>

<script>
// 加载导航栏 + 自动刷新用户信息
fetch('nav.html')
.then(res => res.text())
.then(html => {
  document.getElementById('navContainer').innerHTML = html;

  // 刷新用户状态（安全、不冲突、不白屏）
  let u = localStorage.getItem('username');
  let uid = localStorage.getItem('uid');

  if(u && uid){
    document.getElementById('miniName').innerText = u;
    document.getElementById('miniUid').innerText = uid;
    document.getElementById('logoutBtn').style.display = 'block';
    document.getElementById('nick').innerText = u;

    // 退出登录
    document.getElementById('logoutBtn').onclick = function(){
      if(confirm('确定退出登录？')){
        localStorage.clear();
        location.href = 'index.html';
      }
    }

    // 头像点击
    document.getElementById('topAvatar').onclick = function(){
      location.href = 'personal.html?uid='+uid;
    }
  }else{
    document.getElementById('logoutBtn').style.display = 'none';
  }
});

// 欢迎语
const msgs = [
  "系统就绪，愿今天的代码无BUG。",
  "一切正常，开始你的创作吧。",
  "终端已唤醒，任务加载完成。",
  "环境准备完毕，随时可以开工。",
  "服务运行中，祝你思路清晰。",
  "初始化完成，今日状态：稳定。",
  "像 OpenClaw 一样，随时待命。"
];
document.getElementById('randomMsg').innerText = msgs[Math.floor(Math.random()*msgs.length)];

// 随机帖子
let posts = [];
fetch('forum.html').then(r=>r.text()).then(h=>{
  let d = document.createElement('div');
  d.innerHTML = h;
  d.querySelectorAll('a.post-link').forEach(a=>{
    posts.push({title:a.innerText, link:a.href});
  });
});

document.getElementById('randomBtn').onclick = function(){
  if(posts.length === 0){
    document.getElementById('randomPost').innerHTML = '<div class="post-item">暂无帖子</div>';
    return;
  }
  let p = posts[Math.floor(Math.random()*posts.length)];
  document.getElementById('randomPost').innerHTML = `
    <div class="post-item">
      <div class="title"><a href="${p.link}">${p.title}</a></div>
      <div class="info">来自论坛</div>
    </div>`;
}
</script>

</body>
</html>
