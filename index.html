<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天室 - Ratstudio的小站</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui
        }
        body {
            background: linear-gradient(135deg, #0f1419, #0a0c19);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            margin: 0;
        }
        .container {
            display: flex;
            width: 680px;
            height: 750px;
            border-radius: 44px;
            overflow: hidden;
            background: rgba(255, 255, 255, .04);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 0 50px rgba(60, 120, 255, 0.25);
        }
        .sidebar {
            width: 140px;
            background: rgba(255, 255, 255, .05);
            padding: 30px 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-right: 1px solid rgba(255, 255, 255, .08);
            border-radius: 44px 0 0 44px;
        }
        .item {
            padding: 14px;
            border-radius: 9999px;
            color: #ffffff;
            text-align: center;
            cursor: pointer;
            transition: all .2s;
            border: 1px solid transparent;
        }
        .item:hover, .item.active {
            background: rgba(60, 130, 255, .25);
            color: #fff;
            border-color: rgba(100, 160, 255, .4);
            box-shadow: 0 0 12px rgba(80, 140, 255, .35);
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding-bottom: 0;
            position: relative;
        }
        .top {
            padding: 20px;
            color: #fff;
            font-weight: 600;
            border-bottom: 1px solid rgba(255, 255, 255, .08);
        }
        .login {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }
        .chat {
            display: none;
            flex-direction: column;
            height: 100%;
        }
        .user-info {
            padding: 12px 20px;
            color: #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .msg-box {
            flex: 1;
            padding: 10px 20px;
            overflow-y: auto;
            margin-bottom: 0;
        }
        .msg-item {
            display: flex;
            width: 100%;
            margin-bottom: 16px;
        }
        .msg-item.me {
            justify-content: flex-end;
        }
        .bubble {
            max-width: 75%;
            width: fit-content;
            padding: 10px 14px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .msg-item.me .bubble {
            background: rgba(60, 120, 255, .25);
            text-align: right;
        }
        .name-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 4px;
        }
        .msg-item.me .name-row {
            flex-direction: row-reverse;
            justify-content: flex-end;
        }
        .avatar {
            width: 32px;
            height: 32px;
            background: #444;
            border-radius: 50%;
        }
        .username {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.75);
        }
        .uid {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 4px;
            text-align: left;
        }
        .msg-item.me .uid {
            text-align: right;
        }
        /* 输入框贴底 永久不被挤飞 */
        .input-box {
            display: flex;
            align-items: center;
            padding: 12px 16px;
            gap: 10px;
            border-top: 1px solid rgba(255, 255, 255, .08);
            background: rgba(255,255,255,.04);
            width: 100%;
            flex-shrink: 0;
        }
        #msgInput {
            flex: 1;
            height: 44px;
            border-radius: 24px;
            padding: 0 16px;
            background: #262833;
            border: 1px solid rgba(255, 255, 255, .15);
            color: #fff;
            outline: none;
        }
        .input-box button {
            width: 70px;
            height: 44px;
            border-radius: 24px;
            background: #4080ff;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        .admin-btn {
            background: rgba(255, 80, 80, .3);
            border: none;
            padding: 6px 10px;
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            margin-left: 6px;
        }
        .admin-tag {
            position: absolute;
            left: 20px;
            bottom: 10px;
            color: #ff4d4d;
            font-size: 12px;
            display: none;
            z-index: 10;
        }
        .version {
            position: absolute;
            right: 20px;
            bottom: 10px;
            color: #888;
            font-size: 12px;
            z-index: 10;
        }
        input, button.login-reg {
            border-radius: 16px;
            padding: 12px;
            background: #262833;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
            margin-bottom: 10px;
            width: 100%;
            font-size: 15px;
            outline: none;
        }
        button.login-reg {
            background: #4080ff;
            cursor: pointer;
        }
        .auto-login {
            color: #fff;
            font-size: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="item active" onclick="switchTab(0)">聊天室</div>
        <div class="item" onclick="switchTab(1)">论坛</div>
        <div class="item" onclick="switchTab(2)">更新日志</div>
        <div class="item" onclick="switchTab(3)">开发规划</div>
    </div>
    <div class="main">
        <div class="top"><span>聊天室</span></div>

        <div class="login" id="loginPage">
            <input id="user" placeholder="账号">
            <input id="pwd" placeholder="密码" type="password">
            <div class="auto-login">
                <input type="checkbox" id="autoLogin"> 10天自动登录
            </div>
            <button class="login-reg" onclick="reg()">注册</button>
            <button class="login-reg" onclick="login()">登录</button>
        </div>

        <div class="chat" id="chatPage">
            <div class="user-info">
                <span id="userInfoText"></span>
                <div>
                    <button class="admin-btn" id="clearBtn" style="display:none;" onclick="clearAllMsg()">清空</button>
                    <button class="admin-btn" id="delBtn" style="display:none;" onclick="deleteLastMsg()">撤回</button>
                </div>
            </div>
            <div class="msg-box" id="msgBox"></div>
            <div class="input-box">
                <input id="msgInput" placeholder="Shift+Enter换行">
                <button onclick="sendMsg()">发送</button>
            </div>
        </div>

        <div class="admin-tag" id="adminTag">管理员</div>
        <div class="version">V1.4.1 最终修复版</div>
    </div>
</div>

<script>
    let username = "";
    let uid = 0;

    // 侧边栏切换 + 敬请期待
    function switchTab(index) {
        const items = document.querySelectorAll('.item');
        items.forEach(i => i.classList.remove('active'));
        items[index].classList.add('active');
        if (index !== 0) {
            alert('敬请期待');
        }
    }

    window.onload = async function () {
        const autoLogin = localStorage.getItem("autoLogin") === "true";
        const un = localStorage.getItem("username");
        const u = parseInt(localStorage.getItem("uid")||"0");
        if(autoLogin && un && u>0){
            username = un;
            uid = u;
            loginSuccess();
        }
    };

    async function login(){
        let user = document.getElementById("user").value.trim();
        let pwd = document.getElementById("pwd").value.trim();
        let auto = document.getElementById("autoLogin").checked;
        let res = await fetch(`/api/chat?act=login&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        let d = await res.json();
        if(d.ok){
            username = user;
            uid = parseInt(d.uid);
            if(auto){
                localStorage.setItem("username",username);
                localStorage.setItem("uid",uid);
                localStorage.setItem("autoLogin","true");
            }
            loginSuccess();
        }else alert("账号密码错误");
    }

    async function reg(){
        let user = document.getElementById("user").value.trim();
        let pwd = document.getElementById("pwd").value.trim();
        let res = await fetch(`/api/chat?act=reg&user=${encodeURIComponent(user)}&pwd=${encodeURIComponent(pwd)}`);
        let d = await res.json();
        alert(d.ok?"注册成功":"用户名已存在");
    }

    function loginSuccess(){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("chatPage").style.display="flex";
        document.getElementById("userInfoText").innerText = `${username} (UID:${uid})`;
        if(username === "Ratstudio"){
            document.getElementById("clearBtn").style.display="inline-block";
            document.getElementById("delBtn").style.display="inline-block";
            document.getElementById("adminTag").style.display="block";
        }
        startSync();
    }

    async function sendMsg(){
        let inp = document.getElementById("msgInput");
        let val = inp.value;
        if(!val.trim())return;
        await fetch(`/api/chat?act=send&user=${encodeURIComponent(username)}&msg=${encodeURIComponent(val)}`);
        inp.value = "";
        syncMsg();
    }

    async function syncMsg(){
        let res = await fetch("/api/chat?act=list");
        let list = await res.json();
        let box = document.getElementById("msgBox");

        // ---------- 关键修复：记录是否在底部 ----------
        const isAtBottom = box.scrollHeight - box.scrollTop - box.clientHeight <= 10;
        // ------------------------------------------------

        box.innerHTML = "";
        list.forEach(item=>{
            let showUser = item.user || "未知用户";
            let itemUid = parseInt(item.uid||"0");
            let isMe = item.user === username;
            
            let div = document.createElement("div");
            div.className = "msg-item " + (isMe ? "me" : "");
            
            div.innerHTML = `
                <div class="bubble">
                    <div class="name-row">
                        <div class="avatar"></div>
                        <div class="username">${showUser}</div>
                    </div>
                    ${item.msg.replace(/\n/g,"<br>")}
                    <div class="uid">UID:${itemUid}</div>
                </div>
            `;
            box.appendChild(div);
        });

        // ---------- 关键修复：只有在底部时才自动滚到底 ----------
        if (isAtBottom) {
            box.scrollTop = box.scrollHeight;
        }
        // ------------------------------------------------
    }

    document.getElementById("msgInput").addEventListener("keydown",e=>{
        if(e.key==="Enter"){
            if(e.shiftKey)return;
            e.preventDefault();
            sendMsg();
        }
    });

    async function clearAllMsg(){
        if(!confirm("确定清空全部消息？"))return;
        await fetch(`/api/chat?act=clear&uid=${uid}`);
        syncMsg();
    }
    async function deleteLastMsg(){
        await fetch(`/api/chat?act=delete&uid=${uid}`);
        syncMsg();
    }

    function startSync(){
        syncMsg();
        setInterval(syncMsg,2500);
    }
</script>
</body>
</html>
