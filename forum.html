<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>论坛 - RatStudio的小站</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f4f5f7;
  color: #333;
}

/* 容器全屏 */
.container {
  margin-top: 56px;
  height: calc(100% - 56px);
  position: relative;
}

/* 列表页 + 详情页 全屏覆盖 */
.page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  background: #f4f5f7;
  padding: 20px;
  display: none;
}
.page.active {
  display: block;
}

/* 内容居中 */
.content-wrap {
  max-width: 750px;
  margin: 0 auto;
}

/* 排序栏 */
.sort-bar {
  background: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  font-size: 14px;
}
.sort-item {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.sort-item.active {
  background: #0066cc;
  color: #fff;
}

/* 帖子卡片 */
.post-card {
  background: #fff;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  border: 1px solid #e5e6eb;
}
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.post-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #0066cc;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.post-username {
  font-size: 14px;
  font-weight: 500;
}
.post-time {
  font-size: 12px;
  color: #999;
  margin-left: auto;
}
.post-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 6px;
}
.post-content-preview {
  font-size: 14px;
  color: #666;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.post-actions {
  display: flex;
  gap: 18px;
  font-size: 13px;
  color: #666;
}
.post-action {
  cursor: pointer;
}

/* 帖子详情 */
.detail-card {
  background: #fff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
}
.detail-title {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 12px;
}
.detail-content {
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 16px;
}
.back-btn {
  background: #fff;
  border: 1px solid #e5e6eb;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 12px;
}

/* 评论区 */
.comment-list {
  background: #fff;
  border-radius: 8px;
  padding: 16px;
}
.comment-item {
  padding: 12px 0;
  border-bottom: 1px solid #f2f2f2;
}
.comment-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #0066cc;
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  vertical-align: top;
}
.comment-user {
  display: inline-flex;
  flex-direction: column;
  margin-left: 8px;
}
.comment-name {
  font-size: 14px;
}
.comment-time {
  font-size: 12px;
  color: #999;
}
.comment-text {
  margin-left: 40px;
  font-size: 14px;
  margin-top: 4px;
}
.comment-actions {
  margin-left: 40px;
  font-size: 12px;
  color: #999;
  margin-top: 4px;
}
.comment-action {
  margin-right: 12px;
  cursor: pointer;
}

/* 评论框 */
.comment-input-bar {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.comment-input {
  flex: 1;
  height: 40px;
  padding: 0 14px;
  border: 1px solid #e5e6eb;
  border-radius: 20px;
  outline: none;
}
.comment-send {
  padding: 0 18px;
  background: #0066cc;
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* 发帖按钮 */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  background: #0066cc;
  color: #fff;
  border-radius: 50%;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 10px #00000030;
  z-index: 999;
}

/* 发帖弹窗 */
.mask {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.pop {
  background: #fff;
  width: 90%;
  max-width: 500px;
  border-radius: 12px;
  padding: 24px;
  position: relative;
}
.pop-close {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 20px;
  cursor: pointer;
  background: none;
  border: none;
}
.pop input, .pop textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #e5e6eb;
  border-radius: 8px;
  margin-bottom: 12px;
  outline: none;
}
.pop button {
  width: 100%;
  padding: 12px;
  background: #0066cc;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>

<body>
  <div id="navContainer"></div>

  <!-- 发帖悬浮按钮 -->
  <div class="fab" onclick="showPost()">+</div>

  <div class="container">
    <!-- 列表页 -->
    <div class="page active" id="listPage">
      <div class="content-wrap">
        <div class="sort-bar">
          <div class="sort-item active" data-sort="new">倒序（最新）</div>
          <div class="sort-item" data-sort="old">正序（最早）</div>
          <div class="sort-item" data-sort="hot">热度（点赞）</div>
        </div>
        <div id="postList"></div>
      </div>
    </div>

    <!-- 详情页（全屏覆盖） -->
    <div class="page" id="detailPage">
      <div class="content-wrap">
        <button class="back-btn" onclick="goBack()">← 返回列表</button>
        <div id="detailContainer"></div>

        <div class="comment-list">
          <div id="commentListContainer"></div>
          <div class="comment-input-bar">
            <input class="comment-input" id="commentInput" placeholder="发表评论">
            <button class="comment-send" onclick="submitComment()">发表</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 发帖弹窗 -->
  <div class="mask" id="postMask">
    <div class="pop">
      <button class="pop-close" onclick="closePost()">×</button>
      <input id="postTitle" placeholder="标题">
      <textarea id="postContent" rows="5" placeholder="内容"></textarea>
      <button onclick="doPost()">发布帖子</button>
    </div>
  </div>

<script>
// 加载导航
function loadNav() {
  fetch('nav.html').then(r=>r.text()).then(h=>{
    document.getElementById('navContainer').innerHTML = h;
    let u = localStorage.getItem('username');
    let id = localStorage.getItem('uid');
    if (u && id) {
      document.getElementById('topAvatar').innerText = u.charAt(0).toUpperCase();
      document.getElementById('miniName').innerText = u;
      document.getElementById('miniUid').innerText = id;
      document.getElementById('logoutBtn').style.display = 'block';
    } else {
      document.getElementById('topAvatar').innerText = 'U';
      document.getElementById('miniName').innerText = '游客';
      document.getElementById('miniUid').innerText = '未登录';
      document.getElementById('logoutBtn').style.display = 'none';
    }
  });
}

let username = localStorage.getItem('username');
let uid = localStorage.getItem('uid');
const API = '/api';
let posts = [];
let comments = [];
let currentPost = null;
let sortType = 'new';

window.onload = async () => {
  loadNav();
  await loadData();
  renderPosts();

  // 排序切换
  document.querySelectorAll('.sort-item').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.sort-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      sortType = el.dataset.sort;
      renderPosts();
    };
  });
};

// 加载数据
async function loadData() {
  posts = await (await fetch(`${API}?act=posts`)).json();
  comments = await (await fetch(`${API}?act=comments`)).json();
}

// 渲染帖子（支持排序）
function renderPosts() {
  let list = [...posts];

  if (sortType === 'new') {
    list.sort((a, b) => b.postId - a.postId);
  } else if (sortType === 'old') {
    list.sort((a, b) => a.postId - b.postId);
  } else if (sortType === 'hot') {
    list.sort((a, b) => (b.like || 0) - (a.like || 0));
  }

  const dom = document.getElementById('postList');
  dom.innerHTML = '';

  if (list.length === 0) {
    dom.innerHTML = `<div style='background:#fff;padding:30px;text-align:center;border-radius:8px;'>暂无帖子</div>`;
    return;
  }

  list.forEach(p => {
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-header">
        <div class="post-avatar">${p.user?.charAt(0).toUpperCase() || 'U'}</div>
        <div class="post-username">${p.user}</div>
        <div class="post-time">${p.time || ''}</div>
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-content-preview">${p.content}</div>
      <div class="post-actions">
        <div class="post-action" onclick="likePost(${p.postId},event)">❤️ ${p.like || 0}</div>
        <div class="post-action" onclick="collect(event)">⭐ 收藏</div>
        <div class="post-action">💬 ${comments.filter(c => c.postId === p.postId).length}</div>
      </div>
    `;
    card.onclick = () => openDetail(p);
    dom.appendChild(card);
  });
}

// 打开帖子（全屏覆盖）
function openDetail(post) {
  currentPost = post;
  document.getElementById('listPage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');

  const d = document.getElementById('detailContainer');
  d.innerHTML = `
    <div class="detail-card">
      <div class="post-header">
        <div class="post-avatar">${post.user.charAt(0).toUpperCase()}</div>
        <div class="post-username">${post.user}</div>
        <div class="post-time">${post.time || ''}</div>
      </div>
      <div class="detail-title">${post.title}</div>
      <div class="detail-content">${post.content}</div>
      <div class="post-actions">
        <div class="post-action" onclick="likePost(${post.postId},event)">❤️ ${post.like || 0}</div>
        <div class="post-action" onclick="collect(event)">⭐ 收藏</div>
      </div>
    </div>
  `;
  renderComments();
}

// 渲染评论
function renderComments() {
  const c = document.getElementById('commentListContainer');
  const cs = comments.filter(x => x.postId === currentPost.postId);
  c.innerHTML = '';
  cs.forEach(cm => {
    c.innerHTML += `
      <div class="comment-item">
        <div class="comment-avatar">${cm.user.charAt(0).toUpperCase()}</div>
        <div class="comment-user">
          <div class="comment-name">${cm.user}</div>
          <div class="comment-time">${cm.time || ''}</div>
        </div>
        <div class="comment-text">${cm.text}</div>
        <div class="comment-actions">
          <div class="comment-action" onclick="likeComment(${cm.cid},event)">❤️ ${cm.like || 0}</div>
        </div>
      </div>
    `;
  });
}

// 发布帖子 → 自动进入帖子
async function doPost() {
  const title = document.getElementById('postTitle').value.trim();
  const content = document.getElementById('postContent').value.trim();
  if (!title || !content) return alert('请填写完整');

  await fetch(`${API}?act=createPost&uid=${uid}&title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}`);
  closePost();
  await loadData();
  renderPosts();

  // 自动打开最新帖子
  const newPost = posts.sort((a,b)=>b.postId-a.postId)[0];
  openDetail(newPost);
}

// 发表评论
async function submitComment() {
  const txt = document.getElementById('commentInput').value.trim();
  if (!txt) return;
  await fetch(`${API}?act=createComment&uid=${uid}&postId=${currentPost.postId}&text=${encodeURIComponent(txt)}`);
  document.getElementById('commentInput').value = '';
  await loadData();
  renderComments();
}

// 点赞
async function likePost(pid, e) {
  e.stopPropagation();
  await fetch(`${API}?act=like&postId=${pid}`);
  await loadData();
  renderPosts();
  if (currentPost?.postId === pid) openDetail(currentPost);
}

async function likeComment(cid, e) {
  e.stopPropagation();
  await fetch(`${API}?act=likeComment&cid=${cid}`);
  await loadData();
  renderComments();
}

// 收藏提示
function collect(e) {
  e.stopPropagation();
  alert('功能开发中，敬请期待');
}

// 弹窗
function showPost() { document.getElementById('postMask').style.display = 'flex'; }
function closePost() { document.getElementById('postMask').style.display = 'none'; }
function goBack() {
  document.getElementById('detailPage').classList.remove('active');
  document.getElementById('listPage').classList.add('active');
}

loadNav();
</script>
</body>
</html>
