<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>论坛 - RatStudio的小站</title>
<style>
/* 全局 iOS 丝滑动画曲线 */
:root{
  --ios-ease: cubic-bezier(0.25, 1, 0.5, 1);
  --ani-fade: all 0.4s var(--ios-ease);
}
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f4f5f7;
  color: #333;
}

/* 全局滚动条 */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

.container {
  margin-top: 56px;
  height: calc(100% - 56px);
  position: relative;
}

.page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  background: #f4f5f7;
  padding: 20px;
  display: none;
  opacity: 0;
  transform: translateY(8px);
  transition: var(--ani-fade);
}
.page.active {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

.content-wrap {
  max-width: 750px;
  margin: 0 auto;
}

.forum-tab-bar {
  background: #fff;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  display: flex;
  gap: 16px;
  font-size: 14px;
  font-weight: 500;
}
.forum-tab {
  cursor: pointer;
  padding: 4px 0;
  border-bottom: 2px solid transparent;
  transition: var(--ani-fade);
}
.forum-tab.active {
  color: #0066cc;
  border-color: #0066cc;
}

.sort-bar {
  background: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  font-size: 14px;
}
.sort-item {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: var(--ani-fade);
}
.sort-item.active {
  background: #0066cc;
  color: #fff;
}

/* 帖子卡片 iOS 丝滑动效 */
.post-card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  border: 1px solid #e5e6eb;
  transition: var(--ani-fade);
}
.post-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.08);
}
.post-card:active{
  transform: scale(0.98);
}

.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.post-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #0066cc;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.post-username {
  font-size: 14px;
  font-weight: 500;
}
.admin-badge {
  background: #e53935;
  color: #fff;
  font-size: 10px;
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: 4px;
}
.post-time {
  font-size: 12px;
  color: #999;
  margin-left: auto;
}

.post-tags {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.tag {
  font-size: 11px;
  padding: 1px 5px;
  border-radius: 3px;
}
.tag.top {
  background: #e53935;
  color: #fff;
}
.tag.good {
  background: #36ad6a;
  color: #fff;
}
.post-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 6px;
}
.post-content-preview {
  font-size: 14px;
  color: #666;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.post-actions {
  display: flex;
  gap: 18px;
  font-size: 13px;
  color: 666;
  align-items: center;
}
.post-action {
  cursor: pointer;
  transition: var(--ani-fade);
}
.post-action:active{
  transform: scale(0.92);
}
.post-action.del {
  color: #e53935;
}

/* 帖子图片样式 */
.post-img-list{
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin: 10px 0;
}
.post-img-list img{
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--ani-fade);
}
.post-img-list img:hover{
  transform: scale(1.05);
}

/* 详情 */
.detail-card {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 12px;
}
.detail-title {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 12px;
}
.detail-content {
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 16px;
}
.back-btn {
  background: #fff;
  border: 1px solid #e5e6eb;
  padding: 6px 12px;
  border-radius: 8px;
  cursor: pointer;
  margin-bottom: 12px;
  transition: var(--ani-fade);
}
.back-btn:active{
  transform: scale(0.96);
}

/* 评论 */
.comment-list {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
}
.comment-item {
  padding: 12px 0;
  border-bottom: 1px solid #f2f2f2;
  transition: var(--ani-fade);
}
.comment-item:active{
  background: #fafafa;
}
.comment-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #0066cc;
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  vertical-align: top;
}
.comment-user {
  display: inline-flex;
  flex-direction: column;
  margin-left: 8px;
}
.comment-name {
  font-size: 14px;
}
.comment-time {
  font-size: 12px;
  color: #999;
}
.comment-text {
  margin-left: 40px;
  font-size: 14px;
  margin-top: 4px;
}
.comment-actions {
  margin-left: 40px;
  font-size: 12px;
  color: #999;
  margin-top: 4px;
  display: flex;
  gap: 12px;
}
.comment-action {
  cursor: pointer;
  transition: var(--ani-fade);
}
.comment-action:active{
  transform: scale(0.92);
}
.comment-action.del {
  color: #e53935;
}

.comment-input-bar {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.comment-input {
  flex: 1;
  height: 40px;
  padding: 0 14px;
  border: 1px solid #e5e6eb;
  border-radius: 20px;
  outline: none;
}
.comment-send {
  padding: 0 18px;
  background: #0066cc;
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  transition: var(--ani-fade);
}
.comment-send:active{
  transform: scale(0.92);
}

/* 发帖悬浮按钮 */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  background: #0066cc;
  color: #fff;
  border-radius: 50%;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  z-index: 999;
  transition: var(--ani-fade);
}
.fab:active{
  transform: scale(0.9);
}

/* 弹窗 iOS 缩放动画 */
.mask {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.3s var(--ios-ease);
}
.mask.show{
  display: flex;
  opacity: 1;
}
.pop {
  background: #fff;
  width: 90%;
  max-width: 500px;
  border-radius: 16px;
  padding: 24px;
  position: relative;
  transform: scale(0.9);
  transition: transform 0.35s var(--ios-ease);
}
.mask.show .pop{
  transform: scale(1);
}

.pop-close {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 16px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: none;
  border: none;
  color: #666;
  transition: var(--ani-fade);
}
.pop-close:active{
  transform: scale(0.8);
}

.pop input, .pop textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #e5e6eb;
  border-radius: 12px;
  margin-bottom: 12px;
  outline: none;
  transition: var(--ani-fade);
}
.pop button {
  width: 100%;
  padding: 12px;
  background: #0066cc;
  color: #fff;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: var(--ani-fade);
}
.pop button:active{
  transform: scale(0.98);
}

/* 图片上传区域 */
.upload-box{
  border:1px dashed #ccc;
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
}
.upload-preview{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:10px;
}
.upload-preview img{
  width:80px;
  height:80px;
  object-fit:cover;
  border-radius:8px;
}
#fileInput{
  display:none;
}
.upload-btn{
  display:inline-block;
  padding:6px 12px;
  background:#f1f2f3;
  border-radius:8px;
  cursor:pointer;
  font-size:13px;
}

/* 图片全屏预览层 */
.img-preview-layer{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  z-index:9999;
  align-items:center;
  justify-content:center;
}
.img-preview-layer img{
  max-width:90%;
  max-height:90%;
}
</style>
</head>

<body>
  <div id="navContainer"></div>

  <div class="fab" onclick="showPost()">+</div>

  <div class="container">
    <div class="page active" id="listPage">
      <div class="content-wrap">
        <div class="forum-tab-bar">
          <div class="forum-tab active">全部帖子</div>
          <div class="forum-tab">置顶</div>
          <div class="forum-tab">精华</div>
        </div>

        <div class="sort-bar">
          <div class="sort-item active" data-sort="new">倒序（最新）</div>
          <div class="sort-item" data-sort="old">正序（最早）</div>
          <div class="sort-item" data-sort="hot">热度（点赞）</div>
        </div>
        <div id="postList"></div>
      </div>
    </div>

    <div class="page" id="detailPage">
      <div class="content-wrap">
        <button class="back-btn" onclick="goBack()">← 返回列表</button>
        <div id="detailContainer"></div>

        <div class="comment-list">
          <div id="commentListContainer"></div>
          <div class="comment-input-bar">
            <input class="comment-input" id="commentInput" placeholder="发表评论">
            <button class="comment-send" onclick="submitComment()">发表</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 发帖弹窗 -->
  <div class="mask" id="postMask">
    <div class="pop">
      <button class="pop-close" onclick="closePost()">×</button>
      <input id="postTitle" placeholder="标题">
      <textarea id="postContent" rows="5" placeholder="内容"></textarea>

      <div class="upload-box">
        <label class="upload-btn" for="fileInput">选择图片</label>
        <input type="file" id="fileInput" accept="image/*" multiple>
        <div class="upload-preview" id="uploadPreview"></div>
      </div>

      <button onclick="doPost()">发布帖子</button>
    </div>
  </div>

  <!-- 图片全屏预览 -->
  <div class="img-preview-layer" id="imgLayer" onclick="closeImgPreview()">
    <img id="previewImg" src="">
  </div>

<script>
// 图片全局数组
let imgUrls = [];

function loadNav() {
  fetch('nav.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('navContainer').innerHTML = html;
    let u = localStorage.getItem('username');
    let id = localStorage.getItem('uid');
    if (u && id) {
      document.getElementById('topAvatar').innerText = u.charAt(0).toUpperCase();
      document.getElementById('miniName').innerText = u;
      document.getElementById('miniUid').innerText = id;
      document.getElementById('logoutBtn').style.display = 'block';
    } else {
      document.getElementById('topAvatar').innerText = 'U';
      document.getElementById('miniName').innerText = '游客';
      document.getElementById('miniUid').innerText = '未登录';
      document.getElementById('logoutBtn').style.display = 'none';
    }
  });
}

let username = localStorage.getItem('username');
let uid = localStorage.getItem('uid');
const API = '/api';
const ADMIN_UIDS = [1];
function isAdmin() {
  return ADMIN_UIDS.includes(Number(uid));
}

let posts = [];
let comments = [];
let currentPost = null;
let sortType = 'new';

window.onload = async () => {
  loadNav();
  await loadData();
  renderPosts();
  routeByHash();

  // 图片选择监听
  fileInput.onchange = async function(e){
    let files = e.target.files;
    for(let file of files){
      let form = new FormData();
      form.append('img', file);
      let res = await fetch(`${API}/upload`, {
        method:'POST',
        body:form
      });
      let json = await res.json();
      if(json.url){
        imgUrls.push(json.url);
        renderUploadPreview();
      }
    }
  };

  document.querySelectorAll('.sort-item').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.sort-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      sortType = el.dataset.sort;
      renderPosts();
    };
  });

  window.addEventListener('hashchange', routeByHash);
};

function renderUploadPreview(){
  let html = '';
  imgUrls.forEach(url=>{
    html += `<img src="${url}">`;
  });
  uploadPreview.innerHTML = html;
}

async function loadData() {
  posts = await (await fetch(`${API}?act=posts`)).json();
  comments = await (await fetch(`${API}?act=comments`)).json();
}

function renderPosts() {
  let list = [...posts];
  if (sortType === 'new') list.sort((a,b)=>b.postId - a.postId);
  if (sortType === 'old') list.sort((a,b)=>a.postId - b.postId);
  if (sortType === 'hot') list.sort((a,b)=>(b.like||0)-(a.like||0));

  const dom = document.getElementById('postList');
  dom.innerHTML = '';
  if (list.length === 0) {
    dom.innerHTML = `<div style='background:#fff;padding:30px;text-align:center;border-radius:12px;'>暂无帖子</div>`;
    return;
  }

  list.forEach(p => {
    const isPostAdmin = p.uid == 1;
    // 渲染帖子图片
    let imgHtml = '';
    if(p.imgs){
      let imgs = JSON.parse(p.imgs);
      imgHtml += `<div class="post-img-list">`;
      imgs.forEach(src=>{
        imgHtml += `<img src="${src}" onclick="openImgPreview('${src}')">`;
      });
      imgHtml += `</div>`;
    }

    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-header">
        <div class="post-avatar">${p.user?.charAt(0).toUpperCase() || 'U'}</div>
        <div class="post-username">${p.user} ${isPostAdmin ? '<span class="admin-badge">管理</span>' : ''}</div>
        <div class="post-time">${p.time || ''}</div>
      </div>
      <div class="post-tags">
        ${p.top ? '<span class="tag top">置顶</span>' : ''}
        ${p.good ? '<span class="tag good">精华</span>' : ''}
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-content-preview">${p.content}</div>
      ${imgHtml}
      <div class="post-actions">
        <div class="post-action" onclick="likePost(${p.postId},event)">❤️ ${p.like || 0}</div>
        <div class="post-action" onclick="collect(event)">⭐ 收藏</div>
        <div class="post-action">💬 ${comments.filter(c=>c.postId===p.postId).length}</div>
      </div>
    `;
    card.onclick = () => location.hash = `/` + p.postId;
    dom.appendChild(card);
  });
}

function openImgPreview(src){
  previewImg.src = src;
  imgLayer.style.display = 'flex';
}
function closeImgPreview(){
  imgLayer.style.display = 'none';
}

function routeByHash() {
  const hash = location.hash;
  if (!hash || hash === '#/') {
    document.getElementById('listPage').classList.add('active');
    document.getElementById('detailPage').classList.remove('active');
    return;
  }
  const pid = parseInt(hash.replace('#/', ''));
  if (pid) {
    const p = posts.find(x => x.postId === pid);
    if (p) openDetail(p);
  }
}

function openDetail(post) {
  currentPost = post;
  document.getElementById('listPage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');

  const d = document.getElementById('detailContainer');
  const isOwner = post.user === username;
  const delBtn = (isOwner || isAdmin())
    ? `<div class="post-action del" onclick="deletePost(${post.postId})">🗑️ 删除帖子</div>`
    : '';

  let imgHtml = '';
  if(post.imgs){
    let imgs = JSON.parse(post.imgs);
    imgHtml += `<div class="post-img-list">`;
    imgs.forEach(src=>{
      imgHtml += `<img src="${src}" onclick="openImgPreview('${src}')">`;
    });
    imgHtml += `</div>`;
  }

  d.innerHTML = `
    <div class="detail-card">
      <div class="post-header">
        <div class="post-avatar">${post.user.charAt(0).toUpperCase()}</div>
        <div class="post-username">${post.user} ${post.uid==1?'<span class="admin-badge">管理</span>':''}</div>
        <div class="post-time">${post.time || ''}</div>
      </div>
      <div class="detail-title">${post.title}</div>
      <div class="detail-content">${post.content}</div>
      ${imgHtml}
      <div class="post-actions">
        <div class="post-action" onclick="likePost(${post.postId},event)">❤️ ${post.like || 0}</div>
        <div class="post-action" onclick="collect(event)">⭐ 收藏</div>
        ${delBtn}
      </div>
    </div>
  `;
  renderComments();
}

function renderComments() {
  const c = document.getElementById('commentListContainer');
  const cs = comments.filter(x => x.postId === currentPost.postId);
  c.innerHTML = '';
  cs.forEach(cm => {
    const isCommentOwner = cm.user === username;
    const delBtn = (isCommentOwner || isAdmin())
      ? `<div class="comment-action del" onclick="deleteComment(${cm.cid})">删除</div>`
      : '';

    c.innerHTML += `
      <div class="comment-item">
        <div class="comment-avatar">${cm.user.charAt(0).toUpperCase()}</div>
        <div class="comment-user">
          <div class="comment-name">${cm.user} ${cm.uid==1?'<span class="admin-badge">管理</span>':''}</div>
          <div class="comment-time">${cm.time || ''}</div>
        </div>
        <div class="comment-text">${cm.text}</div>
        <div class="comment-actions">
          <div class="comment-action" onclick="likeComment(${cm.cid},event)">❤️ ${cm.like || 0}</div>
          ${delBtn}
        </div>
      </div>
    `;
  });
}

async function deletePost(pid) {
  if (!confirm('确定删除帖子？')) return;
  await fetch(`${API}?act=deletePost&postId=${pid}`);
  await loadData();
  location.hash = '';
}

async function deleteComment(cid) {
  if (!confirm('确定删除评论？')) return;
  await fetch(`${API}?act=deleteComment&cid=${cid}`);
  await loadData();
  renderComments();
}

function showPost(){
  postMask.classList.add('show');
  imgUrls = [];
  uploadPreview.innerHTML = '';
  fileInput.value = '';
  postTitle.value = '';
  postContent.value = '';
}
function closePost(){
  postMask.classList.remove('show');
}

async function doPost() {
  const title = document.getElementById('postTitle').value.trim();
  const content = document.getElementById('postContent').value.trim();
  if (!title || !content) return alert('请填写完整');

  let imgsStr = JSON.stringify(imgUrls);
  await fetch(`${API}?act=createPost&uid=${uid}&title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}&imgs=${encodeURIComponent(imgsStr)}`);
  closePost();
  await loadData();
  renderPosts();
  const newPost = posts.sort((a,b)=>b.postId-a.postId)[0];
  location.hash = `/` + newPost.postId;
}

async function submitComment() {
  const txt = document.getElementById('commentInput').value.trim();
  if (!txt) return;
  await fetch(`${API}?act=createComment&uid=${uid}&postId=${currentPost.postId}&text=${encodeURIComponent(txt)}`);
  document.getElementById('commentInput').value = '';
  await loadData();
  renderComments();
}

async function likePost(pid, e) {
  e.stopPropagation();
  await fetch(`${API}?act=like&postId=${pid}`);
  await loadData();
  renderPosts();
  if (currentPost?.postId === pid) openDetail(currentPost);
}

async function likeComment(cid, e) {
  e.stopPropagation();
  await fetch(`${API}?act=likeComment&cid=${cid}`);
  await loadData();
  renderComments();
}

function collect(e) {
  e.stopPropagation();
  alert('功能开发中~');
}

function goBack() { location.hash = ''; }

loadNav();
</script>
</body>
</html>
