<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>论坛</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:#111;color:#fff}
.container{max-width:600px;margin:20px auto;padding:10px}
.sidebar{display:flex;gap:8px;margin-bottom:10px}
.item{padding:8px 12px;background:#222;border-radius:8px;cursor:pointer}
.item.active{background:#0066ff}
.post{background:#222;padding:12px;border-radius:10px;margin-bottom:8px}
.post h3{margin-bottom:4px}
.post .info{font-size:12px;color:#aaa}
.btn{padding:8px 12px;background:#0066ff;color:#fff;border:none;border-radius:8px;margin-top:8px}
input,textarea{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:none;background:#222;color:#fff}
</style>
</head>
<body>
<div class="container">
  <div class="sidebar">
    <div class="item" onclick="location.href='index.html'">聊天室</div>
    <div class="item active">论坛</div>
  </div>

  <input id="title" placeholder="标题">
  <textarea id="content" rows="3" placeholder="内容"></textarea>
  <button class="btn" onclick="createPost()">发布帖子</button>

  <div id="list" style="margin-top:16px"></div>
</div>

<script>
const API = "https://rs-pro.ltc114514191.workers.dev";
const user = localStorage.getItem('username');
const uid = localStorage.getItem('uid');

if (!user || !uid) {
  alert('请先登录');
  location.href = 'index.html';
}

async function createPost() {
  const title = document.getElementById('title').value;
  const content = document.getElementById('content').value;
  if (!title || !content) return alert('不能为空');
  
  await fetch(`${API}/?act=createPost&uid=${uid}&title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}`);
  document.getElementById('title').value = '';
  document.getElementById('content').value = '';
  loadPosts();
}

async function loadPosts() {
  const r = await fetch(`${API}/?act=posts`);
  const list = await r.json();
  const box = document.getElementById('list');
  box.innerHTML = '';
  
  list.forEach(p => {
    const div = document.createElement('div');
    div.className = 'post';
    div.innerHTML = `
      <h3>${p.title}</h3>
      <div class="info">${p.user} · ${p.time || ''}</div>
      <div style="margin-top:8px">${p.content}</div>
      <div style="margin-top:8px">
        <button class="btn" onclick="like(${p.postId})">点赞 ${p.like || 0}</button>
      </div>
    `;
    box.appendChild(div);
  });
}

async function like(postId) {
  await fetch(`${API}/?act=like&uid=${uid}&postId=${postId}`);
  loadPosts();
}

loadPosts();
</script>
</body>
</html>
