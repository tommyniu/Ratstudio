<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>论坛 - RatStudio的小站</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Microsoft YaHei", sans-serif;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #f4f5f7;
  color: #333;
}

.container {
  margin-top: 56px;
  height: calc(100% - 56px);
  position: relative;
}

.page {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow-y: auto;
  background: #f4f5f7;
  padding: 20px;
  display: none;
}
.page.active {
  display: block;
}

.content-wrap {
  max-width: 750px;
  margin: 0 auto;
}

/* 贴吧/B站风格标签栏 */
.forum-tab-bar {
  background: #fff;
  border-radius: 8px;
  padding: 10px 14px;
  margin-bottom: 12px;
  display: flex;
  gap: 16px;
  font-size: 14px;
  font-weight: 500;
}
.forum-tab {
  cursor: pointer;
  padding: 4px 0;
  border-bottom: 2px solid transparent;
}
.forum-tab.active {
  color: #0066cc;
  border-color: #0066cc;
}

/* 排序 */
.sort-bar {
  background: #fff;
  padding: 10px 14px;
  border-radius: 8px;
  margin-bottom: 12px;
  display: flex;
  gap: 12px;
  font-size: 14px;
}
.sort-item {
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
}
.sort-item.active {
  background: #0066cc;
  color: #fff;
}

/* 帖子卡片（B站/贴吧质感）*/
.post-card {
  background: #fff;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  border: 1px solid #e5e6eb;
  transition: box-shadow 0.2s;
}
.post-card:hover {
  box-shadow: 0 1px 4px rgba(0,0,0,0.06);
}
.post-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.post-avatar {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  background: #0066cc;
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}
.post-username {
  font-size: 14px;
  font-weight: 500;
}
.admin-badge {
  background: #e53935;
  color: #fff;
  font-size: 10px;
  padding: 1px 4px;
  border-radius: 3px;
  margin-left: 4px;
}
.post-time {
  font-size: 12px;
  color: #999;
  margin-left: auto;
}
/* 标签 */
.post-tags {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}
.tag {
  font-size: 11px;
  padding: 1px 5px;
  border-radius: 3px;
}
.tag.top {
  background: #e53935;
  color: #fff;
}
.tag.good {
  background: #36ad6a;
  color: #fff;
}
.post-title {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 6px;
}
.post-content-preview {
  font-size: 14px;
  color: #666;
  margin-bottom: 10px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.post-actions {
  display: flex;
  gap: 18px;
  font-size: 13px;
  color: #666;
  align-items: center;
}
.post-action {
  cursor: pointer;
}
.post-action.del {
  color: #e53935;
}

/* 帖子详情 */
.detail-card {
  background: #fff;
  border-radius: 8px;
  padding: 20px;
  margin-bottom: 12px;
}
.detail-title {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 12px;
}
.detail-content {
  font-size: 15px;
  line-height: 1.7;
  margin-bottom: 16px;
}
.back-btn {
  background: #fff;
  border: 1px solid #e5e6eb;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  margin-bottom: 12px;
}

/* 评论 */
.comment-list {
  background: #fff;
  border-radius: 8px;
  padding: 16px;
}
.comment-item {
  padding: 12px 0;
  border-bottom: 1px solid #f2f2f2;
}
.comment-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #0066cc;
  color: #fff;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  vertical-align: top;
}
.comment-user {
  display: inline-flex;
  flex-direction: column;
  margin-left: 8px;
}
.comment-name {
  font-size: 14px;
}
.comment-time {
  font-size: 12px;
  color: #999;
}
.comment-text {
  margin-left: 40px;
  font-size: 14px;
  margin-top: 4px;
}
.comment-actions {
  margin-left: 40px;
  font-size: 12px;
  color: #999;
  margin-top: 4px;
  display: flex;
  gap: 12px;
}
.comment-action {
  cursor: pointer;
}
.comment-action.del {
  color: #e53935;
}

.comment-input-bar {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}
.comment-input {
  flex: 1;
  height: 40px;
  padding: 0 14px;
  border: 1px solid #e5e6eb;
  border-radius: 20px;
  outline: none;
}
.comment-send {
  padding: 0 18px;
  background: #0066cc;
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

/* 发帖按钮 */
.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 50px;
  height: 50px;
  background: #0066cc;
  color: #fff;
  border-radius: 50%;
  font-size: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 10px #00000030;
  z-index: 999;
}

/* 发帖弹窗 */
.mask {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.pop {
  background: #fff;
  width: 90%;
  max-width: 500px;
  border-radius: 12px;
  padding: 24px;
  position: relative;
}
.pop-close {
  position: absolute;
  top: 8px;
  right: 10px;
  font-size: 16px;
  width: 24px;
  height: 24px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  background: none;
  border: none;
  color: #666;
}
.pop input, .pop textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #e5e6eb;
  border-radius: 8px;
  margin-bottom: 12px;
  outline: none;
}
.pop button {
  width: 100%;
  padding: 12px;
  background: #0066cc;
  color: #fff;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
</style>
</head>

<body>
  <div id="navContainer"></div>

  <div class="fab" onclick="showPost()">+</div>

  <div class="container">
    <div class="page active" id="listPage">
      <div class="content-wrap">
        <!-- B站/贴吧 标签栏 -->
        <div class="forum-tab-bar">
          <div class="forum-tab active">全部帖子</div>
          <div class="forum-tab">置顶</div>
          <div class="forum-tab">精华</div>
        </div>

        <div class="sort-bar">
          <div class="sort-item active" data-sort="new">倒序（最新）</div>
          <div class="sort-item" data-sort="old">正序（最早）</div>
          <div class="sort-item" data-sort="hot">热度（点赞）</div>
        </div>
        <div id="postList"></div>
      </div>
    </div>

    <div class="page" id="detailPage">
      <div class="content-wrap">
        <button class="back-btn" onclick="goBack()">← 返回列表</button>
        <div id="detailContainer"></div>

        <div class="comment-list">
          <div id="commentListContainer"></div>
          <div class="comment-input-bar">
            <input class="comment-input" id="commentInput" placeholder="发表评论">
            <button class="comment-send" onclick="submitComment()">发表</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mask" id="postMask">
    <div class="pop">
      <button class="pop-close" onclick="closePost()">×</button>
      <input id="postTitle" placeholder="标题">
      <textarea id="postContent" rows="5" placeholder="内容"></textarea>
      <button onclick="doPost()">发布帖子</button>
    </div>
  </div>

<script>
function loadNav() {
  fetch('nav.html')
  .then(res => res.text())
  .then(html => {
    document.getElementById('navContainer').innerHTML = html;
    let u = localStorage.getItem('username');
    let id = localStorage.getItem('uid');
    if (u && id) {
      document.getElementById('topAvatar').innerText = u.charAt(0).toUpperCase();
      document.getElementById('miniName').innerText = u;
      document.getElementById('miniUid').innerText = id;
      document.getElementById('logoutBtn').style.display = 'block';
    } else {
      document.getElementById('topAvatar').innerText = 'U';
      document.getElementById('miniName').innerText = '游客';
      document.getElementById('miniUid').innerText = '未登录';
      document.getElementById('logoutBtn').style.display = 'none';
    }
  });
}

let username = localStorage.getItem('username');
let uid = localStorage.getItem('uid');
const API = '/api';

// 🔥 管理员配置（改成你的UID）
const ADMIN_UIDS = [1];
function isAdmin() {
  return ADMIN_UIDS.includes(Number(uid));
}

let posts = [];
let comments = [];
let currentPost = null;
let sortType = 'new';

window.onload = async () => {
  loadNav();
  await loadData();
  renderPosts();
  routeByHash();

  document.querySelectorAll('.sort-item').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.sort-item').forEach(i => i.classList.remove('active'));
      el.classList.add('active');
      sortType = el.dataset.sort;
      renderPosts();
    };
  });

  window.addEventListener('hashchange', routeByHash);
};

async function loadData() {
  posts = await (await fetch(`${API}?act=posts`)).json();
  comments = await (await fetch(`${API}?act=comments`)).json();
}

function renderPosts() {
  let list = [...posts];
  if (sortType === 'new') list.sort((a,b)=>b.postId - a.postId);
  if (sortType === 'old') list.sort((a,b)=>a.postId - b.postId);
  if (sortType === 'hot') list.sort((a,b)=>(b.like||0)-(a.like||0));

  const dom = document.getElementById('postList');
  dom.innerHTML = '';
  if (list.length === 0) {
    dom.innerHTML = `<div style='background:#fff;padding:30px;text-align:center;border-radius:8px;'>暂无帖子</div>`;
    return;
  }

  list.forEach(p => {
    const isPostAdmin = p.uid == 1;
    const card = document.createElement('div');
    card.className = 'post-card';
    card.innerHTML = `
      <div class="post-header">
        <div class="post-avatar">${p.user?.charAt(0).toUpperCase() || 'U'}</div>
        <div class="post-username">${p.user} ${isPostAdmin ? '<span class="admin-badge">管理</span>' : ''}</div>
        <div class="post-time">${p.time || ''}</div>
      </div>
      <div class="post-tags">
        ${p.top ? '<span class="tag top">置顶</span>' : ''}
        ${p.good ? '<span class="tag good">精华</span>' : ''}
      </div>
      <div class="post-title">${p.title}</div>
      <div class="post-content-preview">${p.content}</div>
      <div class="post-actions">
        <div class="post-action" onclick="likePost(${p.postId},event)">❤️ ${p.like || 0}</div>
        <div class="post-action" onclick="collect(event)">⭐ 收藏</div>
        <div class="post-action">💬 ${comments.filter(c=>c.postId===p.postId).length}</div>
      </div>
    `;
    card.onclick = () => location.hash = `/` + p.postId;
    dom.appendChild(card);
  });
}

function routeByHash() {
  const hash = location.hash;
  if (!hash || hash === '#/') {
    document.getElementById('listPage').classList.add('active');
    document.getElementById('detailPage').classList.remove('active');
    return;
  }
  const pid = parseInt(hash.replace('#/', ''));
  if (pid) {
    const p = posts.find(x => x.postId === pid);
    if (p) openDetail(p);
  }
}

function openDetail(post) {
  currentPost = post;
  document.getElementById('listPage').classList.remove('active');
  document.getElementById('detailPage').classList.add('active');

  const d = document.getElementById('detailContainer');
  const isOwner = post.user === username;
  const delBtn = (isOwner || isAdmin())
    ? `<div class="post-action del" onclick="deletePost(${post.postId})">🗑️ 删除帖子</div>`
    : '';

  d.innerHTML = `
    <div class="detail-card">
      <div class="post-header">
        <div class="post-avatar">${post.user.charAt(0).toUpperCase()}</div>
        <div class="post-username">${post.user} ${post.uid==1?'<span class="admin-badge">管理</span>':''}</div>
        <div class="post-time">${post.time || ''}</div>
      </div>
      <div class="detail-title">${post.title}</div>
      <div class="detail-content">${post.content}</div>
      <div class="post-actions">
        <div class="post-action" onclick="likePost(${post.postId},event)">❤️ ${post.like || 0}</div>
        <div class="post-action" onclick="collect(event)">⭐ 收藏</div>
        ${delBtn}
      </div>
    </div>
  `;
  renderComments();
}

function renderComments() {
  const c = document.getElementById('commentListContainer');
  const cs = comments.filter(x => x.postId === currentPost.postId);
  c.innerHTML = '';
  cs.forEach(cm => {
    const isCommentOwner = cm.user === username;
    const delBtn = (isCommentOwner || isAdmin())
      ? `<div class="comment-action del" onclick="deleteComment(${cm.cid})">删除</div>`
      : '';

    c.innerHTML += `
      <div class="comment-item">
        <div class="comment-avatar">${cm.user.charAt(0).toUpperCase()}</div>
        <div class="comment-user">
          <div class="comment-name">${cm.user} ${cm.uid==1?'<span class="admin-badge">管理</span>':''}</div>
          <div class="comment-time">${cm.time || ''}</div>
        </div>
        <div class="comment-text">${cm.text}</div>
        <div class="comment-actions">
          <div class="comment-action" onclick="likeComment(${cm.cid},event)">❤️ ${cm.like || 0}</div>
          ${delBtn}
        </div>
      </div>
    `;
  });
}

// ==========================
// 🔥 删除修复（现在正常）
// ==========================
async function deletePost(pid) {
  if (!confirm('确定删除帖子？')) return;
  await fetch(`${API}?act=deletePost&postId=${pid}`);
  await loadData();
  location.hash = '';
}

async function deleteComment(cid) {
  if (!confirm('确定删除评论？')) return;
  await fetch(`${API}?act=deleteComment&cid=${cid}`);
  await loadData();
  renderComments();
}

async function doPost() {
  const title = document.getElementById('postTitle').value.trim();
  const content = document.getElementById('postContent').value.trim();
  if (!title || !content) return alert('请填写完整');

  await fetch(`${API}?act=createPost&uid=${uid}&title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}`);
  closePost();
  await loadData();
  renderPosts();
  const newPost = posts.sort((a,b)=>b.postId-a.postId)[0];
  location.hash = `/` + newPost.postId;
}

async function submitComment() {
  const txt = document.getElementById('commentInput').value.trim();
  if (!txt) return;
  await fetch(`${API}?act=createComment&uid=${uid}&postId=${currentPost.postId}&text=${encodeURIComponent(txt)}`);
  document.getElementById('commentInput').value = '';
  await loadData();
  renderComments();
}

async function likePost(pid, e) {
  e.stopPropagation();
  await fetch(`${API}?act=like&postId=${pid}`);
  await loadData();
  renderPosts();
  if (currentPost?.postId === pid) openDetail(currentPost);
}

async function likeComment(cid, e) {
  e.stopPropagation();
  await fetch(`${API}?act=likeComment&cid=${cid}`);
  await loadData();
  renderComments();
}

function collect(e) {
  e.stopPropagation();
  alert('功能开发中~');
}

function showPost() { document.getElementById('postMask').style.display = 'flex'; }
function closePost() { document.getElementById('postMask').style.display = 'none'; }
function goBack() { location.hash = ''; }

loadNav();
</script>
</body>
</html>
