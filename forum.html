<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>论坛 - RatStudio的小站</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui}
body{background:linear-gradient(135deg,#0f1419,#0a0c12);display:flex;align-items:center;justify-content:center;height:100vh}
.container{
  display:flex;width:680px;height:750px;border-radius:44px;overflow:hidden;
  background:rgba(255,255,255,.04);backdrop-filter:blur(30px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 50px rgba(60,120,255,0.25);
}
.sidebar{
  width:140px;background:rgba(255,255,255,.05);padding:30px 10px;
  display:flex;flex-direction:column;gap:10px;
  border-right:1px solid rgba(255,255,255,.08);
}
.item{
  padding:14px;border-radius:16px;color:rgba(255,255,255,.8);text-align:center;
  cursor:pointer;transition:all 0.2s;border:1px solid transparent;
}
.item:hover,.item.active{
  background:rgba(60,130,255,.25);color:#fff;
  border-color:rgba(100,160,255,0.4);box-shadow:0 0 12px rgba(80,140,255,0.35);
}
.main{flex:1;position:relative}
.top{
  background:rgba(255,255,255,.05);padding:20px;color:#fff;font-weight:600;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.add{
  width:32px;height:32px;background:rgba(60,120,255,.3);border:none;border-radius:50%;
  color:#fff;font-size:18px;cursor:pointer;
}
.page{display:none;height:630px;overflow-y:auto;padding:20px}
.page.active{display:block}
.post{
  background:rgba(255,255,255,.07);border-radius:18px;padding:16px;margin-bottom:12px;color:#fff;
  border:1px solid rgba(255,255,255,.12);cursor:pointer;
}
.post h3{margin-bottom:8px}
.post .info{color:#aaa;font-size:12px;margin-bottom:8px}
.post .content{margin-bottom:10px;line-height:1.5}
.like{
  background:rgba(255,80,80,.25);color:#fff;border:none;padding:6px 12px;border-radius:12px;cursor:pointer;
}
.detail{padding:20px;color:#fff}
.detail h2{margin-bottom:12px}
.detail .info{color:#aaa;font-size:14px;margin-bottom:16px}
.back{
  background:#4080ff;color:#fff;border:none;padding:8px 14px;border-radius:12px;cursor:pointer;margin-bottom:16px;
}
.mask{
  position:absolute;inset:0;background:rgba(0,0,0,.6);display:none;place-items:center;
}
.pop{
  background:#1a1c25;padding:30px;border-radius:24px;width:90%;max-width:400px;
  border:1px solid rgba(255,255,255,.15);
}
.pop input,.pop textarea{
  width:100%;margin-bottom:12px;background:#262833;border:none;border-radius:12px;
  padding:12px;color:#fff;
  border:1px solid rgba(255,255,255,.15);
}
.pop textarea{height:120px;resize:none}
.pop button{
  width:100%;padding:12px;background:#4080ff;border:none;border-radius:12px;color:#fff;
}
.version{position:absolute;right:18px;bottom:12px;color:#888;font-size:12px}
</style>
</head>
<body>
<div class="container">
<div class="sidebar">
<div class="item" onclick="location.href='index.html'">聊天室</div>
<div class="item active">论坛</div>
<div class="item" onclick="location.href='history.html'">更新日志</div>
<div class="item" onclick="location.href='plan.html'">开发规划</div>
</div>
<div class="main">
<div class="top">
<span>论坛</span>
<button class="add" onclick="showPost()">+</button>
</div>
<div class="page active" id="listPage"><div class="posts" id="list"></div></div>
<div class="page" id="detailPage">
<div class="detail">
<button class="back" onclick="goBack()">← 返回</button>
<h2 id="detailTitle"></h2>
<div class="info" id="detailInfo"></div>
<div class="content" id="detailContent"></div>
<button class="like" id="detailLikeBtn" onclick="likeDetail()"></button>
</div>
</div>
<div class="mask" id="mask">
<div class="pop">
<input id="title" placeholder="标题">
<textarea id="content" placeholder="内容"></textarea>
<button onclick="createPost()">发布</button>
</div>
</div>
<div class="version">V1.3.2</div>
</div>
</div>

<script>
const API = "https://api.ratstudio-official.pages.dev";

window.onload = function(){
  const user = localStorage.getItem('username');
  const uid = localStorage.getItem('uid');
  let postsData = [];
  let currentPostId = null;

  if (!user || !uid) {
    alert('请先登录');
    location.href = 'index.html';
    return;
  }

  window.showPost = function() { 
    const mask = document.getElementById('mask');
    if(mask) mask.style.display = 'grid';
  }
  
  window.hidePost = function() { 
    const mask = document.getElementById('mask');
    if(mask) mask.style.display = 'none';
  }

  window.createPost = async function() {
    const title = document.getElementById('title')?.value;
    const content = document.getElementById('content')?.value;
    if (!title || !content) { alert('不能为空'); return; }

    await fetch(`${API}/?act=createPost&uid=${uid}&title=${encodeURIComponent(title)}&content=${encodeURIComponent(content)}`);
    hidePost();
    loadPosts();
  }

  window.loadPosts = async function() {
    try {
      const r = await fetch(`${API}/?act=posts`);
      const list = await r.json();
      postsData = list;
      renderList();
      route();
    } catch (e) {
      console.error("加载帖子失败", e);
    }
  }

  window.renderList = function() {
    const box = document.getElementById('list');
    if(!box) return;
    
    box.innerHTML = '';
    if (!postsData) return;
    postsData.forEach(p => {
      const div = document.createElement('div');
      div.className = 'post';
      div.innerHTML = `
        <h3>${p.title}</h3>
        <div class="info">${p.user} (${p.uid}) ${p.time || ''}</div>
        <div class="content">${p.content.substring(0, 80)}${p.content.length > 80 ? '...' : ''}</div>
        <button class="like" onclick="event.stopPropagation();like(${p.postId})">点赞 ${p.like || 0}</button>
      `;
      div.onclick = () => goDetail(p.postId);
      box.appendChild(div);
    });
  }

  window.goDetail = function(id) {
    history.pushState(null, null, `#/${id}`);
    route();
  }

  window.goBack = function() {
    history.pushState(null, null, `#/`);
    route();
  }

  window.route = function() {
    const hash = location.hash.slice(1) || '/';
    const listPage = document.getElementById('listPage');
    const detailPage = document.getElementById('detailPage');
    
    if (hash === '/') {
      if(listPage) listPage.classList.add('active');
      if(detailPage) detailPage.classList.remove('active');
    } else {
      const id = hash.replace('/', '');
      const p = postsData.find(x => x.postId == id);
      if (p) {
        currentPostId = id;
        if(listPage) listPage.classList.remove('active');
        if(detailPage) detailPage.classList.add('active');
        
        const detailTitle = document.getElementById('detailTitle');
        const detailInfo = document.getElementById('detailInfo');
        const detailContent = document.getElementById('detailContent');
        const detailLikeBtn = document.getElementById('detailLikeBtn');
        
        if(detailTitle) detailTitle.textContent = p.title;
        if(detailInfo) detailInfo.textContent = `${p.user} (${p.uid}) ${p.time || ''}`;
        if(detailContent) detailContent.textContent = p.content;
        if(detailLikeBtn) detailLikeBtn.textContent = `点赞 ${p.like || 0}`;
      } else {
        goBack();
      }
    }
  }

  window.addEventListener('hashchange', route);

  window.like = async function(id) {
    try {
      await fetch(`${API}/?act=like&uid=${uid}&postId=${id}`);
      loadPosts();
    } catch (e) { console.error(e); }
  }

  window.likeDetail = function() {
    like(currentPostId);
  }

  loadPosts();
}
</script>
</body>
</html>
