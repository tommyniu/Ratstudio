<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>主页 - RatStudio的小站</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}
body{background:#f7f8fa;padding-top:80px}

.container{max-width:1000px;margin:0 auto;padding:0 20px}
.welcome{background:#fff;padding:30px;border-radius:16px;margin-bottom:20px}
.welcome h1{font-size:22px;margin-bottom:10px}
.welcome p{color:#666}

.quick{background:#fff;padding:24px;border-radius:16px;margin-bottom:20px}
.quick h3{margin-bottom:16px}
.quick .items{display:flex;gap:16px;flex-wrap:wrap}
.quick .item{padding:12px 16px;background:#f5f5f5;border-radius:8px;color:#333;text-decoration:none}
.quick .item:hover{background:#e8f0fe}

.recommend{background:#fff;padding:24px;border-radius:16px}
.recommend h3{margin-bottom:16px}
.random-btn{padding:10px 16px;background:#0066cc;color:#fff;border:none;border-radius:8px;cursor:pointer;margin-bottom:16px}
.post-item{padding:16px;border-bottom:1px solid #eee}
.post-item:last-child{border-bottom:none}
.post-item .title{font-weight:bold;margin-bottom:6px}
.post-item .info{font-size:12px;color:#999}
</style>
</head>

<body>
<div id="navContainer"></div>

<div class="container">
  <div class="welcome">
    <h1>👋 欢迎回来，<span id="nick">游客</span></h1>
    <p>这里是主页，你可以浏览推荐、快捷跳转、随机查看有趣的帖子</p>
  </div>

  <div class="quick">
    <h3>⚡ 快捷导航</h3>
    <div class="items">
      <a class="item" href="forum.html">进入论坛</a>
      <a class="item" href="index.html">聊天室</a>
      <a class="item" href="personal.html">个人中心</a>
    </div>
  </div>

  <div class="recommend">
    <h3>📌 每日推荐</h3>
    <button class="random-btn" id="randomBtn">🎲 随机抽取一篇帖子</button>
    <div id="randomPost"></div>
  </div>
</div>

<script>
// 加载导航
fetch('nav.html')
.then(res=>res.text())
.then(html=>{
  document.getElementById('navContainer').innerHTML = html
})

// 欢迎词
let u = localStorage.getItem('username')
if(u) document.getElementById('nick').innerText = u

// 随机帖子
let posts = [
  {title:"分享一下最近学习心得",info:"作者：admin"},
  {title:"网页新版本更新公告",info:"作者：系统"},
  {title:"大家喜欢什么功能？",info:"作者：用户"}
]
document.getElementById('randomBtn').onclick = function(){
  let p = posts[Math.floor(Math.random()*posts.length)]
  document.getElementById('randomPost').innerHTML = `
    <div class="post-item">
      <div class="title">${p.title}</div>
      <div class="info">${p.info}</div>
    </div>
  `
}
</script>
</body>
</html>
